<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>بوابة الموظف — GR دوام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — Jarvis/Sci-Fi dark theme (same as main app)
   ============================================================ */
:root{
  --bg-primary:#060A14;--bg-card:rgba(10,18,40,0.85);--bg-input:rgba(0,212,255,0.04);
  --accent-cyan:#00D4FF;--accent-blue:#0066FF;--accent-green:#00FF88;
  --accent-orange:#FF6B00;--accent-red:#FF0055;
  --text-primary:#E8F4F8;--text-secondary:#7A9AB5;
  --border-glass:rgba(0,212,255,0.12);
  --radius-lg:16px;--radius-sm:8px;
  --transition-fast:0.18s cubic-bezier(.4,0,.2,1);
  --font-body:'Cairo',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --font-display:'Tajawal',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);color:var(--text-primary);
  background:var(--bg-primary);min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* HUD background grid */
.hud-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.scan-line{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);
  animation:scanLine 4s linear infinite;z-index:1;pointer-events:none;
}
@keyframes scanLine{0%{top:-2px}100%{top:100%}}

/* ── Layout ── */
.app{position:relative;z-index:2;min-height:100vh;}
.container{width:100%;max-width:520px;margin:0 auto;padding:0 16px;}

/* ── Glass Card ── */
.glass-card{
  background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);
  position:relative;overflow:hidden;
}
.glass-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(0,212,255,0.03) 0%,transparent 60%);
}

/* ── Typography ── */
.mono{font-family:var(--font-mono);}
.text-secondary{color:var(--text-secondary);}
.text-green{color:var(--accent-green);}
.text-red{color:var(--accent-red);}
.text-orange{color:var(--accent-orange);}
.text-cyan{color:var(--accent-cyan);}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(6,10,20,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-glass);padding:12px 0;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:900;font-size:0.85rem;color:#fff;
}
.brand-text{font-family:var(--font-display);font-weight:800;font-size:1rem;
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.brand-sub{font-size:0.72rem;color:var(--text-secondary);font-family:var(--font-mono);}
.emp-badge{
  font-size:0.8rem;font-weight:700;color:var(--accent-cyan);
  background:rgba(0,212,255,0.08);border:1px solid var(--border-glass);
  border-radius:20px;padding:4px 12px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:160px;
}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border-radius:var(--radius-sm);border:none;
  font-family:var(--font-body);font-weight:700;font-size:0.9rem;
  cursor:pointer;transition:all var(--transition-fast);white-space:nowrap;
}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-primary{
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));color:#fff;
  box-shadow:0 4px 20px rgba(0,212,255,0.25);
}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 28px rgba(0,212,255,0.4);transform:translateY(-1px);}
.btn-green{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.btn-green:hover:not(:disabled){background:rgba(0,255,136,0.18);}
.btn-orange{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.btn-orange:hover:not(:disabled){background:rgba(255,107,0,0.18);}
.btn-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-glass);}
.btn-ghost:hover:not(:disabled){color:var(--text-primary);border-color:var(--accent-cyan);}
.btn-block{width:100%;}
.btn-sm{padding:8px 16px;font-size:0.82rem;}

/* ── Form ── */
.field{margin-bottom:18px;}
.field label{display:block;font-size:0.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
.input{
  width:100%;padding:12px 16px;background:var(--bg-input);
  border:1px solid var(--border-glass);border-radius:var(--radius-sm);
  color:var(--text-primary);font-family:var(--font-body);font-size:0.95rem;
  transition:border-color var(--transition-fast);
}
.input:focus{outline:none;border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.1);}
.input-mono{font-family:var(--font-mono);}
textarea.input{resize:vertical;min-height:90px;}

/* ── Badges ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:0.74rem;font-weight:700;font-family:var(--font-mono);white-space:nowrap;
}
.badge-green{background:rgba(0,255,136,0.12);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.badge-orange{background:rgba(255,107,0,0.12);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.badge-red{background:rgba(255,0,85,0.12);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.badge-cyan{background:rgba(0,212,255,0.12);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}

/* ── Toast ── */
.toast-host{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:400px;}
.toast{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-radius:var(--radius-sm);font-size:0.88rem;font-weight:600;
  animation:toastIn .25s ease;backdrop-filter:blur(12px);
}
.toast.hide{animation:toastOut .25s ease forwards;}
.toast.success{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.4);color:var(--accent-green);}
.toast.error{background:rgba(255,0,85,0.15);border:1px solid rgba(255,0,85,0.4);color:var(--accent-red);}
.toast.warn{background:rgba(255,107,0,0.15);border:1px solid rgba(255,107,0,0.4);color:var(--accent-orange);}
.toast.info{background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);color:var(--accent-cyan);}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}

/* ── Spinner ── */
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);
  border-top-color:currentColor;border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error / Loading screens ── */
.full-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.full-screen .icon{font-size:3.5rem;margin-bottom:16px;}
.full-screen h1{font-family:var(--font-display);font-size:1.4rem;margin-bottom:8px;}
.full-screen p{color:var(--text-secondary);font-size:0.88rem;max-width:360px;line-height:1.6;}

/* ── Section ── */
.section{padding:20px 0 40px;}
.section-card{padding:20px 18px;margin-bottom:16px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-family:var(--font-display);font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);box-shadow:0 0 8px var(--accent-cyan);flex-shrink:0;}

/* ── Status Card (main check-in/out display) ── */
.status-card{padding:24px 20px;margin-bottom:16px;text-align:center;}
.status-icon{font-size:3rem;margin-bottom:12px;}
.status-label{font-family:var(--font-display);font-weight:900;font-size:1.3rem;margin-bottom:6px;}
.status-time{font-family:var(--font-mono);font-size:1rem;color:var(--text-secondary);}
.duration-pill{
  display:inline-block;margin-top:10px;
  padding:6px 16px;border-radius:20px;
  font-family:var(--font-mono);font-size:0.85rem;font-weight:700;
  background:rgba(0,212,255,0.08);border:1px solid var(--border-glass);
  color:var(--accent-cyan);
}

/* ── Date Bar ── */
.date-bar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;
  gap:10px;padding:14px 18px;margin-bottom:16px;
}
.date-display{text-align:right;}
.date-day{font-family:var(--font-display);font-weight:800;font-size:1.1rem;color:var(--accent-cyan);}
.date-iso{font-family:var(--font-mono);font-size:0.82rem;color:var(--text-secondary);}
.date-input-wrap{display:flex;align-items:center;gap:8px;}
.date-diff-warning{
  width:100%;text-align:center;
  padding:8px 12px;border-radius:8px;
  background:rgba(255,107,0,0.08);border:1px solid rgba(255,107,0,0.3);
  color:var(--accent-orange);font-size:0.82rem;font-weight:700;
  display:none;
}
.date-diff-warning.show{display:block;}

/* ── Action Buttons ── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.action-btn{padding:18px 12px;border-radius:var(--radius-lg);border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:0.95rem;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all var(--transition-fast);}
.action-btn .icon{font-size:1.6rem;}
.action-btn:disabled{opacity:0.35;cursor:not-allowed;}
.action-btn.checkin{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.3);}
.action-btn.checkin:hover:not(:disabled){background:rgba(0,255,136,0.18);box-shadow:0 0 24px rgba(0,255,136,0.2);}
.action-btn.checkout{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.3);}
.action-btn.checkout:hover:not(:disabled){background:rgba(255,107,0,0.18);box-shadow:0 0 24px rgba(255,107,0,0.2);}

/* ── Monthly history table ── */
.history-table{width:100%;border-collapse:collapse;direction:rtl;}
.history-table th,.history-table td{
  padding:10px 8px;font-size:0.8rem;text-align:right;
  border-bottom:1px solid var(--border-glass);
}
.history-table th{font-weight:700;color:var(--text-secondary);background:rgba(0,212,255,0.04);}
.history-table tr:last-child td{border-bottom:none;}
.history-table tr:hover td{background:rgba(0,212,255,0.02);}
.history-table .mono{font-family:var(--font-mono);font-size:0.76rem;}
.warn-flag{color:var(--accent-orange);font-size:0.7rem;margin-right:4px;}

/* ── Correction Request Form ── */
.correction-card{padding:20px 18px;margin-bottom:16px;}
.request-status-item{
  padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:10px;
  background:rgba(0,212,255,0.03);border:1px solid var(--border-glass);
}
.request-status-item .req-date{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-secondary);margin-bottom:4px;}
.request-status-item .req-reason{font-size:0.85rem;margin-bottom:6px;}
.request-status-item .req-admin-note{font-size:0.8rem;color:var(--text-secondary);margin-top:6px;padding-top:6px;border-top:1px solid var(--border-glass);}

/* ── Empty state ── */
.empty-state{padding:32px;text-align:center;color:var(--text-secondary);}
.empty-state .icon{font-size:2.5rem;margin-bottom:10px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal{width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:24px;background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border-glass);border-radius:var(--radius-lg);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.modal h2{font-family:var(--font-display);font-weight:800;font-size:1.15rem;margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.field-error{color:var(--accent-red);font-size:0.78rem;margin-top:4px;display:none;}
.field-error.show{display:block;}

/* ── Tabs ── */
.tab-row{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--border-glass);padding-bottom:0;}
.tab-item{padding:10px 16px;font-weight:700;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;border-radius:8px 8px 0 0;border:1px solid transparent;white-space:nowrap;}
.tab-item.active{color:var(--accent-cyan);border-color:var(--border-glass);border-bottom-color:transparent;background:var(--bg-card);}

@media(max-width:480px){
  .action-grid{grid-template-columns:1fr;}
  .date-bar{flex-direction:column;align-items:flex-end;}
  .topbar-inner{flex-wrap:wrap;gap:8px;}
  .emp-badge{max-width:140px;}
}
</style>
</head>
<body>
<div class="hud-bg" aria-hidden="true"></div>
<div class="scan-line" aria-hidden="true"></div>
<div class="toast-host" id="toastHost" role="status" aria-live="polite"></div>
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalContent" role="dialog" aria-modal="true"></div>
</div>
<div id="app"></div>

<script type="module">
/* ============================================================
   EMPLOYEE PORTAL — employee.html
   Token-based access, server-state check-in/out, no shared auth
   with admin or shop manager. Completely isolated module.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAQH5Z2kJ6YwlB1xdEQlwo5UGaWLYov0LE",
  authDomain: "gr-dawam.firebaseapp.com",
  projectId: "gr-dawam",
  storageBucket: "gr-dawam.firebasestorage.app",
  messagingSenderId: "272883931173",
  appId: "1:272883931173:web:672937f47bbc93e57ac7cc"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot,
  updateDoc, query, where, orderBy, serverTimestamp, addDoc, limit, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp(firebaseConfig, "employeeApp");
const db = getFirestore(app);
const auth = getAuth(app);

/* ── auth ── */
let uid = null;
const authReady = new Promise(resolve => {
  onAuthStateChanged(auth, async user => {
    if (user) { uid = user.uid; resolve(user); }
    else { const c = await signInAnonymously(auth); uid = c.user.uid; resolve(c.user); }
  });
});

/* ── state ── */
const state = {
  token: null,
  employee: null,    // { id, name, nameSlug, shopId, tenantId, hourlyRate, status, normalHours }
  shop: null,        // { name, normalHours, ... }
  selectedDate: null,
  todayISO: null,
  record: null,      // today's attendance record from Firestore (server state)
  monthRecords: [],  // current month's records
  myRequests: [],    // correction requests for this employee
  unsubRecord: null,
  activeTab: "attendance",
  isLoading: true,
};

/* ── utility ── */
function todayISO(){
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,10);
}
function dayNameAr(iso){
  const names = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  return names[new Date(iso + "T12:00:00").getDay()];
}
function formatTimeOnly(ts){
  if (!ts) return "—";
  const d = ts instanceof Date ? ts : ts.toDate();
  return d.toLocaleTimeString("ar-EG", { hour:"2-digit", minute:"2-digit", hour12: true });
}
function formatFullDate(iso){
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("ar-EG", { year:"numeric", month:"short", day:"numeric" });
}
function formatHoursMinutes(decimal){
  if (!decimal || decimal <= 0) return "—";
  const m = Math.round(decimal * 60);
  const h = Math.floor(m / 60), mn = m % 60;
  if (h === 0) return `${mn} دقيقة`;
  if (mn === 0) return `${h} ساعة`;
  return `${h} ساعة و${mn} دقيقة`;
}
function calcHours(checkIn, checkOut, normalHours = 8){
  if (!checkIn || !checkOut) return { total: 0, base: 0, extra: 0 };
  const i = checkIn instanceof Date ? checkIn : checkIn.toDate();
  const o = checkOut instanceof Date ? checkOut : checkOut.toDate();
  const total = Math.max(0, Math.round(((o - i) / 3600000) * 100) / 100);
  const base = Math.min(total, normalHours);
  const extra = Math.max(0, Math.round((total - normalHours) * 100) / 100);
  return { total, base, extra };
}
function escapeHtml(s){ const d = document.createElement("div"); d.textContent = String(s||""); return d.innerHTML; }
function attendanceDocId(shopId, date){ return `${shopId}_${date}`; }

/* ── toast ── */
function toast(msg, type="info", dur=3800){
  const host = document.getElementById("toastHost");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icons = { success:"✅", error:"⛔", warn:"⚠️", info:"ℹ️" };
  el.innerHTML = `<span>${icons[type]||""}</span><span>${escapeHtml(msg)}</span>`;
  host.appendChild(el);
  setTimeout(()=>{ el.classList.add("hide"); setTimeout(()=>el.remove(), 250); }, dur);
}

/* ── modal ── */
function showModal(html){
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modalOverlay").classList.remove("hidden");
}
function closeModal(){
  document.getElementById("modalOverlay").classList.add("hidden");
  document.getElementById("modalContent").innerHTML = "";
}
document.getElementById("modalOverlay").addEventListener("click", e=>{
  if (e.target === e.currentTarget) closeModal();
});

/* ── resolve token → employee ── */
async function resolveToken(token){
  // Search across all shops for this token.
  // Firestore Rules ensure anonymous users can only READ their own employee doc via token.
  // We do a collectionGroup query on "employees" filtered by token.
  const q = query(collection(db, "employees_by_token"), where("token", "==", token));
  const snap = await getDocs(q);
  if (!snap.empty) {
    const d = snap.docs[0];
    return { id: d.id, ...d.data() };
  }
  // Fallback: collectionGroup across shops (works since Rules allow it for token-matching)
  const q2 = query(
    collection(db, "__employeeTokenIndex__"),
    where("token", "==", token),
    limit(1)
  );
  // Final fallback: iterate (only works if shop is embedded in token's doc)
  // The primary mechanism uses a top-level employees_by_token mirror collection
  return null;
}

/* ── load employee by token ── */
async function loadEmployee(token){
  // The Employee Token Index: a mirror collection at the root level
  // employees_by_token/{token} → { employeeId, shopId, tenantId, token }
  const indexRef = doc(db, "employees_by_token", token);
  const indexSnap = await getDoc(indexRef);
  if (!indexSnap.exists()) return null;

  const { employeeId, shopId } = indexSnap.data();
  const empRef = doc(db, "shops", shopId, "employees", employeeId);
  const empSnap = await getDoc(empRef);
  if (!empSnap.exists()) return null;

  const shopRef = doc(db, "shops", shopId);
  const shopSnap = await getDoc(shopRef);
  const shopData = shopSnap.exists() ? shopSnap.data() : {};

  return {
    ...empSnap.data(),
    id: employeeId,
    shopId,
    normalHours: shopData.settings?.normalHours || shopData.normalHours || 8,
    shopName: shopData.name || "",
  };
}

/* ── Subscribe to today's record (server state — not localStorage) ── */
function subscribeRecord(date){
  if (state.unsubRecord) { state.unsubRecord(); state.unsubRecord = null; }
  const docId = attendanceDocId(state.employee.shopId, date);
  const recRef = doc(db, "attendance", docId, "records", state.employee.id);
  state.unsubRecord = onSnapshot(recRef, snap => {
    state.record = snap.exists() ? snap.data() : null;
    renderAttendanceSection();
  }, err => console.error("record subscription error:", err));
}

/* ── Load month records (optimized: batched reads, max 10 concurrent) ── */
async function loadMonthRecords(){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const lastDay = new Date(y, m, 0).getDate();
  const pad = n => String(n).padStart(2,"0");
  const monthPrefix = `${y}-${pad(m)}`;
  const todayStr = todayISO();

  // Build list of days up to today only
  const dates = [];
  for (let day = 1; day <= lastDay; day++){
    const iso = `${monthPrefix}-${pad(day)}`;
    if (iso <= todayStr) dates.push(iso);
  }

  // Fetch in batches of 10 to limit Firestore concurrency on mobile
  const BATCH = 10;
  const results = [];
  for (let i = 0; i < dates.length; i += BATCH){
    const batchDates = dates.slice(i, i + BATCH);
    const batchResults = await Promise.all(batchDates.map(async date => {
      const docId = attendanceDocId(state.employee.shopId, date);
      try{
        const snap = await getDoc(doc(db, "attendance", docId, "records", state.employee.id));
        if (snap.exists()){
          const d = snap.data();
          if (d.checkIn || d.onVacation) return { date, ...d };
        }
        return null;
      }catch{ return null; }
    }));
    results.push(...batchResults);
  }

  state.monthRecords = results.filter(Boolean).sort((a,b) => b.date.localeCompare(a.date));
  if (state.activeTab === "history") renderHistorySection();
}

/* ── Load correction requests ── */
async function loadMyRequests(){
  const q = query(
    collection(db, "correction_requests"),
    where("employeeId", "==", state.employee.id),
    where("shopId", "==", state.employee.shopId),
    orderBy("submittedAt", "desc"),
    limit(30)
  );
  const snap = await getDocs(q);
  state.myRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  if (state.activeTab === "requests") renderRequestsSection();
}

/* ── HANDLE CHECK-IN ── */
async function handleCheckIn(){
  const btn = document.getElementById("checkInBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  try{
    await authReady;
    const date = state.selectedDate;
    const isDateMismatch = date !== state.todayISO;
    const attendanceDocIdStr = attendanceDocId(state.employee.shopId, date);

    // Ensure the parent day-document exists
    const dayRef = doc(db, "attendance", attendanceDocIdStr);
    const daySnap = await getDoc(dayRef);
    if (!daySnap.exists()){
      await setDoc(dayRef, {
        shopId: state.employee.shopId,
        tenantId: state.employee.tenantId || state.employee.shopId,
        date,
        dayName: dayNameAr(date),
        locked: false,
        createdAt: serverTimestamp()
      });
    }

    // Write the check-in record — this is the authoritative server state
    // Always initialize hours fields to 0 for schema consistency
    const recRef = doc(db, "attendance", attendanceDocIdStr, "records", state.employee.id);
    await setDoc(recRef, {
      checkIn: serverTimestamp(),           // server-side timestamp — cannot be manipulated client-side
      checkOut: null,
      totalHours: 0,
      baseHours: 0,
      extraHours: 0,
      approvalStatus: null,
      submittedByEmployee: true,            // marks this as employee self-check-in
      submittedByEmployeeId: state.employee.id,
      dateMatchWarning: isDateMismatch,     // flag for admin: employee checked in on a different date
      actualSubmissionDate: todayISO(),     // the real calendar date when they submitted
      shopId: state.employee.shopId,
      tenantId: state.employee.tenantId || state.employee.shopId,
      uid,
    }, { merge: true });

    // Audit log
    await addDoc(collection(db, "audit_logs"), {
      action: "employee_self_checkin",
      employeeId: state.employee.id,
      shopId: state.employee.shopId,
      tenantId: state.employee.tenantId || state.employee.shopId,
      date,
      dateMatchWarning: isDateMismatch,
      submittedByEmployee: true,
      timestamp: serverTimestamp(),
      uid,
      source: "employee_portal",
      gateUser: null,
    });

    toast(isDateMismatch ? "تم تسجيل الحضور ✓ (تنبيه: على تاريخ مختلف)" : "تم تسجيل الحضور ✓", "success");
    // Record will update via onSnapshot — no need to re-render manually
  }catch(err){
    console.error(err);
    toast("فشل تسجيل الحضور — حاول مرة أخرى", "error");
    btn.disabled = false;
    btn.innerHTML = `<span class="icon">🟢</span> تسجيل الحضور`;
  }
}

/* ── HANDLE CHECK-OUT ── */
async function handleCheckOut(){
  const btn = document.getElementById("checkOutBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  try{
    await authReady;
    const date = state.selectedDate;
    const isDateMismatch = date !== state.todayISO;
    const docIdStr = attendanceDocId(state.employee.shopId, date);
    const recRef = doc(db, "attendance", docIdStr, "records", state.employee.id);
    const normalHours = state.employee.normalHours || 8;

    // Read checkIn BEFORE writing checkOut — we need it to compute hours
    // state.record is live from onSnapshot so it's reliable
    const checkInTs = state.record?.checkIn;
    if (!checkInTs){
      // Safety: re-read from server
      const snap = await getDoc(recRef);
      if (!snap.exists() || !snap.data()?.checkIn){
        throw new Error("لا يوجد سجل حضور مرتبط");
      }
    }

    const checkOutTime = new Date();

    // كشف drift ساعة الجهاز: لو checkIn من الـ server أحدث من now() بأكتر من 5 دقائق
    // يعني ساعة الجهاز متأخرة — نحذر المستخدم بدل تسجيل ساعات سالبة أو خاطئة
    if(checkInTs){
      const ciDate = checkInTs instanceof Date ? checkInTs : checkInTs.toDate();
      const driftMs = ciDate.getTime() - checkOutTime.getTime();
      if(driftMs > 5 * 60 * 1000){
        toast("⚠️ ساعة جهازك تبدو غير دقيقة — تأكد من ضبط الوقت قبل تسجيل الانصراف", "warn", 7000);
        btn.disabled = false;
        btn.innerHTML = `<span class="icon">🟠</span> تسجيل الانصراف`;
        return;
      }
    }

    const { total, base, extra } = checkInTs
      ? calcHours(checkInTs, checkOutTime, normalHours)
      : { total: 0, base: 0, extra: 0 };

    // Write checkOut + computed hours atomically in ONE setDoc call
    // This is the root-cause fix: previously hours were computed AFTER writing
    // checkOut using new Date() which could differ from serverTimestamp()
    const updatePayload = {
      checkOut: serverTimestamp(),
      totalHours: Math.round(total * 100) / 100,
      baseHours:  Math.round(base  * 100) / 100,
      extraHours: Math.round(extra * 100) / 100,
      dateMatchWarning: isDateMismatch || state.record?.dateMatchWarning || false,
    };
    if (extra > 0){
      updatePayload.approvalStatus = "pending";
    }

    await setDoc(recRef, updatePayload, { merge: true });

    if (extra > 0){
      toast("تم تسجيل الانصراف — الساعات الإضافية بانتظار اعتماد الإدارة", "info", 5000);
    } else {
      toast("تم تسجيل الانصراف ✓", "success");
    }

    await addDoc(collection(db, "audit_logs"), {
      action: "employee_self_checkout",
      employeeId: state.employee.id, shopId: state.employee.shopId,
      tenantId: state.employee.tenantId || state.employee.shopId,
      date, dateMatchWarning: isDateMismatch,
      submittedByEmployee: true, timestamp: serverTimestamp(),
      uid, source: "employee_portal", gateUser: null,
    });
  }catch(err){
    console.error(err);
    toast("فشل تسجيل الانصراف — حاول مرة أخرى", "error");
    btn.disabled = false;
    btn.innerHTML = `<span class="icon">🟠</span> تسجيل الانصراف`;
  }
}

  document.getElementById("corrReasonError").classList.remove("show");

  const btn = document.getElementById("submitCorrectionBtn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> جاري الإرسال...`;

  try{
    const rec = state.record;
    await addDoc(collection(db, "correction_requests"), {
      employeeId: state.employee.id,
      employeeName: state.employee.name,
      shopId: state.employee.shopId,
      tenantId: state.employee.tenantId || state.employee.shopId,
      date: state.selectedDate,
      type: "employee",
      reason,
      requestedCheckIn: corrCheckIn || null,
      requestedCheckOut: corrCheckOut || null,
      notes: notes || null,
      oldCheckIn: rec?.checkIn || null,
      oldCheckOut: rec?.checkOut || null,
      status: "pending",
      submittedAt: serverTimestamp(),
      reviewedAt: null, reviewedBy: null, adminNote: null,

}

/* ── INIT ── */
async function init(){
  await authReady;

  // Extract token from URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token){
    document.getElementById("app").innerHTML = `
      <div class="full-screen">
        <div class="icon">🔗</div>
        <h1>رابط غير صالح</h1>
        <p>هذا الرابط لا يحتوي على معرّف موظف صالح. تأكد من استخدام الرابط الصحيح الذي أرسلته لك الإدارة.</p>
      </div>`;
    return;
  }

  state.token = token;
  state.todayISO = todayISO();
  state.selectedDate = state.todayISO;

  // Show loading
  document.getElementById("app").innerHTML = `
    <div class="full-screen">
      <div class="spinner" style="width:40px;height:40px;border-width:3px;"></div>
      <p style="margin-top:16px;">جاري تحميل بياناتك...</p>
    </div>`;

  try{
    const employee = await loadEmployee(token);

    if (!employee){
      document.getElementById("app").innerHTML = `
        <div class="full-screen">
          <div class="icon">❌</div>
          <h1>الرابط منتهي الصلاحية</h1>
          <p>لم يُعثر على موظف بهذا الرابط. تواصل مع الإدارة للحصول على رابط جديد.</p>
        </div>`;
      return;
    }

    if (employee.status === "archived" || employee.status === "inactive" ||
        employee.status === "deleted" || employee.deleted === true){
      document.getElementById("app").innerHTML = `
        <div class="full-screen">
          <div class="icon">🚫</div>
          <h1>الحساب غير نشط</h1>
          <p>هذا الحساب غير مفعّل حالياً. تواصل مع الإدارة.</p>
        </div>`;
      return;
    }

    state.employee = employee;
    state.isLoading = false;

    // Start live subscription to today's record (server state — not localStorage)
    subscribeRecord(state.selectedDate);

    // Render the UI
    renderLayout();

    // Background loads
    loadMonthRecords();
    loadMyRequests();

  }catch(err){
    console.error("Init error:", err);
    document.getElementById("app").innerHTML = `
      <div class="full-screen">
        <div class="icon">⚠️</div>
        <h1>خطأ في الاتصال</h1>
        <p>تعذّر تحميل بياناتك. تحقق من الاتصال بالإنترنت وأعد المحاولة.</p>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="location.reload()">إعادة المحاولة</button>
      </div>`;
  }
}

init();
</script>
</body>
</html>
