<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>بوابة الموظف — GR دوام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg-primary:#060A14;--bg-card:rgba(10,18,40,0.85);--bg-input:rgba(0,212,255,0.04);
  --accent-cyan:#00D4FF;--accent-blue:#0066FF;--accent-green:#00FF88;
  --accent-orange:#FF6B00;--accent-red:#FF0055;
  --text-primary:#E8F4F8;--text-secondary:#7A9AB5;
  --border-glass:rgba(0,212,255,0.12);
  --radius-lg:16px;--radius-sm:8px;
  --transition-fast:0.18s cubic-bezier(.4,0,.2,1);
  --font-body:'Cairo',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --font-display:'Tajawal',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font-body);color:var(--text-primary);background:var(--bg-primary);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.hud-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:40px 40px;}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);animation:scanLine 4s linear infinite;z-index:1;pointer-events:none;}
@keyframes scanLine{0%{top:-2px}100%{top:100%}}
.app{position:relative;z-index:2;min-height:100vh;}
.container{width:100%;max-width:520px;margin:0 auto;padding:0 16px;}
.glass-card{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border-glass);border-radius:var(--radius-lg);position:relative;overflow:hidden;}
.glass-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(0,212,255,0.03) 0%,transparent 60%);}
.mono{font-family:var(--font-mono);}
.text-secondary{color:var(--text-secondary);}
.text-green{color:var(--accent-green);}
.text-red{color:var(--accent-red);}
.text-orange{color:var(--accent-orange);}
.text-cyan{color:var(--accent-cyan);}
/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(6,10,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-glass);padding:12px 0;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:0.85rem;color:#fff;flex-shrink:0;}
.brand-text{font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--text-primary);}
.brand-sub{font-size:0.72rem;color:var(--text-secondary);}
.emp-badge{font-size:0.78rem;color:var(--accent-cyan);background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:20px;padding:6px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
/* Section */
.section{padding:16px 0 80px;}
.section-card{padding:16px;margin-bottom:14px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;}
.section-title{font-weight:700;font-size:0.92rem;display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent-cyan);display:inline-block;flex-shrink:0;}
/* Tabs */
.tab-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.tab-row::-webkit-scrollbar{display:none;}
.tab-item{padding:9px 16px;border-radius:20px;font-size:0.84rem;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--text-secondary);border:1px solid transparent;transition:var(--transition-fast);}
.tab-item.active{background:rgba(0,212,255,0.1);color:var(--accent-cyan);border-color:rgba(0,212,255,0.3);}
.tab-item:hover:not(.active){color:var(--text-primary);}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.88rem;font-weight:700;cursor:pointer;border:none;transition:var(--transition-fast);text-decoration:none;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));color:#fff;}
.btn-primary:hover:not(:disabled){filter:brightness(1.12);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-glass);}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--accent-cyan);}
.btn-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.3);}
.btn-sm{padding:8px 14px;font-size:0.82rem;}
.btn-block{width:100%;}
/* Input */
.field{margin-bottom:14px;}
.field label{display:block;font-size:0.82rem;color:var(--text-secondary);margin-bottom:6px;}
.input{width:100%;background:var(--bg-input);border:1px solid var(--border-glass);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:0.9rem;padding:12px 14px;outline:none;transition:var(--transition-fast);}
.input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.1);}
.input-mono{font-family:var(--font-mono);}
.field-error{color:var(--accent-red);font-size:0.78rem;margin-top:5px;display:none;}
.field-error.show{display:block;}
/* Login screen */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{padding:32px 24px;width:100%;max-width:420px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .gr{font-family:var(--font-display);font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-logo .title{font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-top:2px;}
.login-logo .sub{font-size:0.78rem;color:var(--text-secondary);margin-top:4px;}
/* Action buttons */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.action-btn{padding:18px 12px;border-radius:var(--radius-lg);font-family:var(--font-body);font-size:0.9rem;font-weight:700;cursor:pointer;border:none;transition:var(--transition-fast);display:flex;flex-direction:column;align-items:center;gap:6px;}
.action-btn .icon{font-size:1.5rem;}
.action-btn.checkin{background:rgba(0,255,136,0.08);color:var(--accent-green);border:1px solid rgba(0,255,136,0.3);}
.action-btn.checkin:hover:not(:disabled){background:rgba(0,255,136,0.14);}
.action-btn.checkout{background:rgba(255,107,0,0.08);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.3);}
.action-btn.checkout:hover:not(:disabled){background:rgba(255,107,0,0.14);}
.action-btn:disabled{opacity:0.35;cursor:not-allowed;}
/* Status card */
.status-card{padding:18px;margin-bottom:14px;text-align:center;}
.status-icon{font-size:2.4rem;margin-bottom:8px;}
.status-label{font-size:1rem;font-weight:700;margin-bottom:8px;}
.status-time{font-size:0.82rem;color:var(--text-secondary);margin-bottom:4px;}
.duration-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.78rem;font-family:var(--font-mono);background:rgba(0,212,255,0.08);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.2);margin-top:8px;}
/* Date bar */
.date-bar{padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.date-day{font-weight:700;font-size:0.9rem;}
.date-iso{font-size:0.78rem;color:var(--text-secondary);}
.date-diff-warning{width:100%;font-size:0.77rem;color:var(--accent-orange);display:none;}
.date-diff-warning.show{display:block;}
/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;}
.badge-green{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.3);}
.badge-orange{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.3);}
.badge-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.3);}
.badge-cyan{background:rgba(0,212,255,0.08);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.2);}
/* History table */
.history-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.history-table th{color:var(--text-secondary);font-weight:600;text-align:right;padding:8px 10px;border-bottom:1px solid var(--border-glass);}
.history-table td{padding:9px 10px;border-bottom:1px solid rgba(0,212,255,0.05);}
.warn-flag{color:var(--accent-orange);}
/* Request card */
.request-status-item{padding:12px 0;border-bottom:1px solid rgba(0,212,255,0.06);}
.request-status-item:last-child{border-bottom:none;}
.req-date{font-weight:700;font-size:0.88rem;margin-bottom:4px;}
.req-reason{font-size:0.82rem;color:var(--text-secondary);margin-bottom:6px;}
.req-admin-note{margin-top:8px;padding:8px 10px;background:rgba(0,212,255,0.04);border:1px solid var(--border-glass);border-radius:8px;font-size:0.8rem;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#0A1228;border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal-box h2{font-size:1rem;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
/* Toast */
.toast-host{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;width:90%;max-width:380px;pointer-events:none;}
.toast{background:#0D1B35;border:1px solid var(--border-glass);border-radius:12px;padding:12px 16px;font-size:0.85rem;display:flex;align-items:center;gap:10px;animation:slideUp 0.25s ease;pointer-events:auto;}
.toast.success{border-color:rgba(0,255,136,0.4);}
.toast.error{border-color:rgba(255,0,85,0.4);}
.toast.warn{border-color:rgba(255,107,0,0.4);}
.toast.hide{opacity:0;transform:translateY(8px);transition:0.2s;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* Spinner */
.spinner{width:20px;height:20px;border:2px solid rgba(0,212,255,0.2);border-top-color:var(--accent-cyan);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Empty state */
.empty-state{text-align:center;padding:32px 16px;color:var(--text-secondary);}
.empty-state .icon{font-size:2rem;margin-bottom:10px;}
/* Logout btn */
.logout-btn{background:transparent;border:1px solid rgba(255,0,85,0.3);color:var(--accent-red);padding:6px 14px;border-radius:8px;font-size:0.78rem;cursor:pointer;font-family:var(--font-body);}
/* Full screen error */
.full-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:12px;}
.full-screen .icon{font-size:3rem;}
</style>
</head>
<body>
<div class="hud-bg" aria-hidden="true"></div>
<div class="scan-line" aria-hidden="true"></div>
<div class="app" id="app">
  <div class="full-screen">
    <div class="spinner" style="width:40px;height:40px;border-width:3px;"></div>
    <p style="margin-top:16px;">جاري التحميل...</p>
  </div>
</div>
<div class="toast-host" id="toastHost"></div>
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot,
  query, where, orderBy, serverTimestamp, addDoc, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA7kz4w60iHijlrTqGOERTHw52zaJWFFGo",
  authDomain: "gr-dawam-spek.firebaseapp.com",
  projectId: "gr-dawam-spek",
  storageBucket: "gr-dawam-spek.firebasestorage.app",
  messagingSenderId: "446257840423",
  appId: "1:446257840423:web:672937f47bbc93e57ac7cc",
};

const app = initializeApp(firebaseConfig, "employee-portal");
const db  = getFirestore(app);
const auth = getAuth(app);

let uid = null;
const authReady = new Promise(resolve => {
  onAuthStateChanged(auth, async user => {
    if(user){ uid = user.uid; resolve(user); }
    else { const c = await signInAnonymously(auth); uid = c.user.uid; resolve(c.user); }
  });
});

/* ── Constants ── */
const EMP_SESSION_KEY = "gr_dawam_emp_session_v1";
const ARABIC_DAYS = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

/* ── State ── */
const state = {
  employee: null,
  session: null,
  selectedDate: todayISO(),
  todayISO: todayISO(),
  record: null,
  monthRecords: [],
  myRequests: [],
  myTransferRequests: [],
  activeTab: "attendance",
  unsubRecord: null,
  unsubEmployee: null,
};

/* ── Helpers ── */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function dayNameAr(dateStr){ return ARABIC_DAYS[new Date(dateStr + "T12:00:00").getDay()]; }
function formatTimeOnly(ts){
  if(!ts) return "—";
  try{ const d = ts.toDate ? ts.toDate() : new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
  catch{ return "—"; }
}
function formatHoursMinutes(h){
  if(!h || h<=0) return "0 دقيقة";
  const m = Math.round(h*60); const hh=Math.floor(m/60), mm=m%60;
  if(hh===0) return `${mm} دقيقة`;
  if(mm===0) return `${hh} ساعة`;
  return `${hh} ساعة و${mm} دقيقة`;
}
function calcHours(checkIn, checkOut, normalHours=8){
  if(!checkIn||!checkOut) return {total:0,base:0,extra:0};
  const i=checkIn instanceof Date?checkIn:checkIn.toDate();
  const o=checkOut instanceof Date?checkOut:checkOut.toDate();
  const total=Math.max(0,Math.round(((o-i)/3600000)*100)/100);
  const base=Math.min(total,normalHours);
  const extra=Math.max(0,Math.round((total-normalHours)*100)/100);
  return {total,base,extra};
}
// يحسب إجمالي الساعات من السجل كاملاً، بما في ذلك أي فترات عمل إضافية (rec.periods)
// التي قد يكون النظام كتبها (مثلاً عبر كيوسك المحل) — calcHours البسيطة أعلاه تتجاهلها.
function calcTotalHoursFromRecord(rec, normalHours=8){
  let totalMs=0;
  if(rec?.checkIn&&rec?.checkOut){
    const i=rec.checkIn instanceof Date?rec.checkIn:rec.checkIn.toDate?.()||new Date(rec.checkIn);
    const o=rec.checkOut instanceof Date?rec.checkOut:rec.checkOut.toDate?.()||new Date(rec.checkOut);
    const ms=o-i; if(ms>0) totalMs+=ms;
  }
  if(Array.isArray(rec?.periods)){
    rec.periods.forEach(p=>{
      if(!p.checkIn||!p.checkOut) return;
      const i=p.checkIn instanceof Date?p.checkIn:p.checkIn.toDate?.()||new Date(p.checkIn);
      const o=p.checkOut instanceof Date?p.checkOut:p.checkOut.toDate?.()||new Date(p.checkOut);
      const ms=o-i; if(ms>0) totalMs+=ms;
    });
  }
  const total=Math.round((totalMs/3600000)*100)/100;
  const base=Math.min(total,normalHours);
  const extra=Math.max(0,Math.round((total-normalHours)*100)/100);
  return {total,base,extra};
}
function escapeHtml(s){ const d=document.createElement("div"); d.textContent=String(s||""); return d.innerHTML; }
function attendanceDocId(shopId,date){ return `${shopId}_${date}`; }

/* ── PBKDF2 ── */
async function pbkdf2Hash(password, saltB64, iterations=150000){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw",enc.encode(password),{name:"PBKDF2"},false,["deriveBits"]);
  const saltBytes = saltB64 ? Uint8Array.from(atob(saltB64),c=>c.charCodeAt(0)) : crypto.getRandomValues(new Uint8Array(16));
  const bits = await crypto.subtle.deriveBits({name:"PBKDF2",salt:saltBytes,iterations,hash:"SHA-256"},keyMaterial,256);
  const b64 = s => btoa(String.fromCharCode(...new Uint8Array(s)));
  return { hash: b64(bits), salt: b64(saltBytes.buffer), iterations };
}
async function verifyPassword(password, storedHash, storedSalt, iterations=150000){
  const { hash } = await pbkdf2Hash(password, storedSalt, iterations);
  return hash === storedHash;
}

/* ── Session ── */
function saveSession(session){ localStorage.setItem(EMP_SESSION_KEY, JSON.stringify(session)); }
function loadSession(){
  try{
    const raw = localStorage.getItem(EMP_SESSION_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(Date.now() - s.lastActivity > 8*60*60*1000) return null; // 8hr idle
    return s;
  }catch{ return null; }
}
function clearSession(){ localStorage.removeItem(EMP_SESSION_KEY); state.session=null; state.employee=null; }
function touchSession(){ if(state.session){ state.session.lastActivity=Date.now(); saveSession(state.session); } }
["click","keydown","touchstart"].forEach(e=>document.addEventListener(e,()=>touchSession(),{passive:true}));

/* ── Toast ── */
function toast(msg, type="info", dur=3800){
  const host=document.getElementById("toastHost");
  const el=document.createElement("div"); el.className=`toast ${type}`;
  const icons={success:"✅",error:"⛔",warn:"⚠️",info:"ℹ️"};
  el.innerHTML=`<span>${icons[type]||""}</span><span>${escapeHtml(msg)}</span>`;
  host.appendChild(el);
  setTimeout(()=>{ el.classList.add("hide"); setTimeout(()=>el.remove(),250); },dur);
}

/* ── Modal ── */
function showModal(html){ document.getElementById("modalContent").innerHTML=html; document.getElementById("modalOverlay").classList.remove("hidden"); }
function closeModal(){ document.getElementById("modalOverlay").classList.add("hidden"); document.getElementById("modalContent").innerHTML=""; }
document.getElementById("modalOverlay").addEventListener("click",e=>{ if(e.target===e.currentTarget) closeModal(); });

/* ── Load employee by username ── */
async function loadEmployeeByUsername(username){
  // Search gate_accounts for this username
  const q = query(collection(db,"gate_accounts"), where("username","==",username), limit(1));
  const snap = await getDocs(q);
  if(snap.empty) return null;
  const accData = snap.docs[0].data();
  const accId = snap.docs[0].id;
  if(accData.disabled) return { disabled: true };
  // Find the employee record linked to this account
  // Account has shopId — look for employee with same name or empId
  const shopId = accData.shopId;
  if(!shopId) return { accountOnly: true, accData, accId, shopId: null };
  // Try to find employee by empId stored in account, or by matching name
  let empData = null, empId = null;
  if(accData.employeeId){
    const empSnap = await getDoc(doc(db,"shops",shopId,"employees",accData.employeeId));
    if(empSnap.exists()){ empData = empSnap.data(); empId = empSnap.id; }
  }
  if(!empData){
    // Search by username match in employees collection
    const empQ = query(collection(db,"shops",shopId,"employees"), where("username","==",username), limit(1));
    const empSnap = await getDocs(empQ);
    if(!empSnap.empty){ empData = empSnap.docs[0].data(); empId = empSnap.docs[0].id; }
  }
  // Load shop info
  const shopSnap = await getDoc(doc(db,"shops",shopId));
  const shopData = shopSnap.exists() ? shopSnap.data() : {};
  return {
    accId, accData,
    id: empId || accId,
    name: empData?.name || accData.username,
    shopId,
    shopName: shopData.name || shopId,
    normalHours: shopData.settings?.normalHours || 8,
    status: empData?.status || "active",
    deleted: empData?.deleted || false,
    employeeId: empId,
  };
}

// ── تسجيل الدخول برابط شخصي (?token=...) — بديل بدون كلمة مرور لمن أُضيف عبر shop.html ──
// يُرجع نفس شكل الكائن الذي تُرجعه loadEmployeeByUsername بالضبط، فيعمل enterPortal() دون أي تعديل.
// لا يحتوي accId/accData لأن هذا المسار لا يعتمد على حساب gate_accounts إطلاقاً.
async function loadEmployeeByToken(token){
  const tokenSnap = await getDoc(doc(db,"employees_by_token",token));
  if(!tokenSnap.exists()) return null;
  const tokenData = tokenSnap.data();
  const { employeeId: empId, shopId } = tokenData;
  if(!shopId || !empId) return null;
  const empSnap = await getDoc(doc(db,"shops",shopId,"employees",empId));
  if(!empSnap.exists()) return { deleted: true };
  const empData = empSnap.data();
  if(empData.deleted) return { deleted: true };
  const shopSnap = await getDoc(doc(db,"shops",shopId));
  const shopData = shopSnap.exists() ? shopSnap.data() : {};
  return {
    id: empId,
    name: empData.name || tokenData.name,
    shopId,
    shopName: shopData.name || shopId,
    normalHours: shopData.settings?.normalHours || 8,
    status: empData.status || "active",
    deleted: empData.deleted || false,
    employeeId: empId,
    token, // محفوظ لاستعادة الجلسة لاحقًا دون الحاجة لإعادة كتابة الرابط
  };
}

/* ── Subscribe record ── */
function subscribeRecord(date){
  if(state.unsubRecord){ state.unsubRecord(); state.unsubRecord=null; }
  const docId = attendanceDocId(state.employee.shopId, date);
  const recRef = doc(db,"attendance",docId,"records",state.employee.id);
  state.unsubRecord = onSnapshot(recRef, snap=>{
    state.record = snap.exists() ? snap.data() : null;
    renderAttendanceSection();
  }, err=>console.error("record sub error:",err));
}

/* ── Subscribe employee doc — استماع لحظي لحالة الموظف نفسه ──
   يغطي: تحويل لمحل آخر، تعطيل/حذف الحساب، تغيير الاسم/سعر الساعة/ساعات العمل.
   بدون هذا الاستماع، أي تغيير من shop.html أو index.html لا يظهر للموظف
   إلا بعد تسجيل خروج ودخول يدوي. */
function subscribeEmployee(){
  if(state.unsubEmployee){ state.unsubEmployee(); state.unsubEmployee=null; }
  // مسار التوكن (بدون حساب gate_accounts) — نستمع لوثيقة الموظف مباشرة فقط
  if(state.session?.type==="token"){
    const empRef = doc(db,"shops",state.employee.shopId,"employees",state.employee.id);
    state.unsubEmployee = onSnapshot(empRef, snap=>{
      handleEmployeeDocUpdate(snap.exists()?snap.data():null, null);
    }, err=>console.error("employee sub error:",err));
    return;
  }
  // مسار اسم المستخدم — نستمع لوثيقة الموظف + وثيقة الحساب (gate_accounts) معاً
  const empRef = doc(db,"shops",state.employee.shopId,"employees",state.employee.employeeId||state.employee.id);
  const accRef = state.employee.accId ? doc(db,"gate_accounts",state.employee.accId) : null;
  let lastEmpData = null, lastAccData = null;
  const reEval = ()=>handleEmployeeDocUpdate(lastEmpData, lastAccData);
  const unsubs = [];
  unsubs.push(onSnapshot(empRef, snap=>{ lastEmpData = snap.exists()?snap.data():{ __missing:true }; reEval(); }, err=>console.error("employee sub error:",err)));
  if(accRef){
    unsubs.push(onSnapshot(accRef, snap=>{ lastAccData = snap.exists()?snap.data():{ __missing:true }; reEval(); }, err=>console.error("account sub error:",err)));
  }
  state.unsubEmployee = ()=>unsubs.forEach(fn=>{ try{ fn(); }catch{} });
}

// يُستدعى في كل مرة تتغيّر فيها وثيقة الموظف أو حسابه لحظياً
function handleEmployeeDocUpdate(empData, accData){
  if(!state.employee) return; // المستخدم سجّل خروج بالفعل

  // الحساب أُلغي أو عُطّل
  if(accData?.__missing || accData?.disabled){
    toast("تم إلغاء تفعيل حسابك — تواصل مع الإدارة","error",6000);
    forceLogout();
    return;
  }
  // الموظف محذوف أو وثيقته اختفت (مثلاً بعد إكمال تحويل قديم الشكل)
  if(empData?.__missing || empData?.deleted){
    toast("تم إلغاء تفعيل حسابك — تواصل مع الإدارة","error",6000);
    forceLogout();
    return;
  }
  if(!empData) return;

  const prevShopId = state.employee.shopId;
  const prevShopName = state.employee.shopName;

  // اكتشاف التحويل بين المحلات لحظياً
  const newShopId = empData.shopId || prevShopId;
  if(newShopId !== prevShopId){
    // تحديث بيانات المحل الجديد ثم إشعار الموظف وإعادة الاشتراك في كل المصادر التابعة للمحل
    getDoc(doc(db,"shops",newShopId)).then(shopSnap=>{
      const shopData = shopSnap.exists()?shopSnap.data():{};
      state.employee = {
        ...state.employee,
        shopId: newShopId,
        shopName: shopData.name || newShopId,
        normalHours: shopData.settings?.normalHours || 8,
        name: empData.name || state.employee.name,
        status: empData.status || "active",
      };
      toast(`تم تحويلك من «${prevShopName}» إلى «${state.employee.shopName}» ✅`,"info",6500);
      subscribeRecord(state.todayISO);
      subscribeEmployee(); // إعادة الاشتراك على المسار الجديد لمنع تسريب استماعات قديمة
      loadMonthRecords();
      loadMyRequests();
      if(document.getElementById("mainContent")) renderLayout();
    });
    return;
  }

  // تحديثات عادية (اسم، سعر ساعة، ساعات عمل) — لا تتطلب إعادة اشتراك
  const nameChanged = empData.name && empData.name!==state.employee.name;
  const hoursChanged = empData.normalHours && empData.normalHours!==state.employee.normalHours;
  if(nameChanged || hoursChanged){
    state.employee = { ...state.employee, name: empData.name||state.employee.name };
    if(document.getElementById("mainContent")) renderLayout();
  }
}

function forceLogout(){
  if(state.unsubRecord){ state.unsubRecord(); state.unsubRecord=null; }
  if(state.unsubEmployee){ state.unsubEmployee(); state.unsubEmployee=null; }
  const wasTokenSession = state.session?.type==="token";
  clearSession();
  if(wasTokenSession){
    const cleanUrl=location.pathname+location.hash;
    history.replaceState(null,"",cleanUrl);
  }
  renderLoginScreen();
}

/* ── Load month records ── */
async function loadMonthRecords(){
  const now=new Date(); const y=now.getFullYear(), m=now.getMonth()+1;
  const from=`${y}-${String(m).padStart(2,"0")}-01`;
  const lastDay=new Date(y,m,0).getDate();
  const to=`${y}-${String(m).padStart(2,"0")}-${String(lastDay).padStart(2,"0")}`;
  const dates=[]; let d=new Date(from+"T12:00:00"); const toDate=new Date(to+"T12:00:00");
  while(d<=toDate){ dates.push(new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  const results = await Promise.all(dates.map(async date=>{
    const docId=attendanceDocId(state.employee.shopId,date);
    try{
      const snap=await getDoc(doc(db,"attendance",docId,"records",state.employee.id));
      if(snap.exists()&&(snap.data().checkIn||snap.data().onVacation)) return {date,...snap.data()};
      return null;
    }catch{ return null; }
  }));
  state.monthRecords=results.filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date));
  if(state.activeTab==="history") renderHistorySection();
}

/* ── Load my requests ── */
async function loadMyRequests(){
  try{
    const q=query(
      collection(db,"correction_requests"),
      where("employeeId","==",state.employee.id),
      where("shopId","==",state.employee.shopId),
      orderBy("submittedAt","desc"),
      limit(50)
    );
    const snap=await getDocs(q);
    state.myRequests=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){
    console.error("loadMyRequests error:",e);
    // Try without orderBy if index missing
    try{
      const q2=query(collection(db,"correction_requests"),where("employeeId","==",state.employee.id),where("shopId","==",state.employee.shopId),limit(50));
      const snap2=await getDocs(q2);
      state.myRequests=snap2.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
        const at=a.submittedAt?.toMillis?.()??0; const bt=b.submittedAt?.toMillis?.()??0;
        return bt-at;
      });
    }catch(e2){ console.error(e2); state.myRequests=[]; }
  }
  if(state.activeTab==="requests") renderRequestsSection();
}

/* ── Load my transfer requests (طلبات التحويل بين المحلات) ── */
async function loadMyTransferRequests(){
  try{
    const q=query(
      collection(db,"transfer_requests"),
      where("employeeId","==",state.employee.id),
      orderBy("requestedAt","desc"),
      limit(20)
    );
    const snap=await getDocs(q);
    state.myTransferRequests=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){
    console.error("loadMyTransferRequests error:",e);
    try{
      const q2=query(collection(db,"transfer_requests"),where("employeeId","==",state.employee.id),limit(20));
      const snap2=await getDocs(q2);
      state.myTransferRequests=snap2.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
        const at=a.requestedAt?.toMillis?.()??0; const bt=b.requestedAt?.toMillis?.()??0;
        return bt-at;
      });
    }catch(e2){ console.error(e2); state.myTransferRequests=[]; }
  }
  if(state.activeTab==="requests") renderRequestsSection();
}

/* ── LOGIN SCREEN ── */
function renderLoginScreen(errorMsg=""){
  document.getElementById("app").innerHTML=`
    <div class="login-wrap">
      <div class="glass-card login-card">
        <div class="login-logo">
          <div class="gr">GR</div>
          <div class="title">دوام الموظفين</div>
          <div class="sub">بوابة الموظف — سجّل دخولك</div>
        </div>
        <div class="field">
          <label for="empUsername">اسم المستخدم</label>
          <input type="text" id="empUsername" class="input input-mono" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="field">
          <label for="empPassword">كلمة المرور</label>
          <input type="password" id="empPassword" class="input input-mono" autocomplete="current-password">
          ${errorMsg ? `<div class="field-error show">${escapeHtml(errorMsg)}</div>` : ""}
        </div>
        <button class="btn btn-primary btn-block" id="empLoginBtn">دخول</button>
        <p style="font-size:0.75rem;color:var(--text-secondary);text-align:center;margin-top:16px;">
          للحصول على بيانات الدخول، تواصل مع مسؤول النظام
        </p>
      </div>
    </div>`;

  const doLogin = async () => {
    const username = document.getElementById("empUsername").value.trim();
    const password = document.getElementById("empPassword").value;
    if(!username||!password){ renderLoginScreen("أدخل اسم المستخدم وكلمة المرور"); return; }
    const btn=document.getElementById("empLoginBtn");
    btn.disabled=true; btn.innerHTML=`<span class="spinner"></span>`;
    try{
      await authReady;
      // Load account from gate_accounts
      const q=query(collection(db,"gate_accounts"),where("username","==",username),limit(1));
      const snap=await getDocs(q);
      if(snap.empty){ renderLoginScreen("اسم المستخدم أو كلمة المرور غير صحيحة"); return; }
      const accDoc=snap.docs[0]; const accData=accDoc.data(); const accId=accDoc.id;
      if(accData.disabled){ renderLoginScreen("هذا الحساب معطّل — تواصل مع الإدارة"); return; }
      if(!accData.passwordHash){ renderLoginScreen("لم يتم تعيين كلمة مرور لهذا الحساب — تواصل مع الإدارة"); return; }
      const valid=await verifyPassword(password,accData.passwordHash,accData.passwordSalt,accData.passwordIterations||150000);
      if(!valid){ renderLoginScreen("اسم المستخدم أو كلمة المرور غير صحيحة"); return; }
      // Load employee data
      const empInfo=await loadEmployeeByUsername(username);
      if(!empInfo||empInfo.disabled){ renderLoginScreen("هذا الحساب معطّل — تواصل مع الإدارة"); return; }
      if(empInfo.deleted){ renderLoginScreen("هذا الحساب محذوف — تواصل مع الإدارة"); return; }
      // Save session
      const session={ username, accId, shopId: empInfo.shopId, employeeId: empInfo.id, lastActivity: Date.now() };
      saveSession(session);
      state.session=session;
      state.employee=empInfo;
      await enterPortal();
    }catch(err){
      console.error(err);
      renderLoginScreen("حدث خطأ أثناء تسجيل الدخول — حاول مرة أخرى");
    }
  };

  document.getElementById("empLoginBtn").addEventListener("click", doLogin);
  document.getElementById("empPassword").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
  document.getElementById("empUsername").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("empPassword").focus(); });
}

}

/* ── HISTORY TAB ── */

    el.innerHTML=`<div class="glass-card section-card"><div class="section-head"><div class="section-title"><span class="dot"></span> سجل شهر ${monthLabel}</div></div><div class="empty-state"><div class="icon">📅</div>لا يوجد سجلات هذا الشهر</div></div>`;

/* ── REQUESTS TAB ── */
function renderRequestsSection(){
  const el=document.getElementById("tabContent");
  if(!el||state.activeTab!=="requests") return;

  const approved=state.myRequests.filter(r=>r.status==="approved");
  const rejected=state.myRequests.filter(r=>r.status==="rejected");
  const pending=state.myRequests.filter(r=>r.status==="pending"||r.status==="reviewed");

  function formatDate(req,field){
    const ts=req[field];
    if(!ts) return "—";
    try{ const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString("ar-EG",{year:"numeric",month:"short",day:"numeric"}); }
    catch{ return "—"; }
  }

  function card(req){
    const colors={approved:"var(--accent-green)",rejected:"var(--accent-red)",pending:"var(--accent-orange)",reviewed:"var(--accent-orange)"};
    const labels={approved:"✅ مقبول",rejected:"❌ مرفوض",pending:"⏳ بانتظار المراجعة",reviewed:"🔍 تحت المراجعة"};
    const badgeCls={approved:"badge-green",rejected:"badge-red",pending:"badge-orange",reviewed:"badge-cyan"};
    const st=req.status||"pending";
    return `
    <div class="request-status-item" style="border-right:3px solid ${colors[st]||"gray"};padding-right:12px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
        <div>
          <div class="req-date">${req.date} — ${dayNameAr(req.date)}</div>
          <div style="font-size:0.75rem;color:var(--text-secondary);">تاريخ الطلب: ${formatDate(req,"submittedAt")}</div>
        </div>
        <span class="badge ${badgeCls[st]||"badge-orange"}">${labels[st]||"⏳ معلّق"}</span>
      </div>
      <div class="req-reason">السبب: ${escapeHtml(req.reason||"—")}</div>
      ${req.requestedCheckIn?`<div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px;">الوقت المطلوب: <span class="mono">${escapeHtml(req.requestedCheckIn)}</span> ← <span class="mono">${escapeHtml(req.requestedCheckOut||"—")}</span></div>`:""}
      ${req.adminNote?`<div class="req-admin-note">💬 رد الإدارة: ${escapeHtml(req.adminNote)}</div>`:(st==="approved"||st==="rejected")?`<div style="font-size:0.78rem;color:var(--text-secondary);margin-top:6px;">لا يوجد رد من الإدارة</div>`:""}
    </div>`;
  }

  /* ── بطاقة طلب تحويل واحدة — تعرض مرحلتي الموافقة (المحل ثم الإدارة) ── */
  function transferCard(req){
    const stageLabels={
      pending_shop:{label:"⏳ بانتظار موافقة المحل",cls:"badge-orange",color:"var(--accent-orange)"},
      pending_admin:{label:"⏳ بانتظار موافقة الإدارة",cls:"badge-cyan",color:"var(--accent-cyan)"},
      completed:{label:"✅ تم التحويل",cls:"badge-green",color:"var(--accent-green)"},
      rejected_shop:{label:"❌ رفضه المحل",cls:"badge-red",color:"var(--accent-red)"},
      rejected_admin:{label:"❌ رفضته الإدارة",cls:"badge-red",color:"var(--accent-red)"},
    };
    const st=stageLabels[req.status]||stageLabels.pending_shop;
    return `
    <div class="request-status-item" style="border-right:3px solid ${st.color};padding-right:12px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
        <div>
          <div class="req-date">↔ طلب تحويل إلى «${escapeHtml(req.toShopName||req.toShopId||"—")}»</div>
          <div style="font-size:0.75rem;color:var(--text-secondary);">تاريخ الطلب: ${formatDate(req,"requestedAt")}</div>
        </div>
        <span class="badge ${st.cls}">${st.label}</span>
      </div>
      ${req.reason&&req.reason!=="—"?`<div class="req-reason">السبب: ${escapeHtml(req.reason)}</div>`:""}
      <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <span class="badge ${req.shopApproval==="approved"?"badge-green":req.shopApproval==="rejected"?"badge-red":"badge-orange"}" style="font-size:0.68rem;">🏪 المحل: ${req.shopApproval==="approved"?"وافق":req.shopApproval==="rejected"?"رفض":"بانتظار"}</span>
        <span class="badge ${req.adminApproval==="approved"?"badge-green":req.adminApproval==="rejected"?"badge-red":"badge-orange"}" style="font-size:0.68rem;">🏢 الإدارة: ${req.adminApproval==="approved"?"وافقت":req.adminApproval==="rejected"?"رفضت":"بانتظار"}</span>
      </div>
      ${req.shopNote?`<div class="req-admin-note">💬 ملاحظة المحل: ${escapeHtml(req.shopNote)}</div>`:""}
      ${req.adminNote?`<div class="req-admin-note">💬 ملاحظة الإدارة: ${escapeHtml(req.adminNote)}</div>`:""}
    </div>`;
  }

  const hasOpenTransfer = state.myTransferRequests.some(r=>r.status==="pending_shop"||r.status==="pending_admin");

  el.innerHTML=`
    <div class="glass-card section-card">
      <div class="section-head">
        <div class="section-title"><span class="dot"></span> طلب تحويل لمحل آخر</div>
      </div>
      <p class="text-secondary" style="font-size:0.84rem;margin-bottom:14px;">يحتاج موافقة المحل الحالي ثم الإدارة قبل التنفيذ.</p>
      ${state.myTransferRequests.length>0?state.myTransferRequests.map(transferCard).join(""):`<div class="empty-state" style="padding:18px 16px;"><div class="icon">↔</div>لا يوجد طلبات تحويل سابقة</div>`}
      <button class="btn btn-ghost btn-sm" id="openTransferReqBtn" ${hasOpenTransfer?"disabled":""} style="margin-top:8px;">
        ${hasOpenTransfer?"لديك طلب تحويل قيد المراجعة":"➕ طلب تحويل جديد"}
      </button>
    </div>
    <div class="glass-card section-card">
      <div class="section-head">
        <div class="section-title"><span class="dot"></span> طلباتي — تعديل الحضور</div>
        <button class="btn btn-ghost btn-sm" id="refreshRequestsBtn">🔄 تحديث</button>
      </div>
      ${state.myRequests.length===0?`<div class="empty-state"><div class="icon">📝</div>لا يوجد طلبات سابقة</div>`:`
        ${pending.length>0?`<div style="margin-bottom:16px;"><div style="font-size:0.8rem;font-weight:700;color:var(--accent-orange);margin-bottom:8px;">⏳ بانتظار المراجعة (${pending.length})</div>${pending.map(card).join("")}</div>`:""}
        ${approved.length>0?`<div style="margin-bottom:16px;"><div style="font-size:0.8rem;font-weight:700;color:var(--accent-green);margin-bottom:8px;">✅ الطلبات المقبولة (${approved.length})</div>${approved.map(card).join("")}</div>`:""}
        ${rejected.length>0?`<div style="margin-bottom:16px;"><div style="font-size:0.8rem;font-weight:700;color:var(--accent-red);margin-bottom:8px;">❌ الطلبات المرفوضة (${rejected.length})</div>${rejected.map(card).join("")}</div>`:""}
      `}
    </div>`;

  document.getElementById("refreshRequestsBtn")?.addEventListener("click",()=>loadMyRequests());
  document.getElementById("openTransferReqBtn")?.addEventListener("click",()=>{ if(!hasOpenTransfer) openTransferRequestModal(); });
}

/* ── HANDLE CHECK-IN ── */
async function handleCheckIn(){
  const btn=document.getElementById("checkInBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span>`;
  try{
    await authReady;
    const date=state.selectedDate; const isDateMismatch=date!==state.todayISO;
    const docIdStr=attendanceDocId(state.employee.shopId,date);
    const recRef=doc(db,"attendance",docIdStr,"records",state.employee.id);
    await setDoc(recRef,{
      checkIn:serverTimestamp(), date, shopId:state.employee.shopId,
      employeeId:state.employee.id, employeeName:state.employee.name,
      submittedByEmployee:true, dateMatchWarning:isDateMismatch,
      actualSubmissionDate:todayISO(), uid,
    },{merge:true});
    await addDoc(collection(db,"audit_logs"),{
      action:"employee_self_checkin",employeeId:state.employee.id,shopId:state.employee.shopId,
      date,dateMatchWarning:isDateMismatch,submittedByEmployee:true,
      timestamp:serverTimestamp(),uid,source:"employee_portal",gateUser:null,
    });
    toast(isDateMismatch?"تم تسجيل الحضور ✓ (تنبيه: على تاريخ مختلف)":"تم تسجيل الحضور ✓","success");
  }catch(err){
    console.error(err); toast("فشل تسجيل الحضور — حاول مرة أخرى","error");
    btn.disabled=false; btn.innerHTML=`<span class="icon">🟢</span>تسجيل الحضور`;
  }
}

/* ── HANDLE CHECK-OUT ── */
async function handleCheckOut(){
  const btn=document.getElementById("checkOutBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span>`;
  try{
    await authReady;
    const date=state.selectedDate; const isDateMismatch=date!==state.todayISO;
    const docIdStr=attendanceDocId(state.employee.shopId,date);
    const recRef=doc(db,"attendance",docIdStr,"records",state.employee.id);
    await setDoc(recRef,{checkOut:serverTimestamp(),dateMatchWarning:isDateMismatch||state.record?.dateMatchWarning||false},{merge:true});
    const snap=await getDoc(recRef); const rec=snap.data();
    if(rec?.checkIn){
      const {extra}=calcHours(rec.checkIn,new Date(),state.employee.normalHours||8);
      if(extra>0){
        await setDoc(recRef,{approvalStatus:"pending",reason:""},{merge:true});
        toast("تم تسجيل الانصراف — الساعات الإضافية بانتظار اعتماد الإدارة","info",5000);
      }else{ toast("تم تسجيل الانصراف ✓","success"); }
    }else{ toast("تم تسجيل الانصراف ✓","success"); }
    await addDoc(collection(db,"audit_logs"),{
      action:"employee_self_checkout",employeeId:state.employee.id,shopId:state.employee.shopId,
      date,dateMatchWarning:isDateMismatch,submittedByEmployee:true,
      timestamp:serverTimestamp(),uid,source:"employee_portal",gateUser:null,
    });
  }catch(err){
    console.error(err); toast("فشل تسجيل الانصراف — حاول مرة أخرى","error");
    btn.disabled=false; btn.innerHTML=`<span class="icon">🟠</span>تسجيل الانصراف`;
  }
}

/* ── CORRECTION MODAL ── */
function openCorrectionModal(){
  const rec=state.record; const date=state.selectedDate;
  showModal(`
    <h2>طلب تعديل — ${date}</h2>
    <p class="text-secondary" style="margin-bottom:16px;font-size:0.84rem;">أرسل طلبك للإدارة. الإدارة هي من تعتمد التعديل.</p>
    <div class="field">
      <label>سبب طلب التعديل <span style="color:var(--accent-red)">*</span></label>
      <textarea id="corrReason" class="input" placeholder="اكتب سبب طلب التعديل بوضوح..." rows="3" style="resize:vertical;"></textarea>
      <div class="field-error" id="corrReasonError">الرجاء كتابة سبب الطلب</div>
    </div>
    <div class="field">
      <label>وقت الحضور الصحيح المطلوب</label>
      <input type="time" id="corrCheckIn" class="input input-mono">
    </div>
    <div class="field">
      <label>وقت الانصراف الصحيح المطلوب</label>
      <input type="time" id="corrCheckOut" class="input input-mono">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelCorrectionBtn">إلغاء</button>
      <button class="btn btn-primary" id="submitCorrectionBtn">إرسال الطلب</button>
    </div>`);
  document.getElementById("cancelCorrectionBtn").addEventListener("click",closeModal);
  document.getElementById("submitCorrectionBtn").addEventListener("click",submitCorrectionRequest);
}

async function submitCorrectionRequest(){
  const reason=document.getElementById("corrReason").value.trim();
  if(!reason){ document.getElementById("corrReasonError").classList.add("show"); return; }
  const corrCheckIn=document.getElementById("corrCheckIn").value.trim();
  const corrCheckOut=document.getElementById("corrCheckOut").value.trim();
  const btn=document.getElementById("submitCorrectionBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span>`;
  try{
    await authReady;
    await addDoc(collection(db,"correction_requests"),{
      employeeId:state.employee.id, employeeName:state.employee.name,
      shopId:state.employee.shopId, tenantId:state.employee.shopId, date:state.selectedDate,
      reason, requestedCheckIn:corrCheckIn||null, requestedCheckOut:corrCheckOut||null,
      status:"pending", submittedAt:serverTimestamp(), submittedByEmployee:true, type:"employee", uid,
    });
    toast("تم إرسال الطلب — ستحصل على رد من الإدارة","success");
    closeModal();
    loadMyRequests();
  }catch(err){
    console.error(err); toast("فشل إرسال الطلب — حاول مرة أخرى","error");
    btn.disabled=false; btn.textContent="إرسال الطلب";
  }
}

/* ── TRANSFER REQUEST MODAL (موظف يطلب تحويل لمحل آخر) ──
   مرحلتا موافقة: المحل الحالي أولاً (shopApproval) ثم الإدارة (adminApproval).
   لا تنفيذ فعلي لنقل بيانات الموظف إلا بعد موافقة الطرفين — ينفّذه index.html
   بنفس آلية approveTransfer الحالية المستخدمة للتحويلات التي يبدأها المحل. */
async function openTransferRequestModal(){
  let allShops=[];
  try{
    await authReady;
    const snap=await getDocs(collection(db,"shops"));
    allShops=snap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.id!==state.employee.shopId && s.status!=="archived");
  }catch(e){ console.error(e); toast("تعذّر جلب قائمة المحلات","error"); return; }

  if(allShops.length===0){ toast("لا يوجد محلات أخرى متاحة للتحويل","warn"); return; }

  showModal(`
    <h2>↔ طلب تحويل لمحل آخر</h2>
    <p class="text-secondary" style="margin-bottom:14px;font-size:0.84rem;">
      سيُرسل طلبك أولاً لموافقة محلك الحالي «${escapeHtml(state.employee.shopName)}»، ثم لموافقة الإدارة النهائية.
    </p>
    <div class="field">
      <label for="empTransferShop">المحل المطلوب الانتقال إليه</label>
      <select id="empTransferShop" class="input">
        ${allShops.map(s=>`<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label for="empTransferReason">سبب طلب التحويل <span style="color:var(--accent-red)">*</span></label>
      <textarea id="empTransferReason" class="input" rows="3" placeholder="اكتب سبب رغبتك في التحويل..."></textarea>
      <div class="field-error" id="empTransferReasonError">الرجاء كتابة سبب الطلب</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelEmpTransfer">إلغاء</button>
      <button class="btn btn-primary" id="submitEmpTransferBtn">إرسال الطلب</button>
    </div>`);
  document.getElementById("cancelEmpTransfer").addEventListener("click",closeModal);
  document.getElementById("submitEmpTransferBtn").addEventListener("click",()=>submitTransferRequest(allShops));
}

async function submitTransferRequest(allShops){
  const targetShopId=document.getElementById("empTransferShop").value;
  const reason=document.getElementById("empTransferReason").value.trim();
  if(!reason){ document.getElementById("empTransferReasonError").classList.add("show"); return; }
  const targetShop=allShops.find(s=>s.id===targetShopId);
  const btn=document.getElementById("submitEmpTransferBtn");
  btn.disabled=true; btn.innerHTML=`<span class="spinner"></span>`;
  try{
    await authReady;
    await addDoc(collection(db,"transfer_requests"),{
      employeeId:state.employee.id, employeeName:state.employee.name,
      fromShopId:state.employee.shopId, fromShopName:state.employee.shopName,
      toShopId:targetShopId, toShopName:targetShop?.name||targetShopId,
      reason, status:"pending_shop",
      shopApproval:"pending", adminApproval:"pending",
      type:"employee_initiated",
      requestedAt:serverTimestamp(), requestedBy:state.employee.name, uid,
    });
    await addDoc(collection(db,"audit_logs"),{
      action:"employee_transfer_requested", employeeId:state.employee.id,
      shopId:state.employee.shopId, fromShopId:state.employee.shopId, toShopId:targetShopId,
      timestamp:serverTimestamp(), uid, source:"employee_portal", gateUser:null,
    });
    toast("تم إرسال طلب التحويل — بانتظار موافقة محلك الحالي","success",5500);
    closeModal();
    loadMyTransferRequests();
  }catch(err){
    console.error(err); toast("فشل إرسال طلب التحويل — حاول مرة أخرى","error");
    btn.disabled=false; btn.textContent="إرسال الطلب";
  }
}

/* ── INIT ── */
async function init(){
  await authReady;
  state.todayISO=todayISO();
  state.selectedDate=state.todayISO;

  // ── مسار الرابط الشخصي (?token=...) — يُولَّد من shop.html عند إضافة موظف ──
  const urlToken=new URLSearchParams(location.search).get("token");
  if(urlToken){
    try{
      const empInfo=await loadEmployeeByToken(urlToken);
      if(empInfo&&!empInfo.disabled&&!empInfo.deleted){
        state.session={type:"token",token:urlToken};
        state.employee=empInfo;
        saveSession(state.session);
        touchSession();
        await enterPortal();
        return;
      }else{
        toast("الرابط غير صالح أو تم إلغاؤه — تواصل مع إدارة المحل","error");
      }
    }catch(e){ console.error("Token login error:",e); toast("تعذّر فتح الرابط — تحقق من الاتصال بالإنترنت","error"); }
  }

  // Try restoring session
  const saved=loadSession();
  if(saved){
    try{
      if(saved.type==="token"&&saved.token){
        // استعادة جلسة الرابط الشخصي
        const empInfo=await loadEmployeeByToken(saved.token);
        if(empInfo&&!empInfo.disabled&&!empInfo.deleted){
          state.session=saved;
          state.employee=empInfo;
          touchSession();
          await enterPortal();
          return;
        }
      }else{
        // Verify account still valid
        const accSnap=await getDoc(doc(db,"gate_accounts",saved.accId));
        if(accSnap.exists()&&!accSnap.data().disabled){
          const empInfo=await loadEmployeeByUsername(accSnap.data().username);
          if(empInfo&&!empInfo.disabled&&!empInfo.deleted){
            state.session=saved;
            state.employee=empInfo;
            touchSession();
            await enterPortal();
            return;
          }
        }
      }
    }catch(e){ console.error("Session restore error:",e); }
    clearSession();
  }

  renderLoginScreen();
}

init();
</script>
