/* ============================================================
   HOURS CALCULATION — supports multi-period (البند 13)
   rec can have: checkIn/checkOut (period 1) + periods[] (additional periods)
   ============================================================ */
function calcHours(checkIn, checkOut, normalHoursOverride){
  // Simple 2-arg call (checkIn, checkOut) — single period
  if(!checkIn || !checkOut) return { total: 0, base: 0, extra: 0 };
  const nh = (normalHoursOverride !== undefined ? normalHoursOverride : state.normalHours) || 8;
  const inD = checkIn instanceof Date ? checkIn : checkIn.toDate();
  const outD = checkOut instanceof Date ? checkOut : checkOut.toDate();
  let diffMs = outD - inD;
  if(diffMs < 0) diffMs = 0;
  const total = Math.round((diffMs / 3600000) * 100) / 100;
  const base = Math.min(total, nh);
  const extra = Math.max(total - nh, 0);
  return { total, base, extra: Math.round(extra*100)/100 };
}

/* البند 13: احتساب مجموع ساعات جميع الفترات من record واحد */
function calcTotalHoursFromRecord(rec, normalHoursOverride){
  const nh = (normalHoursOverride !== undefined ? normalHoursOverride : state.normalHours) || 8;
  let totalMs = 0;

  // Period 1: checkIn/checkOut
  if(rec?.checkIn && rec?.checkOut){
    const inD = rec.checkIn instanceof Date ? rec.checkIn : rec.checkIn.toDate?.() || new Date(rec.checkIn);
    const outD = rec.checkOut instanceof Date ? rec.checkOut : rec.checkOut.toDate?.() || new Date(rec.checkOut);
    const ms = outD - inD;
    if(ms > 0) totalMs += ms;
  }

  // Additional periods
  if(Array.isArray(rec?.periods)){
    rec.periods.forEach(p => {
      if(!p.checkIn || !p.checkOut) return;
      const inD = p.checkIn instanceof Date ? p.checkIn : p.checkIn.toDate?.() || new Date(p.checkIn);
      const outD = p.checkOut instanceof Date ? p.checkOut : p.checkOut.toDate?.() || new Date(p.checkOut);
      const ms = outD - inD;
      if(ms > 0) totalMs += ms;
    });
  }

  const total = Math.round((totalMs / 3600000) * 100) / 100;
  const base  = Math.min(total, nh);
  const extra = Math.max(total - nh, 0);
  return { total, base, extra: Math.round(extra*100)/100 };
}

/* البند 13: عدد الفترات في Record */
function countPeriods(rec){
  let count = 0;
  if(rec?.checkIn) count++;
  if(Array.isArray(rec?.periods)) count += rec.periods.length;
  return count;
}

/* البند 13: اسم الفترة بالعربية */
function periodLabel(idx){
  const labels = ["الأولى","الثانية","الثالثة","الرابعة","الخامسة"];
  return `الفترة ${labels[idx] || `${idx+1}`}`;
}
/* Converts a decimal hour count (e.g. 1.25) into a clear "X ساعة و Y دقيقة"
   string, so non-technical users don't have to mentally convert decimals.
   Underlying calculations everywhere else still use the decimal value —
   this is purely a display formatter, layered on top without changing math. */
function formatHoursMinutes(decimalHours){
  if(!decimalHours || decimalHours <= 0) return "0 دقيقة";
  const totalMinutes = Math.round(decimalHours * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  if(h === 0) return `${m} دقيقة`;
  if(m === 0) return `${h} ساعة`;
  return `${h} ساعة و ${m} دقيقة`;
}

    const rec = state.attendanceRecords[emp.id];

    // البند 13: احتساب مجموع كل الفترات
    const { total, base, extra } = calcTotalHoursFromRecord(rec);
    const periodsCount = countPeriods(rec);

    // Determine current state for action buttons
    const hasOpenPeriod = rec?.checkIn && !rec?.checkOut;  // period 1 open
    const period1Done   = rec?.checkIn && rec?.checkOut;
    const lastAddlOpen  = Array.isArray(rec?.periods) && rec.periods.length > 0
      && rec.periods[rec.periods.length-1].checkIn

    else if(rec?.approvalStatus === "approved" && extra > 0) approvalBadge = `<span class="badge badge-green">ساعات إضافية معتمدة</span>`;

    if(onVacation){
      return `

            <div class="time-chip ${pIn?'':'empty'}" title="${periodLabel(i+1)}">
              <label>${periodLabel(i+1)} حضور</label><span class="val mono">${pIn || "—"}</span>

        <div class="emp-name">${escapeHtml(emp.name)} ${emp.status==='pending'?'<span class="badge badge-orange">جديد</span>':''}</div>
        ${approvalBadge}
        ${periodsCount > 1 ? `<span class="badge badge-cyan" style="font-size:0.72rem;">🔄 ${periodsCount} فترات</span>` : ""}
        ${rec?.note ? `<div class="text-secondary" style="font-size:0.78rem;">📝 ${escapeHtml(rec.note)}</div>` : ""}
      </div>
      <div class="emp-times">
        ${periodsHtml}
        ${total > 0 ? `<span class="hours-pill">${formatHoursMinutes(base)} أساسي</span>` : ""}
        ${extra > 0 ? `<span class="hours-pill extra">+${formatHoursMinutes(extra)} إضافي</span>` : ""}
      </div>
      <div class="emp-actions">
        ${!locked ? `
          ${!rec?.checkIn ? `<button class="btn btn-green btn-sm" data-checkin="${escapeHtml(emp.id)}">تسجيل حضور</button>` : ""}
          ${anyOpen ? `<button class="btn btn-orange btn-sm" data-checkout="${escapeHtml(emp.id)}">تسجيل انصراف</button>` : ""}
          ${period1Done && !lastAddlOpen ? `<button class="btn btn-cyan btn-sm" data-add-period="${escapeHtml(emp.id)}" title="إضافة فترة دخول/خروج جديدة">+ فترة جديدة</button>` : ""}
          ${rec?.checkIn ? `<button class="btn btn-ghost btn-sm" data-manual="${escapeHtml(emp.id)}">تعديل يدوي</button>` : ""}
          <button class="btn btn-ghost btn-sm" data-note="${escapeHtml(emp.id)}">${rec?.note ? '📝 الملاحظة' : '+ ملاحظة'}</button>
          ${!rec?.checkIn ? `<button class="btn btn-ghost btn-sm" data-mark-vacation="${escapeHtml(emp.id)}">🌴 إجازة</button>` : ""}
          ${!locked ? `<button class="btn btn-ghost btn-sm" data-transfer="${escapeHtml(emp.id)}" title="تحويل لمحل آخر">↔ تحويل</button>` : ""}
        ` : `<span class="text-secondary mono" style="font-size:0.8rem;">مقفول</span>`}
      </div>
    </div>`;
  }).join("");

  if(!locked){
    el.querySelectorAll("[data-checkin]").forEach(btn=>{
      btn.addEventListener("click", ()=>handleCheckIn(btn.dataset.checkin));
    });
    el.querySelectorAll("[data-checkout]").forEach(btn=>{
      btn.addEventListener("click", ()=>handleCheckOut(btn.dataset.checkout));
    });
    el.querySelectorAll("[data-add-period]").forEach(btn=>{
      btn.addEventListener("click", ()=>handleAddPeriod(btn.dataset.addPeriod)); // البند 13
    });
    el.querySelectorAll("[data-manual]").forEach(btn=>{
      btn.addEventListener("click", ()=>openManualEditModal(btn.dataset.manual));
    });
    el.querySelectorAll("[data-note]").forEach(btn=>{
      btn.addEventListener("click", ()=>openNoteModal(btn.dataset.note));
    });
    el.querySelectorAll("[data-mark-vacation]").forEach(btn=>{
      btn.addEventListener("click", ()=>confirmMarkVacation(btn.dataset.markVacation));
    });
    el.querySelectorAll("[data-cancel-vacation]").forEach(btn=>{
      btn.addEventListener("click", ()=>handleCancelVacation(btn.dataset.cancelVacation));
    });
    el.querySelectorAll("[data-transfer]").forEach(btn=>{
      btn.addEventListener("click", ()=>openTransferModal(btn.dataset.transfer)); // البند 14
    });
  }
}

async function saveAttendanceRecord(empId, data){
  const docId = attendanceDocId(state.selectedDate);
  const ref = doc(db, "attendance", docId, "records", empId);
  if(!state.online){
    pushOfflineQueue({ type: "attendance_update", attendanceDocId: docId, employeeId: empId, data });
    state.attendanceRecords[empId] = { ...state.attendanceRecords[empId], ...data };
    renderAttendanceList();
    toast("تم الحفظ محليًا — سيُزامَن عند عودة الاتصال", "warn");
    return;
  }
  try{
    await setDoc(ref, data, { merge: true });
  }catch(err){
    console.error("Save failed, queueing offline:", err);
    pushOfflineQueue({ type: "attendance_update", attendanceDocId: docId, employeeId: empId, data });
    toast("تعذّر الحفظ مباشرة — تم وضعه في قائمة الانتظار", "warn");
  }
}

async function handleCheckIn(empId){
  if(state.attendanceRecords[empId]?.onVacation){
    toast("هذا الموظف في إجازة اليوم — لا يمكن تسجيل حضور", "warn");
    return;
  }
  await saveAttendanceRecord(empId, {
    checkIn: state.online ? serverTimestamp() : new Date(),
    isNewEmployee: state.employees.find(e=>e.id===empId)?.status === "pending"
  });
  writeAuditLog("check_in", { empId, date: state.selectedDate });
  toast("تم تسجيل الحضور", "success");
}

async function handleCheckOut(empId){
  const rec = state.attendanceRecords[empId];

  // البند 13: هل الفترة المفتوحة هي period 1 أم إضافية؟
  const isAddlOpen = Array.isArray(rec?.periods) && rec.periods.length > 0
    && rec.periods[rec.periods.length-1].checkIn
    && !rec.periods[rec.periods.length-1].checkOut;

  const checkInTime = isAddlOpen
    ? (rec.periods[rec.periods.length-1].checkIn instanceof Date ? rec.periods[rec.periods.length-1].checkIn : rec.periods[rec.periods.length-1].checkIn.toDate?.() || new Date())
    : (rec?.checkIn ? (rec.checkIn instanceof Date ? rec.checkIn : rec.checkIn.toDate()) : new Date());
  const tentativeOut = new Date();
  const { extra } = calcHours(checkInTime, tentativeOut);

  if(extra > 0 && state.requireReason){
    openReasonModal(empId, tentativeOut, null, "check_out_with_overtime", isAddlOpen);
    return;
  }

  if(isAddlOpen){
    // Close the last additional period
    const updatedPeriods = [...(rec.periods||[])];
    updatedPeriods[updatedPeriods.length-1] = {
      ...updatedPeriods[updatedPeriods.length-1],
      checkOut: state.online ? serverTimestamp() : tentativeOut
    };
    await saveAttendanceRecord(empId, { periods: updatedPeriods });
  } else {
    await saveAttendanceRecord(empId, {
      checkOut: state.online ? serverTimestamp() : tentativeOut
    });
  }
  writeAuditLog("check_out", { empId, date: state.selectedDate });
  toast("تم تسجيل الانصراف ✓", "success");
}

async function openTransferModal(empId){

  const rec = state.attendanceRecords[empId];

  // جلب كل المحلات المتاحة عدا المحل الحالي

    const snap = await getDocs(collection(db,"shops"));
    allShops = snap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.id!==state.session.shopId);
  }catch(e){ toast("تعذّر جلب المحلات","error"); return; }

  if(allShops.length===0){
    toast("لا يوجد محلات أخرى لإجراء التحويل","warn");
    return;
  }

  showModal(`
    <h2>↔ تحويل موظف بين المحلات</h2>
    <p class="text-secondary" style="margin-bottom:14px;font-size:0.84rem;">
      الموظف: <strong>${escapeHtml(emp.name)}</strong><br>
      المحل الحالي: <strong>${escapeHtml(state.session.shopName||state.session.shopId)}</strong>
    </p>
    ${rec?.checkIn && !rec?.checkOut ? `
      <div class="glass-card" style="padding:10px 14px;border:1px solid var(--accent-orange);margin-bottom:14px;font-size:0.82rem;color:var(--accent-orange);">
        ⚠ الموظف لا يزال مسجّل دخول — سيتم تسجيل انصرافه أولاً قبل التحويل
      </div>` : ""}
    <div class="field">
      <label for="transferTargetShop">المحل المستهدف</label>
      <select id="transferTargetShop" class="input">
        ${allShops.map(s=>`<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label for="transferReason">سبب التحويل (اختياري)</label>
      <input type="text" id="transferReason" class="input" maxlength="200" placeholder="مثال: تغطية نقص موظفين...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelTransfer">إلغاء</button>
      <button class="btn btn-primary" id="confirmTransfer">تأكيد التحويل وإرسال للموافقة</button>
    </div>
  `);
  document.getElementById("cancelTransfer").addEventListener("click", closeModal);
  document.getElementById("confirmTransfer").addEventListener("click", async ()=>{
    const targetShopId = document.getElementById("transferTargetShop").value;
    const reason = document.getElementById("transferReason").value.trim();
    const targetShop = allShops.find(s=>s.id===targetShopId);
    const btn = document.getElementById("confirmTransfer");
    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span>`;
    try{
      // إذا الموظف مفتوح — تسجيل انصراف أولاً
      if(rec?.checkIn && !rec?.checkOut){
        await saveAttendanceRecord(empId,{ checkOut: state.online ? serverTimestamp() : new Date() });
        writeAuditLog("auto_checkout_before_transfer",{ empId, date: state.selectedDate });
      }
      // إنشاء طلب التحويل
      const transferRef = await addDoc(collection(db,"transfer_requests"),{
        employeeId: empId,
        employeeName: emp.name,
        fromShopId: state.session.shopId,
        fromShopName: state.session.shopName || state.session.shopId,
        toShopId: targetShopId,
        toShopName: targetShop?.name || targetShopId,
        reason: reason || "—",
        status: "pending",
        requestedAt: serverTimestamp(),
        requestedBy: window.__gateUsername || "manager",
        date: state.selectedDate,
      });
      writeAuditLog("transfer_requested",{
        empId, employeeName: emp.name,
        fromShopId: state.session.shopId, toShopId: targetShopId,
        transferId: transferRef.id
      });
      toast(`تم إرسال طلب تحويل ${emp.name} → ${targetShop?.name||targetShopId} للموافقة ✅`,"success");

      btn.disabled=false; btn.textContent="تأكيد التحويل";
    }
  });
}

function openReasonModal(empId, checkOutTime, checkInOverride, auditAction, isAddlOpen = false){
  showModal(`
    <h2>⚠ تجاوز الحد الطبيعي للساعات</h2>
    <p class="text-secondary" style="margin-bottom:14px;">هذا التسجيل يتضمن ساعات إضافية. يرجى توضيح السبب قبل الحفظ.</p>
    <form id="reasonForm">
      <div class="field">
        <label for="reasonText">بيان السبب *</label>
        <textarea id="reasonText" class="input reason-required" rows="3" required maxlength="300" placeholder="مثال: ضغط عمل، تغطية نقص موظفين..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelReason">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ وتسجيل الانصراف</button>
      </div>
    </form>
  `);
  document.getElementById("cancelReason").addEventListener("click", closeModal);
  document.getElementById("reasonForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const reason = document.getElementById("reasonText").value.trim();
    if(!reason) return;

    if(isAddlOpen){
      // البند 13: إغلاق آخر فترة إضافية مفتوحة
      const rec = state.attendanceRecords[empId];
      const updatedPeriods = [...(rec?.periods||[])];
      updatedPeriods[updatedPeriods.length-1] = {
        ...updatedPeriods[updatedPeriods.length-1],
        checkOut: state.online ? serverTimestamp() : checkOutTime,
      };
      await saveAttendanceRecord(empId, { periods: updatedPeriods, reason: sanitize(reason), approvalStatus: "pending" });
    } else {
      const updates = {
        checkOut: (state.online && !checkInOverride) ? serverTimestamp() : checkOutTime,
        reason: sanitize(reason),
        approvalStatus: "pending"
      };
      if(checkInOverride) updates.checkIn = checkInOverride;
      await saveAttendanceRecord(empId, updates);
    }
    writeAuditLog(auditAction || "check_out_with_overtime", { empId, date: state.selectedDate, reason });
    toast("تم تسجيل الانصراف — بانتظار اعتماد الساعات الإضافية", "success");
    closeModal();
  });
  setTimeout(()=>document.getElementById("reasonText")?.focus(), 50);
}

function openManualEditModal(empId){
  const rec = state.attendanceRecords[empId];
  const emp = state.employees.find(e=>e.id===empId);
  const inVal = rec?.checkIn ? toLocalTimeInput(rec.checkIn) : "";
  const outVal = rec?.checkOut ? toLocalTimeInput(rec.checkOut) : "";
  showModal(`
    <h2>تعديل يدوي — ${escapeHtml(emp.name)}</h2>
    <form id="manualForm">
      <div class="field">
        <label for="manualIn">وقت الحضور</label>
        <input type="time" id="manualIn" class="input input-mono" value="${inVal}">
      </div>
      <div class="field">
        <label for="manualOut">وقت الانصراف</label>
        <input type="time" id="manualOut" class="input input-mono" value="${outVal}">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelManual">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>
  `);
  document.getElementById("cancelManual").addEventListener("click", closeModal);
  document.getElementById("manualForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const inTime = document.getElementById("manualIn").value;
    const outTime = document.getElementById("manualOut").value;
    const updates = {};
    if(inTime) updates.checkIn = timeInputToDate(inTime, state.selectedDate);
    if(outTime) updates.checkOut = timeInputToDate(outTime, state.selectedDate);

    if(updates.checkIn && updates.checkOut){
      const { extra } = calcHours(updates.checkIn, updates.checkOut);
      if(extra > 0 && state.requireReason){
        closeModal();
        openReasonModal(empId, updates.checkOut, updates.checkIn, "manual_time_edit");
        return;
      }
    }

    await saveAttendanceRecord(empId, updates);
    writeAuditLog("manual_time_edit", {
      empId, date: state.selectedDate,
      oldValue: { checkIn: rec?.checkIn || null, checkOut: rec?.checkOut || null },
      newValue: updates
    });
    toast("تم حفظ التعديل اليدوي", "success");
    closeModal();
  });
}
function toLocalTimeInput(ts){
  const d = ts instanceof Date ? ts : ts.toDate();
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function timeInputToDate(timeStr, dateStr){
  const [h,m] = timeStr.split(":").map(Number);
  const d = new Date(dateStr + "T00:00:00");
  d.setHours(h, m, 0, 0);
  return d;
}

/* ============================================================
   FINISH DAY — lock + export Excel
   ============================================================ */
async function handleFinishDay(){
  if(getOfflineQueue().length > 0){
    toast("يوجد بيانات غير متزامنة — لا يمكن إنهاء اليوم الآن", "error");
    return;
  }
  const unfinished = state.employees.filter(emp=>{
    const rec = state.attendanceRecords[emp.id];
    // فحص الفترة الأولى
    const period1Open = rec?.checkIn && !rec?.checkOut;
    // فحص آخر فترة إضافية مفتوحة (periods[])
    const lastAddlOpen = Array.isArray(rec?.periods) && rec.periods.length > 0
      && rec.periods[rec.periods.length-1].checkIn
      && !rec.periods[rec.periods.length-1].checkOut;
    return period1Open || lastAddlOpen;
  });
  if(unfinished.length > 0){
    showModal(`
      <h2>⚠ يوجد موظفون لم يسجّلوا الانصراف</h2>
      <p class="text-secondary">${unfinished.map(e=>escapeHtml(e.name)).join("، ")} لم يسجّلوا وقت الانصراف بعد. تأكيد إنهاء اليوم سيتركهم بدون وقت انصراف مسجَّل.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelFinish">رجوع</button>
        <button type="button" class="btn btn-orange" id="forceFinish">إنهاء على أي حال</button>
      </div>
    `);
    document.getElementById("cancelFinish").addEventListener("click", closeModal);
    document.getElementById("forceFinish").addEventListener("click", ()=>{ closeModal(); doFinishDay(); });
    return;
  }
  doFinishDay();
}

async function doFinishDay(){
  const btn = document.getElementById("finishDayBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري تحضير ملف Excel...`;
  try{
    // Load the Excel library and lock the day in parallel — independent operations,
    // no reason to wait on one before starting the other.
    const docId = attendanceDocId(state.selectedDate);
    const [_, lockResult] = await Promise.all([
      loadSheetJS(),
      updateDoc(doc(db, "attendance", docId), {
        locked: true,
        lockedAt: serverTimestamp(),
        exportedAt: serverTimestamp()
      })
    ]);
    btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري إنشاء الملف...`;
    writeAuditLog("day_locked", { date: state.selectedDate });
    exportDayToExcel();
    toast("تم إنهاء اليوم وتصدير الملف", "success");
    // The day is now locked, so renderDayLockStatus() will normally replace this
    // button with a "locked" badge on the next snapshot update — but restore its
    // state explicitly too, in case that re-render is delayed or this exact
    // element persists for any reason. A button must never be left stuck spinning.
    if(document.body.contains(btn)){
      btn.disabled = false;
      btn.innerHTML = "✅ إنهاء اليوم وتصدير Excel";
    }
  }catch(err){
    console.error(err);
    toast("فشل إنهاء اليوم — حاول مرة أخرى", "error");
    if(document.body.contains(btn)){
      btn.disabled = false;
      btn.textContent = "✅ إنهاء اليوم وتصدير Excel";
    }
  }
}

function loadSheetJS(){
  if(window.XLSX) return Promise.resolve();
  if(window.__xlsxLoadingPromise) return window.__xlsxLoadingPromise;
  window.__xlsxLoadingPromise = new Promise((resolve, reject)=>{
    const script = document.createElement("script");
    script.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
    script.onload = () => resolve();

async function pbkdf2Hash(password, saltB64, iterations = 150000){
  const enc = new TextEncoder();
  const salt = saltB64 ? b64ToBytes(saltB64) : crypto.getRandomValues(new Uint8Array(16));
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, keyMaterial, 256);
  return { hash: bytesToB64(new Uint8Array(bits)), salt: bytesToB64(salt), iterations };
}
function bytesToB64(bytes){ let bin=""; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); }
function b64ToBytes(b64){ const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes; }
function constantTimeEqual(a,b){
  if(typeof a !== "string" || typeof b !== "string"){
    console.error("[constantTimeEqual] قيمة غير صالحة للمقارنة — a:", a, "(type:", typeof a, ") b:", b, "(type:", typeof b, ")");
    return false;
  }
  if(a.length!==b.length) return false;
  let diff=0; for(let i=0;i<a.length;i++) diff|=a.charCodeAt(i)^b.charCodeAt(i); return diff===0;
}
async function verifyPassword(password, storedHash, storedSalt, iterations){
  if(!storedHash || !storedSalt){
    console.error("[verifyPassword] storedHash أو storedSalt غير موجودين — storedHash:", storedHash, "storedSalt:", storedSalt);
    return false;
  }
  const result = await pbkdf2Hash(password, storedSalt, iterations);
  return constantTimeEqual(result.hash, storedHash);
}

async function createGateAccountForEmployee(empId, shopId, name){
  const arabicToLatin = {"ا":"a","ب":"b","ت":"t","ث":"th","ج":"j","ح":"h","خ":"kh","د":"d","ذ":"th","ر":"r","ز":"z","س":"s","ش":"sh","ص":"s","ض":"d","ط":"t","ظ":"z","ع":"a","غ":"gh","ف":"f","ق":"q","ك":"k","ل":"l","م":"m","ن":"n","ه":"h","و":"w","ي":"y","ة":"a","ى":"a"};

  const username = `${baseSlug}.${Math.random().toString(36).slice(2,6)}`;

  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
  const password = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b=>chars[b%chars.length]).join("");

  const { hash, salt, iterations } = await pbkdf2Hash(password);

  await setDoc(doc(db,"gate_accounts",`emp_acc_${empId}`),{
    username, shopId, employeeId: empId,
    passwordHash: hash, passwordSalt: salt, passwordIterations: iterations,
    role: "employee", disabled: false,
    createdAt: serverTimestamp(), createdBy: window.__gateUsername||"admin",
  });

  // ملاحظة إصلاح جذري: هذا المستند كان يُكتب سابقًا بدون الحقلين 'token' و 'tenantId'،
  // فترفضه قاعدة Firestore الأمنية لـ employees_by_token (تتطلب hasAll(['token','employeeId','shopId','tenantId']))
  // فيفشل setDoc بصمت بـ permission-denied ويوقف كامل عملية إنشاء الموظف عبر هذا المسار.
  // الإصلاح: توليد token فعلي وإضافة tenantId، بنفس البنية المستخدمة بنجاح في مسار shop.html،
  // فيصبح هذا الحساب أيضًا قابلًا لتسجيل الدخول عبر رابط شخصي (token) إضافة إلى username/password.
  const token = bytesToB64(crypto.getRandomValues(new Uint8Array(24))).replace(/[+/=]/g,"").slice(0,32);

    createdAt: serverTimestamp(), createdViaUsername: username,
  });

  return { username, password, token };
}

function calcHours(checkIn, checkOut, normalHours = DEFAULT_NORMAL_HOURS){
  if(!checkIn || !checkOut) return { total: 0, base: 0, extra: 0 };
  const inD = checkIn instanceof Date ? checkIn : checkIn.toDate();
  const outD = checkOut instanceof Date ? checkOut : checkOut.toDate();
  let diffMs = outD - inD;
  if(diffMs < 0) diffMs = 0;
  const total = Math.round((diffMs / 3600000) * 100) / 100;
  const base = Math.min(total, normalHours);
  const extra = Math.max(total - normalHours, 0);
  return { total, base, extra: Math.round(extra*100)/100 };
}

/* البند 13: احتساب مجموع ساعات جميع الفترات — admin module copy */
function calcTotalHoursFromRecord(rec, normalHoursOverride){
  const nh = (normalHoursOverride !== undefined ? normalHoursOverride : DEFAULT_NORMAL_HOURS) || 8;
  let totalMs = 0;
  if(rec?.checkIn && rec?.checkOut){
    const inD = rec.checkIn instanceof Date ? rec.checkIn : rec.checkIn.toDate?.() || new Date(rec.checkIn);
    const outD = rec.checkOut instanceof Date ? rec.checkOut : rec.checkOut.toDate?.() || new Date(rec.checkOut);
    const ms = outD - inD; if(ms > 0) totalMs += ms;
  }
  if(Array.isArray(rec?.periods)){
    rec.periods.forEach(p=>{
      if(!p.checkIn || !p.checkOut) return;
      const inD = p.checkIn instanceof Date ? p.checkIn : p.checkIn.toDate?.() || new Date(p.checkIn);
      const outD = p.checkOut instanceof Date ? p.checkOut : p.checkOut.toDate?.() || new Date(p.checkOut);
      const ms = outD - inD; if(ms > 0) totalMs += ms;
    });
  }
  const total = Math.round((totalMs / 3600000) * 100) / 100;
  const base  = Math.min(total, nh);
  const extra = Math.max(total - nh, 0);
  return { total, base, extra: Math.round(extra*100)/100 };
}
function countPeriods(rec){ let c=0; if(rec?.checkIn) c++; if(Array.isArray(rec?.periods)) c+=rec.periods.length; return c; }
function periodLabel(idx){ return `الفترة ${["الأولى","الثانية","الثالثة","الرابعة","الخامسة"][idx]||idx+1}`; }
/* Converts a decimal hour count (e.g. 1.25) into a clear "X ساعة و Y دقيقة"
   string — display-only formatter, all underlying math stays in decimal. */
function formatHoursMinutes(decimalHours){
  if(!decimalHours || decimalHours <= 0) return "0 دقيقة";
  const totalMinutes = Math.round(decimalHours * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  if(h === 0) return `${m} دقيقة`;
  if(m === 0) return `${h} ساعة`;
  return `${h} ساعة و ${m} دقيقة`;
}

function checkLockoutUI(){

  if(!box) return;
  const data = getLoginAttempts();

async function handleLoginSubmit(e){
  e.preventDefault();
  const password = document.getElementById("adminPassword").value;
  const passError = document.getElementById("passError");
  passError.classList.remove("show");
  if(!password) return;

  const attemptData = getLoginAttempts();
  if(attemptData.lockedUntil > Date.now()){ checkLockoutUI(); return; }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التحقق...`;

  try{
    const config = await ensureAdminConfig();
    const valid = await verifyPassword(password, config.passwordHash, config.passwordSalt, config.passwordIterations || 150000);
    if(!valid){
      recordFailedLogin();
      passError.classList.add("show");
      writeAuditLog("admin_login_failed", {});
      checkLockoutUI();
      btn.disabled = false;
      btn.textContent = "دخول";
      return;
    }
    clearLoginAttempts();
    state.session = { loginAt: Date.now(), lastActivity: Date.now(), fingerprint: getFingerprint() };
    saveSession(state.session);
    writeAuditLog("admin_login_success", {});
    toast("أهلًا بك في لوحة الإدارة", "success");
    await renderMain();
  }catch(err){
    console.error(err);
    toast("تعذّر تسجيل الدخول — تحقق من الاتصال بالإنترنت", "error");
    btn.disabled = false;
    btn.textContent = "دخول";
  }
}

function handleLogout(silent = false){
  state.unsubscribers.forEach(fn=>{ try{ fn(); }catch{} });
  state.unsubscribers = [];
  clearSession();
  if(!silent) toast("تم تسجيل الخروج", "info");
  renderLogin();
}

/* ============================================================
   DATA LOADING — shops + cross-shop subscriptions
   ============================================================ */
let _shopsLastLoaded = 0;
async function loadAllShops(forceRefresh = false){
  // Cache for 30 seconds — avoid refetching on every minor action
  if(!forceRefresh && state.shops.length > 0 && Date.now() - _shopsLastLoaded < 30000) return;
  try{
    const snap = await getDocs(collection(db, "shops"));
    state.shops = snap.docs.map(d=>({ id: d.id, ...d.data() })).sort((a,b)=>(a.shopNumber||0)-(b.shopNumber||0));
    _shopsLastLoaded = Date.now();
  }catch(e){
    console.error("Failed to load shops:", e);
    toast("تعذّر تحميل قائمة المحلات", "error");
  }
}

function subscribeGlobalData(){
  state.unsubscribers.forEach(fn=>{ try{ fn(); }catch{} });
  state.unsubscribers = [];

  state.shops.forEach(shop=>{
    const empCol = collection(db, "shops", shop.id, "employees");
    const unsub = onSnapshot(empCol, (snap)=>{
      state.employeesByShop[shop.id] = snap.docs.map(d=>({ id: d.id, shopId: shop.id, ...d.data() }));
      recomputePendingEmployees();
      if(state.activeTab === "approvals") renderApprovalsTab();
      if(state.activeTab === "employees") renderEmployeesTab();
      if(state.activeTab === "dashboard") renderDashboardTab();
    }, (err)=>console.error(`Employees sub error (${shop.id}):`, err));
    state.unsubscribers.push(unsub);
  });

  // Single live query across ALL shops' attendance records where approvalStatus == "pending".
  // Uses a Firestore collectionGroup query so this is one network round-trip + one
  // realtime listener total, instead of looping (shops × days) sequential reads.
  // NOTE: collection-group queries with a where() filter require a Firestore index to
  // be deployed (see firestore.indexes.json) — without it this fails with
  // "failed-precondition" and Firestore's error message includes a direct link to
  // auto-create the missing index in Firebase Console.
  const overtimeQuery = query(collectionGroup(db, "records"), where("approvalStatus", "==", "pending"));
  const unsubOvertime = onSnapshot(overtimeQuery, (snap)=>{
    state.pendingOvertimeError = null;
    state.pendingOvertime = snap.docs.map(d=>{
      // doc path: attendance/{shopId}_{date}/records/{employeeId}
      const attendanceDocId = d.ref.parent.parent.id;
      const sepIndex = attendanceDocId.lastIndexOf("_");
      const shopId = attendanceDocId.slice(0, sepIndex);
      const date = attendanceDocId.slice(sepIndex + 1);
      const shop = state.shops.find(s=>s.id===shopId);
      const emp = (state.employeesByShop[shopId]||[]).find(e=>e.id===d.id);
      return {
        shopId, shopName: shop?.name || shopId, date,
        employeeId: d.id, employeeName: emp?.name || "—",
        ...d.data()
      };
    }).sort((a,b)=> b.date.localeCompare(a.date));
    if(state.activeTab === "approvals") renderApprovalsTab();
    if(state.activeTab === "dashboard") renderDashboardTab();
  }, (err)=>{
    console.error("Overtime collectionGroup subscription error:", err);
    state.pendingOvertimeError = err.message || String(err);
    if(err.code === "failed-precondition"){
      // استخراج رابط إنشاء الفهرس من رسالة الخطأ تلقائياً
      const indexUrl = err.message?.match(/https:\/\/console\.firebase\.google\.com[^\s]*/)?.[0];
      const linkHtml = indexUrl
        ? `<br><a href="${indexUrl}" target="_blank" rel="noopener" style="color:var(--accent-cyan);text-decoration:underline;">▶ افتح هذا الرابط لإنشاء الفهرس تلقائياً (دقيقة واحدة)</a>`
        : `<br>افتح Firebase Console → Firestore → Indexes وأنشئ index على: collection=records، field=approvalStatus`;
      // عرض toast مرة واحدة فقط
      if(!state._overtimeIndexToastShown){
        state._overtimeIndexToastShown = true;
        toast(`⚠ الساعات الإضافية تحتاج فهرس في Firestore — راجع تبويب الموافقات${indexUrl?' أو افتح الرابط في console':''}`, "warn", 10000);
      }
    }else{
      toast("تعذّر تحميل الساعات الإضافية بانتظار الاعتماد", "error");
    }
    if(state.activeTab === "approvals") renderApprovalsTab();
  });
  state.unsubscribers.push(unsubOvertime);

  // ── Listener حي لطلبات التعديل المعلّقة — للداشبورد وبانر التنبيهات ──
  const corrQuery = query(
    collection(db, "correction_requests"),
    where("status", "==", "pending"),
    limit(100)
  );
  const unsubCorr = onSnapshot(corrQuery, (snap) => {
    state.correctionRequestsPending = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if(state.activeTab === "dashboard")   renderDashboardTab();
    if(state.activeTab === "corrections") renderCorrectionsTab();
  }, (err) => {
    console.warn("Correction requests sub error:", err);
    state.correctionRequestsPending = [];
  });
  state.unsubscribers.push(unsubCorr);
}

function recomputePendingEmployees(){
  state.pendingEmployees = [];
  Object.values(state.employeesByShop).flat().forEach(emp=>{
    if(emp.status === "pending"){
      const shop = state.shops.find(s=>s.id===emp.shopId);
      state.pendingEmployees.push({ ...emp, shopName: shop?.name || emp.shopId });
    }
  });
}

  async function approveTransfer(transferId, empId, fromShopId, toShopId, toShopName, onDone){
    const adminNote = prompt("ملاحظة للموافقة (اختياري):") || "";
    try{
      const empSnap = await getDoc(doc(db,"shops",fromShopId,"employees",empId));
      if(empSnap.exists()){
        const empData = empSnap.data();
        // نسخ الموظف للمحل الجديد
        await setDoc(doc(db,"shops",toShopId,"employees",empId),{
          ...empData, shopId: toShopId,
          transferredFrom: fromShopId,
          transferredAt: serverTimestamp(),
          status: "approved",
          deleted: false,
        });
        // soft-delete من المحل القديم (يحفظ السجلات التاريخية ويمنع ظهوره في محلَّين)
        await setDoc(doc(db,"shops",fromShopId,"employees",empId),{
          deleted: true, status: "transferred",
          transferredTo: toShopId, transferredAt: serverTimestamp(),
        },{ merge: true });
        // تحديث حالة طلب التحويل — completed يغطي كلا المسارين (بدأه المحل، أو بدأه الموظف بعد موافقة المرحلتين)
        await setDoc(doc(db,"transfer_requests",transferId),{
          status:"completed", adminApproval:"approved", adminNote,
          approvedAt: serverTimestamp(),
          approvedBy: window.__gateUsername||"admin",
        },{ merge:true });
        writeAuditLog("transfer_approved_completed",{ transferId, empId, fromShopId, toShopId });
        toast(`تم التحويل إلى ${toShopName} ✅`,"success");
        onDone();
      }
    }catch(e){ console.error(e); toast("فشل تنفيذ التحويل","error"); }
  }

  async function rejectTransfer(transferId, onDone){
    const adminNote = prompt("سبب الرفض (اختياري):") || "";
    try{
      await setDoc(doc(db,"transfer_requests",transferId),{
        status:"rejected_admin", adminApproval:"rejected", adminNote,
        rejectedAt: serverTimestamp(),
        rejectedBy: window.__gateUsername||"admin",
      },{ merge:true });
      writeAuditLog("transfer_rejected",{ transferId });
      toast("تم رفض طلب التحويل","info");
      onDone();
    }catch(e){ console.error(e); toast("فشل الرفض","error"); }
  }

async function setEmployeeApproval(shopId, empId, status){
  try{
    if(status === "rejected"){
      await deleteDoc(doc(db, "shops", shopId, "employees", empId));
    }else{
      await updateDoc(doc(db, "shops", shopId, "employees", empId), { status: "approved", approvedAt: serverTimestamp() });
    }
    writeAuditLog(status==="approved"?"employee_approved":"employee_rejected", { shopId, empId });
    toast(status === "approved" ? "تم اعتماد الموظف" : "تم رفض الموظف وحذفه", "success");
    renderApprovalsTab();
  }catch(e){
    console.error(e);
    toast("فشلت العملية", "error");
  }
}

async function setOvertimeApproval(shopId, date, empId, status){
  try{

  }
}
async function renderDashboardTab(){
  const el = document.getElementById("tabContent");
  const today = todayISO();
  const totalShops = state.shops.length;
  const allEmployees = Object.values(state.employeesByShop).flat();
  const totalEmployees = allEmployees.filter(e => e.status !== 'pending' && !e.deleted && e.status !== 'deleted').length;
  const pendingEmpCount = state.pendingEmployees.length;
  const overtimePendingCount = state.pendingOvertime.length;
  const corrReqPending = (state.correctionRequestsPending || []).length;
  const transferredTodayCount = allEmployees.filter(e =>
    e.deleted && e.status === 'transferred' && e.transferredAt &&
    (e.transferredAt.toDate ? e.transferredAt.toDate() : new Date(e.transferredAt)).toISOString().slice(0,10) === today
  ).length;

  // فحص الفترة المفتوحة — يدعم تعدد الفترات (periods array)
  function getCurrentPeriodStatus(rec){
    if(!rec) return { hasIn:false, hasOut:false };
    const periods = Array.isArray(rec.periods) ? rec.periods : [];
    if(periods.length > 0){
      const last = periods[periods.length-1];
      return { hasIn:!!last.checkIn, hasOut:!!last.checkOut };
    }
    return { hasIn:!!rec.checkIn, hasOut:!!rec.checkOut };
  }

  // Skeleton أثناء التحميل
  el.innerHTML = `<div style="text-align:center;padding:60px 0;"><div class="spinner" style="width:36px;height:36px;border-width:3px;" aria-hidden="true"></div></div>`;

  // تحميل حضور اليوم لكل المحلات بالتوازي
  const todayDocs = await Promise.all(state.shops.map(async shop => {
    try{
      const snap = await getDocs(collection(db, "attendance", `${shop.id}_${today}`, "records"));
      return { shopId: shop.id, shopName: shop.name, records: snap.docs.map(d => ({ id:d.id, ...d.data() })) };
    }catch{
      return { shopId: shop.id, shopName: shop.name, records: [] };
    }
  }));

  // إحصاءات مجمّعة
  let presentCount = 0, completedCount = 0, totalHoursToday = 0, vacationCount = 0;
  todayDocs.forEach(d => {
    d.records.forEach(r => {
      if(r.onVacation){ vacationCount++; return; }
      const s = getCurrentPeriodStatus(r);
      if(s.hasIn && !s.hasOut) presentCount++;
      if(s.hasIn &&  s.hasOut){
        completedCount++;
        totalHoursToday += r.totalHours || 0;
      }
    });
  });
  const absentCount = Math.max(0, totalEmployees - presentCount - completedCount - vacationCount);

  // بانر التنبيهات — إجراءات تحتاج اهتمام الإدارة
  const alerts = [];
  if(pendingEmpCount > 0)      alerts.push({ icon:"👤", color:"orange", text:`${pendingEmpCount} موظف بانتظار الاعتماد`,               tab:"approvals"   });
  if(overtimePendingCount > 0) alerts.push({ icon:"⏱",  color:"orange", text:`${overtimePendingCount} ساعة إضافية بانتظار الاعتماد`,  tab:"approvals"   });
  if(corrReqPending > 0)       alerts.push({ icon:"📝",  color:"cyan",   text:`${corrReqPending} طلب تعديل بانتظار المراجعة`,          tab:"corrections" });
  if(transferredTodayCount > 0) alerts.push({ icon:"🔀", color:"cyan",   text:`${transferredTodayCount} تحويل موظف اليوم`,             tab:"employees"   });

  const kpis = [
    { icon:"🏪", label:"المحلات النشطة",       value: totalShops,                            color:"cyan"                                    },
    { icon:"👥", label:"إجمالي الموظفين",       value: totalEmployees,                        color:"cyan",  sub: pendingEmpCount>0?`+${pendingEmpCount} بانتظار الاعتماد`:null },
    { icon:"🟢", label:"حاضر الآن",             value: presentCount,                          color:"green"                                   },
    { icon:"✅", label:"أنهوا دوامهم",          value: completedCount,                        color:"blue"                                    },
    { icon:"🌴", label:"إجازة اليوم",           value: vacationCount,                         color:"cyan"                                    },
    { icon:"❌", label:"غائبون",                value: absentCount,                           color: absentCount>0?"red":"green"              },
    { icon:"⏱",  label:"إجمالي ساعات اليوم",   value: totalHoursToday.toFixed(1)+"س",        color:"cyan"                                    },
    { icon:"⚡", label:"ساعات إضافية معلّقة",  value: overtimePendingCount,                  color: overtimePendingCount>0?"orange":"green"  },
  ];

  el.innerHTML = `
    <!-- ── بانر التنبيهات الذكي ── -->
    ${alerts.length > 0 ? `
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
      ${alerts.map(a=>`
        <div class="dash-alert" data-alert-tab="${escapeHtml(a.tab)}"
          style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:10px;
          background:rgba(255,107,0,0.07);border:1px solid rgba(255,107,0,0.28);
          cursor:pointer;flex:1;min-width:220px;transition:background .18s;">
          <span style="font-size:1.3rem;">${a.icon}</span>
          <span style="font-size:0.85rem;font-weight:700;color:var(--accent-${a.color})">${a.text}</span>
          <span style="margin-right:auto;font-size:0.78rem;color:var(--text-secondary);">اضغط للانتقال ←</span>
        </div>`).join("")}
    </div>` : `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:10px;
      background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.22);margin-bottom:20px;">
      <span style="font-size:1.2rem;">✅</span>
      <span style="font-size:0.85rem;font-weight:700;color:var(--accent-green);">لا يوجد إجراءات معلّقة — النظام يعمل بصورة طبيعية</span>
    </div>`}

    <!-- ── KPI Cards ── -->
    <div class="kpi-grid" style="margin-bottom:20px;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));">
      ${kpis.map(k=>`
        <div class="glass-card kpi-card">
          <div style="font-size:1.4rem;margin-bottom:5px;">${k.icon}</div>
          <div class="label">${k.label}</div>
          <div class="value ${k.color} count-num" style="font-size:1.65rem;">${k.value}</div>
          ${k.sub ? `<div class="sub text-orange">${k.sub}</div>` : ""}
        </div>`).join("")}
    </div>

    <!-- ── جدول تفاصيل المحلات ── -->
    <div class="glass-card section-card" style="margin-bottom:20px;">
      <div class="section-head">
        <div class="section-title"><span class="dot" aria-hidden="true"></span> تفاصيل المحلات — ${dayNameAr(today)} ${today}</div>
        <button class="btn btn-ghost btn-sm" id="dashboardRefreshBtn">🔄 تحديث</button>
      </div>
      ${totalShops === 0
        ? `<div class="empty-state"><div class="icon">🏪</div>لا توجد محلات مضافة بعد</div>`
        : `<div class="table-wrap"><table class="data-table">
          <thead><tr>
            <th>المحل</th><th>الموظفون</th><th>في العمل</th>
            <th>أنهوا</th><th>إجازة</th><th>غائب</th>
            <th>ساعات اليوم</th><th>إضافي ⏳</th><th></th>
          </tr></thead>
          <tbody>
            ${todayDocs.map(d=>{
              const shopEmps = (state.employeesByShop[d.shopId]||[])
                .filter(e=>e.status!=='pending' && !e.deleted && e.status!=='deleted');
              const present  = d.records.filter(r=>{ const s=getCurrentPeriodStatus(r); return !r.onVacation && s.hasIn && !s.hasOut; }).length;
              const done     = d.records.filter(r=>{ const s=getCurrentPeriodStatus(r); return !r.onVacation && s.hasIn &&  s.hasOut; }).length;
              const vacation = d.records.filter(r=> r.onVacation).length;
              const absent   = Math.max(0, shopEmps.length - present - done - vacation);
              const shopHrs  = d.records.reduce((s,r) => s+(r.totalHours||0), 0);
              const pendingOT = state.pendingOvertime.filter(o=>o.shopId===d.shopId && o.date===today).length;
              return `<tr>
                <td><strong>${escapeHtml(d.shopName)}</strong></td>
                <td class="mono">${shopEmps.length}</td>
                <td><span class="badge badge-green">${present}</span></td>
                <td class="mono">${done}</td>
                <td class="mono">${vacation>0?vacation:"—"}</td>
                <td>${absent>0?`<span class="badge badge-red">${absent}</span>`:`<span class="mono">0</span>`}</td>
                <td class="mono">${shopHrs>0?shopHrs.toFixed(1)+"س":"—"}</td>
                <td>${pendingOT>0?`<span class="badge badge-orange">${pendingOT} معلّق</span>`:`<span class="text-secondary">—</span>`}</td>
                <td><button class="btn btn-ghost btn-sm" data-shop-detail="${escapeHtml(d.shopId)}">تفاصيل</button></td>
              </tr>`;
            }).join("")||`<tr><td colspan="9"><div class="empty-state">لا توجد محلات</div></td></tr>`}
          </tbody>
        </table></div>`}

/* ============================================================
   DASHBOARD: تفاصيل حالة الموظفين لمحل معيّن
   يعرض اسم كل موظف وحالته الفعلية اليوم (حضور/انصراف/تحويل/إجازة)
   ============================================================ */
async function openShopStatusDetailModal(shopId, today, getCurrentPeriodStatus){
  const shop = state.shops.find(s=>s.id===shopId);
  if(!shop) return;

  showModal(`<h2>حالة الموظفين — ${escapeHtml(shop.name)}</h2><div id="shopDetailBody"><div class="empty-state"><div class="spinner" aria-hidden="true"></div></div></div>`);
  const body = document.getElementById("shopDetailBody");

  try{
    const docId = `${shopId}_${today}`;
    const recordsSnap = await getDocs(collection(db, "attendance", docId, "records"));
    const records = {};
    recordsSnap.docs.forEach(d=>{ records[d.id] = d.data(); });

    const allShopEmps = state.employeesByShop[shopId] || [];
    const activeEmps = allShopEmps.filter(e=>e.status!=='pending' && !e.deleted && e.status!=='deleted');
    // محوَّلون اليوم تحديداً — يظهرون كملاحظة منفصلة وليسوا ضمن العدّ الإجمالي للمحل
    const transferredToday = allShopEmps.filter(e=>e.deleted && e.status==='transferred' && e.transferredAt &&
      (e.transferredAt.toDate ? e.transferredAt.toDate() : new Date(e.transferredAt)).toISOString().slice(0,10) === today
    );

    const statusRank = (emp)=>{
      const rec = records[emp.id];
      const s = getCurrentPeriodStatus(rec);
      if(rec?.onVacation) return 3;
      if(s.hasIn && !s.hasOut) return 0;
      if(!s.hasIn) return 1;
      return 2;
    };
    const sorted = [...activeEmps].sort((a,b)=> statusRank(a)-statusRank(b) || a.name.localeCompare(b.name,'ar'));

    body.innerHTML = `
      ${sorted.length===0 ? `<div class="empty-state">لا يوجد موظفون نشطون في هذا المحل</div>` : `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>الموظف</th><th>الحضور</th><th>الانصراف</th><th>الحالة</th></tr></thead>
          <tbody>
            ${sorted.map(emp=>{
              const rec = records[emp.id];
              const onVacation = rec?.onVacation === true;
              const s = getCurrentPeriodStatus(rec);
              let statusBadge = `<span class="badge badge-orange">⏳ لم يسجّل</span>`;
              if(onVacation) statusBadge = `<span class="badge badge-cyan">🌴 إجازة</span>`;
              else if(s.hasIn && s.hasOut) statusBadge = s.periodCount>1
                ? `<span class="badge badge-green">✅ منتهي</span> <span class="badge badge-cyan">فترة ${s.periodCount}</span>`
                : `<span class="badge badge-green">✅ منتهي</span>`;
              else if(s.hasIn) statusBadge = s.periodCount>1
                ? `<span class="badge badge-green">🟢 في العمل</span> <span class="badge badge-cyan">فترة ${s.periodCount}</span>`
                : `<span class="badge badge-green">🟢 في العمل</span>`;
              const checkInTime = (rec?.periods?.length ? rec.periods[rec.periods.length-1].checkIn : rec?.checkIn);
              const checkOutTime = (rec?.periods?.length ? rec.periods[rec.periods.length-1].checkOut : rec?.checkOut);
              return `<tr>
                <td style="font-weight:600;">${escapeHtml(emp.name)}</td>
                <td class="mono">${onVacation?'—':(checkInTime?formatTimeOnly(checkInTime):'—')}</td>
                <td class="mono">${onVacation?'—':(checkOutTime?formatTimeOnly(checkOutTime):'—')}</td>
                <td>${statusBadge}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
      ${transferredToday.length>0?`
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border-glass);">
        <div style="font-size:0.8rem;font-weight:700;color:var(--accent-orange);margin-bottom:8px;">↔ تم تحويلهم من هذا المحل اليوم</div>
        ${transferredToday.map(e=>`<div style="font-size:0.82rem;color:var(--text-secondary);padding:4px 0;">${escapeHtml(e.name)}</div>`).join('')}
      </div>`:''}
      <div class="modal-actions" style="margin-top:16px;">
        <button type="button" class="btn btn-primary" id="closeShopDetailBtn">إغلاق</button>
      </div>
    `;
    document.getElementById("closeShopDetailBtn").addEventListener("click", closeModal);
  }catch(e){
    console.error("openShopStatusDetailModal failed:", e);
    body.innerHTML = `<div class="empty-state">تعذّر تحميل بيانات هذا المحل</div>
      <div class="modal-actions"><button type="button" class="btn btn-ghost" id="closeShopDetailErrBtn">إغلاق</button></div>`;
    document.getElementById("closeShopDetailErrBtn").addEventListener("click", closeModal);
  }
}

/* ============================================================
   ADMIN-ONLY: VIEW/EDIT A PAST (POSSIBLY LOCKED) DAY
   ============================================================ */
async function loadEditableDay(){
  const shopId = document.getElementById("editDayShop").value;
  const date = document.getElementById("editDayDate").value;
  const resultsEl = document.getElementById("editDayResults");
  if(!shopId || !date) return;
  resultsEl.innerHTML = `<div class="empty-state"><div class="spinner" aria-hidden="true"></div></div>`;

  const shop = state.shops.find(s=>s.id===shopId);
  const docId = `${shopId}_${date}`;
  let dayDoc, recordsSnap;
  try{
    [dayDoc, recordsSnap] = await Promise.all([
      getDoc(doc(db, "attendance", docId)),
      getDocs(collection(db, "attendance", docId, "records"))
    ]);
  }catch(e){
    console.error(e);
    resultsEl.innerHTML = `<div class="empty-state">تعذّر تحميل بيانات اليوم</div>`;
    return;
  }

  const employees = state.employeesByShop[shopId] || [];
  const records = {};
  recordsSnap.docs.forEach(d=>{ records[d.id] = d.data(); });
  const isLocked = dayDoc.exists() && dayDoc.data().locked === true;
  const normalHours = shop?.settings?.normalHours || DEFAULT_NORMAL_HOURS;

  if(employees.length === 0){
    resultsEl.innerHTML = `<div class="empty-state">لا يوجد موظفون في هذا المحل</div>`;
    return;
  }

  resultsEl.innerHTML = `
    <div style="margin-bottom:12px;">
      ${isLocked ? `<span class="badge badge-red">🔒 هذا اليوم مقفول في صفحة التسجيل — التعديل هنا متاح للإدارة فقط</span>` : `<span class="badge badge-green">هذا اليوم لا يزال مفتوحًا</span>`}
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>الموظف</th><th>الحالة</th><th>حضور</th><th>انصراف</th><th>ساعات</th><th></th></tr></thead>
        <tbody>
          ${employees.map(emp=>{
            const rec = records[emp.id] || {};
            const onVacation = rec.onVacation === true;
            const { total } = (rec.checkIn) ? calcTotalHoursFromRecord(rec, normalHours) : { total: 0 };
            return `<tr>
              <td>${escapeHtml(emp.name)}</td>
              <td>${onVacation ? '<span class="badge badge-cyan">🌴 إجازة</span>' : '—'}</td>
              <td class="mono">${onVacation ? "—" : (rec.checkIn ? formatTimeOnly(rec.checkIn) : "—")}</td>
              <td class="mono">${onVacation ? "—" : (rec.checkOut ? formatTimeOnly(rec.checkOut) : "—")}</td>
              <td class="mono">${total > 0 ? formatHoursMinutes(total) : "—"}</td>
              <td class="table-actions">
                <button class="btn btn-ghost btn-sm" data-edit-day-emp="${escapeHtml(emp.id)}">تعديل</button>
                <button class="btn ${onVacation ? 'btn-ghost' : 'btn-cyan'} btn-sm" data-toggle-vacation="${escapeHtml(emp.id)}">${onVacation ? 'إلغاء الإجازة' : '🌴 تسجيل إجازة'}</button>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;

  resultsEl.querySelectorAll("[data-edit-day-emp]").forEach(btn=>{
    btn.addEventListener("click", ()=>openEditDayRecordModal(shopId, date, btn.dataset.editDayEmp, records[btn.dataset.editDayEmp] || {}));
  });
  resultsEl.querySelectorAll("[data-toggle-vacation]").forEach(btn=>{
    btn.addEventListener("click", ()=>toggleVacationFromAdmin(shopId, date, btn.dataset.toggleVacation, records[btn.dataset.toggleVacation] || {}));
  });
}

async function toggleVacationFromAdmin(shopId, date, empId, rec){
  const newValue = !(rec.onVacation === true);
  if(newValue && (rec.checkIn || rec.checkOut)){
    const confirmed = await new Promise(resolve=>{
      showModal(`
        <h2>تسجيل إجازة</h2>
        <p class="text-secondary">هذا الموظف لديه تسجيل حضور/انصراف بالفعل في هذا اليوم. تسجيل إجازة الآن سيُبقي على وقت الحضور والانصراف المسجَّل لكنه سيُخفيهما من العرض ولن يُحسبا. هل تريد المتابعة؟</p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelToggleVacation">إلغاء</button>
          <button type="button" class="btn btn-primary" id="confirmToggleVacation">تأكيد</button>
        </div>
      `);
      document.getElementById("cancelToggleVacation").addEventListener("click", ()=>{ closeModal(); resolve(false); });
      document.getElementById("confirmToggleVacation").addEventListener("click", ()=>{ closeModal(); resolve(true); });
    });
    if(!confirmed) return;
  }
  try{
    await setDoc(doc(db, "attendance", `${shopId}_${date}`, "records", empId), {
      onVacation: newValue, adminEdited: true, adminEditedAt: serverTimestamp()
    }, { merge: true });
    writeAuditLog(newValue ? "vacation_marked_by_admin" : "vacation_cancelled_by_admin", { shopId, empId, date });
    toast(newValue ? "تم تسجيل الإجازة" : "تم إلغاء الإجازة", "success");
    loadEditableDay();
  }catch(err){
    console.error(err);
    toast("فشلت العملية", "error");
  }
}

function openEditDayRecordModal(shopId, date, empId, rec){
  const allEmployees = Object.values(state.employeesByShop).flat();
  const emp = allEmployees.find(e=>e.id===empId);
  const inVal = rec.checkIn ? toLocalTimeInputAdmin(rec.checkIn) : "";
  const outVal = rec.checkOut ? toLocalTimeInputAdmin(rec.checkOut) : "";
  showModal(`
    <h2>تعديل سجل — ${escapeHtml(emp?.name || "")}</h2>
    <p class="text-secondary" style="margin-bottom:14px;">${dayNameAr(date)} ${date}</p>
    <form id="editDayRecordForm">
      <div class="field">
        <label for="editDayIn">وقت الحضور</label>
        <input type="time" id="editDayIn" class="input input-mono" value="${inVal}">
      </div>
      <div class="field">
        <label for="editDayOut">وقت الانصراف</label>
        <input type="time" id="editDayOut" class="input input-mono" value="${outVal}">
      </div>
      <div class="field">
        <label for="editDayNote">ملاحظة (اختياري)</label>
        <textarea id="editDayNote" class="input" rows="2" maxlength="300">${escapeHtml(rec.note || "")}</textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelEditDayRecord">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ وإعادة الحساب</button>
      </div>
    </form>
  `);
  document.getElementById("cancelEditDayRecord").addEventListener("click", closeModal);
  document.getElementById("editDayRecordForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const inTime = document.getElementById("editDayIn").value;
    const outTime = document.getElementById("editDayOut").value;
    const note = document.getElementById("editDayNote").value.trim();
    const finalCheckIn  = inTime  ? timeInputToDateAdmin(inTime,  date) : null;
    const finalCheckOut = outTime ? timeInputToDateAdmin(outTime, date) : null;
    const updates = { adminEdited: true, adminEditedAt: serverTimestamp() };
    if(finalCheckIn)  updates.checkIn  = finalCheckIn;
    if(finalCheckOut) updates.checkOut = finalCheckOut;
    if(note) updates.note = sanitize(note);

    // ── إعادة حساب الساعات تلقائياً بعد التعديل ──
    const ciCalc  = finalCheckIn  || (rec.checkIn  instanceof Date ? rec.checkIn  : rec.checkIn?.toDate?.()  || null);
    const coCalc  = finalCheckOut || (rec.checkOut instanceof Date ? rec.checkOut : rec.checkOut?.toDate?.() || null);
    const shopForCalc = state.shops.find(s => s.id === shopId);
    const nhForCalc = shopForCalc?.settings?.normalHours || DEFAULT_NORMAL_HOURS;
    if(ciCalc && coCalc){
      const { total, base, extra } = calcHours(ciCalc, coCalc, nhForCalc);
      updates.totalHours = Math.round(total * 100) / 100;
      updates.baseHours  = Math.round(base  * 100) / 100;
      updates.extraHours = Math.round(extra * 100) / 100;
      if(extra <= 0) updates.approvalStatus = null;
    }

    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
    try{
      await setDoc(doc(db, "attendance", `${shopId}_${date}`, "records", empId), updates, { merge: true });
      writeAuditLog("admin_edited_locked_day", { shopId, empId, date, updates });
      toast("تم حفظ التعديل وإعادة الحساب تلقائياً ✓", "success");
      closeModal();
      loadEditableDay();
    }catch(err){
      console.error(err);
      toast("فشل حفظ التعديل", "error");
      btn.disabled = false; btn.textContent = "حفظ وإعادة الحساب";
    }
  });
}
function toLocalTimeInputAdmin(ts){
  const d = ts instanceof Date ? ts : ts.toDate();
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function timeInputToDateAdmin(timeStr, dateStr){
  const [h,m] = timeStr.split(":").map(Number);
  const d = new Date(dateStr + "T00:00:00");
  d.setHours(h, m, 0, 0);
  return d;
}

/* ============================================================
   TAB: EMPLOYEES
   ============================================================ */
async function renderEmployeesTab(){
  const content = document.getElementById("tabContent");

  // Flatten once — O(n) instead of repeated flatMap calls
  const allEmployees = Object.values(state.employeesByShop).flat();
  const total = allEmployees.length;
  const active = allEmployees.filter(e=> !e.deleted && e.status!=="deleted").length;

  content.innerHTML = `
    <div class="glass-card section-card">
      <div class="section-head">
        <div class="section-title"><span class="dot" aria-hidden="true"></span> جميع الموظفين</div>
        <span class="badge badge-cyan">${active} نشط / ${total} إجمالي</span>
      </div>
      <div class="filter-bar">
        <div class="field">
          <label for="empShopFilter">تصفية حسب المحل</label>
          <select id="empShopFilter" class="input">
            <option value="">كل المحلات</option>
            ${state.shops.map(s=>`<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label for="empStatusFilter">الحالة</label>
          <select id="empStatusFilter" class="input">
            <option value="active">نشطون</option>
            <option value="deleted">محذوفون</option>
            <option value="all">الجميع</option>
          </select>
        </div>
        <div class="field">
          <label for="empSearchFilter">بحث</label>
          <input type="text" id="empSearchFilter" class="input" placeholder="اسم الموظف...">
        </div>
      </div>
      <div id="empTableBody"></div>
    </div>
  `;

  let currentShopFilter = "";
  let currentStatusFilter = "active";
  let currentSearch = "";
  let renderDebounce = null;

  function renderRows(){
    const tbody = document.getElementById("empTableBody");
    if(!tbody) return;

    let rows = allEmployees;
    if(currentShopFilter) rows = rows.filter(e => e.shopId === currentShopFilter);
    if(currentStatusFilter === "active")  rows = rows.filter(e => !e.deleted && e.status !== "deleted");
    if(currentStatusFilter === "deleted") rows = rows.filter(e =>  e.deleted || e.status === "deleted");
    if(currentSearch) rows = rows.filter(e => (e.name||"").includes(currentSearch));
    rows = rows.sort((a,b) => (a.name||"").localeCompare(b.name||"","ar"));

    if(rows.length === 0){
      tbody.innerHTML = `<div class="empty-state">لا يوجد موظفون مطابقون</div>`;
      return;
    }

    // Virtual render: only render first 200 rows for performance
    const LIMIT = 200;
    const display = rows.slice(0, LIMIT);
    const truncated = rows.length > LIMIT;

    tbody.innerHTML = `
      ${truncated ? `<div style="font-size:0.8rem;color:var(--accent-orange);margin-bottom:8px;">⚠ يتم عرض أول ${LIMIT} موظف من أصل ${rows.length}. استخدم البحث للتصفية.</div>` : `<div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:8px;">${rows.length} موظف</div>`}
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>الاسم</th><th>المحل</th><th>سعر الساعة</th><th>الحالة</th><th>إجراءات</th></tr></thead>
          <tbody>
            ${display.map(emp=>{
              const shop = state.shops.find(s=>s.id===emp.shopId);
              const isDeleted = emp.deleted || emp.status === "deleted";
              return `<tr ${isDeleted?"style='opacity:0.55;'":""}>
                <td>${escapeHtml(emp.name)} ${isDeleted ? '<span class="badge badge-red" style="font-size:0.68rem;">محذوف</span>' : ""}</td>
                <td>${escapeHtml(shop?.name || emp.shopId || "—")}</td>
                <td class="mono">${emp.hourlyRate ? emp.hourlyRate.toFixed(2)+" €" : "—"}</td>
                <td>${isDeleted ? '<span class="badge badge-red">محذوف</span>' : emp.status==="pending" ? '<span class="badge badge-orange">معلّق</span>' : '<span class="badge badge-green">نشط</span>'}</td>
                <td style="display:flex;gap:6px;flex-wrap:wrap;">
                  ${!isDeleted ? `<button class="btn btn-ghost btn-sm" data-edit-emp="${escapeHtml(emp.id)}" data-shop="${escapeHtml(emp.shopId)}">تعديل</button>` : ""}
                  ${!isDeleted ? `<button class="btn btn-red btn-sm" data-del-emp="${escapeHtml(emp.id)}" data-shop="${escapeHtml(emp.shopId)}">حذف</button>` : `<button class="btn btn-green btn-sm" data-restore-emp="${escapeHtml(emp.id)}" data-shop="${escapeHtml(emp.shopId)}">استعادة</button>`}
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`;

    tbody.querySelectorAll("[data-edit-emp]").forEach(btn => btn.addEventListener("click", () => openEditEmployeeModal(btn.dataset.shop, btn.dataset.editEmp)));
    tbody.querySelectorAll("[data-del-emp]").forEach(btn => btn.addEventListener("click", () => confirmDeleteEmployeeAdmin(btn.dataset.shop, btn.dataset.delEmp)));
    tbody.querySelectorAll("[data-restore-emp]").forEach(btn => btn.addEventListener("click", () => restoreDeletedEmployee(btn.dataset.shop, btn.dataset.restoreEmp)));
  }

  function debouncedRender(){
    clearTimeout(renderDebounce);
    renderDebounce = setTimeout(renderRows, 120);
  }

  document.getElementById("empShopFilter").addEventListener("change", e => { currentShopFilter = e.target.value; renderRows(); });
  document.getElementById("empStatusFilter").addEventListener("change", e => { currentStatusFilter = e.target.value; renderRows(); });
  document.getElementById("empSearchFilter").addEventListener("input", e => { currentSearch = e.target.value.trim(); debouncedRender(); });

  renderRows();
}

/* ============================================================
   MODAL HELPERS
   ============================================================ */
function showModal(innerHtml){
  let overlay = document.getElementById("modalOverlay");
  if(!overlay){
    overlay = document.createElement("div");
    overlay.id = "modalOverlay";
    overlay.className = "modal-overlay";
    overlay.innerHTML = `<div class="glass-card glow modal" id="modalContent" role="dialog" aria-modal="true"></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeModal(); });
    document.addEventListener("keydown", (e)=>{ if(e.key === "Escape") closeModal(); });
  }
  document.getElementById("modalContent").innerHTML = innerHtml;
  overlay.classList.add("show");
}
function closeModal(){
  const overlay = document.getElementById("modalOverlay");
  if(overlay) overlay.classList.remove("show");
}

function openAddEmployeeToShopModal(shopId){

    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span> جاري الإضافة...`;

    try{
      const empId = `emp_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      await setDoc(doc(db,"shops",shopId,"employees",empId),{
        name,
        hourlyRate: rateVal ? parseFloat(rateVal) : null,
        status: "active", shopId, tenantId: shopId,
        addedByAdmin: true, createdAt: serverTimestamp(), approvedAt: serverTimestamp(),

      const { username, password } = await createGateAccountForEmployee(empId, shopId, name);
      // username يُحفَظ أيضًا داخل سجل الموظف نفسه للعرض السريع في لوحة الإدارة
      await setDoc(doc(db,"shops",shopId,"employees",empId), { username }, { merge: true });

      writeAuditLog("employee_added_with_account",{ shopId, name, empId, username });

      // بناء رابط بوابة الموظف ديناميكيًا من موقع الصفحة الحالية (يعمل بصرف النظر عن النطاق أو اسم الـ repo)
      const currentFileName = location.pathname.split("/").pop() || "index.html";

      // عرض بيانات الدخول للإدارة

          <div style="margin-bottom:10px;">

            <div class="mono" style="font-size:1rem;font-weight:700;color:var(--accent-cyan);">${escapeHtml(username)}</div>
          </div>
          <div>
            <div style="font-size:0.75rem;color:var(--text-secondary);">كلمة المرور</div>
            <div class="mono" style="font-size:1rem;font-weight:700;color:var(--accent-green);">${escapeHtml(password)}</div>
          </div>
        </div>
        <p style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:14px;">رابط بوابة الموظف: <a href="${escapeHtml(employeePortalUrl)}" target="_blank" style="color:var(--accent-cyan);">employee.html</a></p>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="copyCredBtn">📋 نسخ بيانات الدخول</button>
          <button class="btn btn-primary" id="closeCredBtn">حسناً</button>

      }else if(err.code === "unavailable"){
        detail = "تعذّر الاتصال بقاعدة البيانات — تحقق من الإنترنت";
      }
      toast(`فشلت إضافة الموظف: ${detail}`,"error",7000);

function openAddShopModal(){
  showModal(`
    <h2>إضافة محل جديد</h2>
    <p class="text-secondary" style="margin-bottom:14px;font-size:0.83rem;">
      سيستخدم مسؤول المحل <strong>اسم المستخدم</strong> وكلمة المرور لتسجيل الدخول على صفحة المحل (shop.html).
    </p>
    <form id="addShopForm">
      <div class="field">
        <label for="newShopName">اسم المحل *</label>
        <input type="text" id="newShopName" class="input" required maxlength="80" placeholder="مثال: فرع المعادي">
      </div>
      <div class="field">
        <label for="newShopOwnerName">اسم المالك / المسؤول</label>
        <input type="text" id="newShopOwnerName" class="input" maxlength="80" placeholder="اختياري">
      </div>
      <div class="field">
        <label for="newShopUsername">اسم المستخدم (للدخول على shop.html) *</label>
        <input type="text" id="newShopUsername" class="input input-mono" required maxlength="60" autocomplete="off" placeholder="مثال: maadi-branch">
        <div class="field-error" id="newShopUsernameError">اسم المستخدم مستخدَم بالفعل أو غير صالح</div>
      </div>
      <div class="field">
        <label for="newShopPassword">كلمة مرور المحل *</label>
        <input type="password" id="newShopPassword" class="input input-mono" required minlength="6" autocomplete="new-password" placeholder="6 أحرف على الأقل">
      </div>
      <div class="field">
        <label for="newShopNumber">رقم المحل</label>
        <input type="number" id="newShopNumber" class="input input-mono" min="1" placeholder="اختياري">
      </div>
      <div class="field">
        <label for="newShopHours">ساعات العمل الطبيعية يوميًا</label>
        <input type="number" id="newShopHours" class="input input-mono" min="1" max="16" value="8">
      </div>
      <div class="field">
        <label for="newShopStatus">حالة الحساب</label>
        <select id="newShopStatus" class="input">
          <option value="active">نشط</option>
          <option value="suspended">موقوف</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelAddShop">إلغاء</button>
        <button type="submit" class="btn btn-primary">إضافة المحل</button>
      </div>
    </form>
  `);
  document.getElementById("cancelAddShop").addEventListener("click", closeModal);
  document.getElementById("addShopForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const name = sanitize(document.getElementById("newShopName").value.trim());
    const ownerName = sanitize(document.getElementById("newShopOwnerName").value.trim());
    const username = document.getElementById("newShopUsername").value.trim().toLowerCase().replace(/\s+/g,"-");
    const password = document.getElementById("newShopPassword").value;
    const number = document.getElementById("newShopNumber").value;
    const hours = parseFloat(document.getElementById("newShopHours").value) || DEFAULT_NORMAL_HOURS;
    const status = document.getElementById("newShopStatus").value;

    if(!name){ toast("أدخل اسم المحل","warn"); return; }
    if(!username){ toast("أدخل اسم المستخدم","warn"); return; }
    if(password.length < 6){ toast("كلمة المرور يجب أن تكون 6 أحرف على الأقل","warn"); return; }

    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري الإضافة...`;

    try{
      // Check username uniqueness before creating
      const existingQ = query(collection(db,"shops"), where("username","==",username), limit(1));
      const existingSnap = await getDocs(existingQ);
      if(!existingSnap.empty){
        document.getElementById("newShopUsernameError").classList.add("show");
        btn.disabled=false; btn.textContent="إضافة المحل";
        return;
      }
      document.getElementById("newShopUsernameError").classList.remove("show");

      const { hash, salt, iterations } = await pbkdf2Hash(password);
      const ref = await addDoc(collection(db,"shops"), {
        name,
        ownerName: ownerName || null,
        username,                          // used by shop.html login
        passwordHash: hash,
        passwordSalt: salt,
        passwordIterations: iterations,
        shopNumber: number ? parseInt(number) : null,
        status,                            // active | suspended
        settings: { normalHours: hours, requireReason: true },
        archived: false,
        createdAt: serverTimestamp(),
        createdByAdmin: true,
      });

      // tenantId = shopId (set after creation since we need the generated ID)
      await updateDoc(doc(db,"shops",ref.id), { tenantId: ref.id });

      writeAuditLog("shop_created", { shopId: ref.id, name, username, ownerName });
      toast(`تم إضافة المحل "${name}" بنجاح`, "success");
      await loadAllShops(true);
      subscribeGlobalData();
      closeModal();
      renderShopsTab();
    }catch(err){
      console.error(err);
      toast("فشلت إضافة المحل: " + err.message, "error");
      btn.disabled = false; btn.textContent = "إضافة المحل";
    }
  });
}

    <h2>إعادة تعيين كلمة المرور — ${escapeHtml(shop.name)}</h2>
    <form id="resetPassForm">
      <div class="field">
        <label for="newPass">كلمة المرور الجديدة *</label>
        <input type="password" id="newPass" class="input input-mono" required minlength="6" autocomplete="new-password">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelResetPass">إلغاء</button>
        <button type="submit" class="btn btn-orange">إعادة التعيين</button>
      </div>
    </form>
  `);
  document.getElementById("cancelResetPass").addEventListener("click", closeModal);
  document.getElementById("resetPassForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const password = document.getElementById("newPass").value;
    if(password.length < 6) return;
    try{
      const { hash, salt, iterations } = await pbkdf2Hash(password);
      await updateDoc(doc(db,"shops",shopId), { passwordHash: hash, passwordSalt: salt, passwordIterations: iterations });
      writeAuditLog("shop_password_reset", { shopId });
      toast("تم تغيير كلمة المرور", "success");
      closeModal();
    }catch(err){
      console.error(err);
      toast("فشل تغيير كلمة المرور", "error");
    }
  });
}

async function toggleArchiveShop(shopId){

  }
}

/* ============================================================
   CHUNK FETCH UTILITY — prevents Firestore rate-limit with large parallel batches
   بدل إطلاق 150 request في آن واحد، نقسمها إلى chunks بحجم 15
   ============================================================ */
async function chunkFetch(jobs, chunkSize = 15, onProgress = null){
  const results = new Array(jobs.length);
  for(let i = 0; i < jobs.length; i += chunkSize){
    const chunk = jobs.slice(i, i + chunkSize);
    const chunkResults = await Promise.all(chunk.map(j => j().catch(() => null)));
    chunkResults.forEach((r, k) => { results[i + k] = r; });
    if(onProgress) onProgress(Math.min(i + chunkSize, jobs.length), jobs.length);
    // Small yield between chunks so UI doesn't freeze
    if(i + chunkSize < jobs.length) await new Promise(r => setTimeout(r, 0));
  }
  return results;
}

function isoRange(fromISO, toISO){
  const dates = [];
  let cur = new Date(fromISO + "T00:00:00");
  const end = new Date(toISO + "T00:00:00");
  while(cur <= end){
    const tzOff = cur.getTimezoneOffset()*60000;
    dates.push(new Date(cur.getTime()-tzOff).toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

      </div>`;

    const shopsToQuery = shopFilter ? state.shops.filter(s=>s.id===shopFilter) : state.shops;
    const dates = isoRange(from, to);
    const rows = [];

    // Build lazy job list (functions, not promises) for chunked fetching
    const fetchJobs = [];
    for(const shop of shopsToQuery){
      for(const date of dates){
        const docId = `${shop.id}_${date}`;
        fetchJobs.push(() =>
          getDocs(collection(db,"attendance",docId,"records"))
            .then(snap => ({ shop, date, snap }))
            .catch(() => null)
        );
      }
    }

    const fetchResults = await chunkFetch(fetchJobs, 15, (done, total) => {
      const el = document.getElementById("reportProgress");
      if(el) el.textContent = `جاري تحميل البيانات… (${done} / ${total})`;
    });

    for(const result of fetchResults){
      if(!result) continue;
      const { shop, date, snap } = result;
      snap.docs.forEach(r=>{
        const rec = r.data();
        const emp = (state.employeesByShop[shop.id]||[]).find(e=>e.id===r.id);
        const onVacation = rec.onVacation === true;
        const { total, base, extra } = onVacation ? { total:0, base:0, extra:0 } : calcTotalHoursFromRecord(rec, shop.settings?.normalHours || DEFAULT_NORMAL_HOURS);
        const empName = emp
          ? (emp.deleted || emp.status==="deleted" ? `${emp.name} (هذا الموظف محذوف)` : emp.name)
          : `موظف محذوف (${r.id})`;
        rows.push({
          shopName: shop.name, date, dayName: dayNameAr(date),

      <div class="table-wrap">
        <table class="data-table">

          <tbody>
            ${displayRows.map(r=>`<tr>
              <td>${escapeHtml(r.shopName)}</td>
              <td class="mono" style="font-size:0.78rem;">${r.dayName} ${r.date}</td>
              <td>${r.isDeleted ? `<span style="font-style:italic;color:var(--text-secondary);">${escapeHtml(r.employeeName)}</span>` : escapeHtml(r.employeeName)}</td>
              <td class="mono">${r.checkIn}</td>
              <td class="mono">${r.checkOut}</td>
              <td class="mono">${formatHoursMinutes(r.total)}</td>
              <td class="mono">${r.extra > 0 ? formatHoursMinutes(r.extra) : "—"}</td>
              <td>${r.onVacation ? '<span class="badge badge-cyan">🌴</span>' : r.approvalStatus==="pending" ? '<span class="badge badge-orange">معلّق</span>' : r.approvalStatus==="approved" ? '<span class="badge badge-green">معتمد</span>' : r.approvalStatus==="rejected" ? '<span class="badge badge-red">مرفوض</span>' : '—'}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  document.getElementById("runReportBtn").addEventListener("click", runReport);
  document.getElementById("exportReportBtn").addEventListener("click", async ()=>{
    if(lastReportRows.length === 0){ toast("شغّل التقرير أولًا قبل التصدير", "warn"); return; }
    const exportBtn = document.getElementById("exportReportBtn");
    exportBtn.disabled = true;
    const originalLabel = exportBtn.textContent;
    exportBtn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التجهيز...`;
    try{
      await loadSheetJS();
    }catch(e){
      toast("تعذّر تحميل مكتبة Excel — تحقق من الاتصال", "error");
      exportBtn.disabled = false; exportBtn.textContent = originalLabel;
      return;
    }
    exportBtn.disabled = false; exportBtn.textContent = originalLabel;
    const data = lastReportRows.map(r=>({
      "المحل": r.shopName, "اليوم": r.dayName, "التاريخ": r.date, "الموظف": r.employeeName,
      "الحالة": r.onVacation ? "إجازة" : "عمل عادي",
      "حضور": r.checkIn, "انصراف": r.checkOut, "إجمالي الساعات": r.total,
      "ساعات أساسية": r.base, "ساعات إضافية": r.extra, "بيان السبب": r.reason,
      "حالة الاعتماد": r.onVacation ? "—" : r.approvalStatus

    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{wch:18},{wch:10},{wch:12},{wch:22},{wch:12},{wch:10},{wch:10},{wch:12},{wch:12},{wch:12},{wch:30},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "التقرير");
    XLSX.writeFile(wb, `GR_تقرير_${todayISO()}.xlsx`);

  });
