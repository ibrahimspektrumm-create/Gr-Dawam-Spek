<head>
<meta charset="UTF-8">

<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://www.gstatic.com https://cdn.sheetjs.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.sheetjs.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;">

<title>GR دوام الموظفين</title>

<style>
/* ============================================================
   GR دوام الموظفين — Merged Single-File App
   (index landing + registration app + admin app)
   Base styles below are shared by all three views.
   ============================================================ */

/* ============================================================
   GR دوام الموظفين — Registration Page
   Jarvis / Sci-Fi Interface System
   ============================================================ */
:root{
  --bg-primary:#060A14;
  --bg-secondary:#0A1628;
  --bg-card:rgba(10,22,40,0.65);
  --accent-cyan:#00D4FF;
  --accent-blue:#0066FF;
  --accent-green:#00FF88;
  --accent-orange:#FF6B00;
  --accent-red:#FF0055;
  --text-primary:#E8F4FF;
  --text-secondary:#6B8FA8;
  --border-glass:rgba(0,212,255,0.15);
  --font-body:'Cairo',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --font-display:'Tajawal',sans-serif;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --transition-fast:200ms cubic-bezier(.4,0,.2,1);
  --transition-med:300ms cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{
  background:var(--bg-primary);
  color:var(--text-primary);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  line-height:1.5;
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}

/* ---------- HUD grid background ---------- */
.hud-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,212,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.045) 1px, transparent 1px);
  background-size:42px 42px;
  animation:gridDrift 60s linear infinite;
}
.hud-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(0,102,255,0.10), transparent 60%),
             radial-gradient(ellipse at 80% 100%, rgba(0,212,255,0.06), transparent 55%);
}
@keyframes gridDrift{
  0%{background-position:0 0;}
  100%{background-position:42px 42px;}
}
.scan-line{
  position:fixed;left:0;right:0;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  animation:scanMove 8s linear infinite;
  opacity:0.35;
}
@keyframes scanMove{
  0%{top:-2px;}
  100%{top:100%;}
}

/* ---------- Layout ---------- */
.app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
.container{width:100%;max-width:1180px;margin:0 auto;padding:0 16px;}

/* ---------- Glass card ---------- */
.glass-card{
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);
  border-radius:var(--radius-lg);
  position:relative;
}
.glass-card.glow{
  box-shadow:0 0 20px rgba(0,212,255,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ---------- Typography ---------- */
h1,h2,h3{font-family:var(--font-display);font-weight:800;letter-spacing:0.2px;}
.mono{font-family:var(--font-mono);}
.text-secondary{color:var(--text-secondary);}
.text-cyan{color:var(--accent-cyan);}
.text-green{color:var(--accent-green);}
.text-orange{color:var(--accent-orange);}
.text-red{color:var(--accent-red);}

/* ---------- Buttons ---------- */
button{
  font-family:var(--font-body);
  cursor:pointer;
  border:none;
  outline:none;
  transition:all var(--transition-fast);
}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:2px solid var(--accent-cyan);
  outline-offset:2px;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;
  border-radius:var(--radius-sm);
  font-weight:700;font-size:0.95rem;
  background:rgba(0,212,255,0.08);
  color:var(--accent-cyan);
  border:1px solid rgba(0,212,255,0.3);
}
.btn:hover{background:rgba(0,212,255,0.16);box-shadow:0 0 20px rgba(0,212,255,0.25);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-primary{
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  color:#04101C;border:none;
  box-shadow:0 0 20px rgba(0,212,255,0.3);
}
.btn-primary:hover{box-shadow:0 0 30px rgba(0,212,255,0.5);}
.btn-green{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.btn-green:hover{background:rgba(0,255,136,0.18);box-shadow:0 0 20px rgba(0,255,136,0.25);}
.btn-orange{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.btn-orange:hover{background:rgba(255,107,0,0.18);box-shadow:0 0 20px rgba(255,107,0,0.25);}
.btn-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.btn-red:hover{background:rgba(255,0,85,0.18);box-shadow:0 0 20px rgba(255,0,85,0.25);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-glass);}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--accent-cyan);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px;font-size:0.82rem;}
.btn-icon{padding:10px;border-radius:var(--radius-sm);}

/* ---------- Inputs ---------- */
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:600;}
.input, select.input, textarea.input{
  width:100%;
  padding:13px 16px;
  background:rgba(6,10,20,0.6);
  border:1px solid var(--border-glass);
  border-radius:var(--radius-sm);
  color:var(--text-primary);
  font-family:var(--font-body);
  font-size:1rem;
  transition:all var(--transition-fast);
}
.input::placeholder{color:rgba(107,143,168,0.6);}
.input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.12);}
.input.error{border-color:var(--accent-red);}
.field-error{color:var(--accent-red);font-size:0.8rem;margin-top:6px;display:none;}
.field-error.show{display:block;}
.input-mono{font-family:var(--font-mono);}

/* ---------- Badges ---------- */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  font-size:0.74rem;font-weight:700;
  font-family:var(--font-mono);
  white-space:nowrap;
}
.badge-orange{background:rgba(255,107,0,0.12);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.badge-green{background:rgba(0,255,136,0.12);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.badge-red{background:rgba(255,0,85,0.12);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.badge-cyan{background:rgba(0,212,255,0.12);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.pulse-dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;
  animation:pulseDot 1.6s ease-in-out infinite;
}
@keyframes pulseDot{
  0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor;}
  50%{opacity:0.5;}
}

/* ---------- Counting numbers ---------- */
.count-num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

/* ---------- Loading ---------- */
.spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(0,212,255,0.2);
  border-top-color:var(--accent-cyan);
  animation:spin 0.7s linear infinite;
  display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- Toast ---------- */
#toastHost{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:10px;
  width:calc(100% - 32px);max-width:420px;
}
.toast{
  padding:14px 18px;border-radius:var(--radius-sm);
  background:var(--bg-secondary);
  border:1px solid var(--border-glass);
  backdrop-filter:blur(16px);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  font-size:0.9rem;font-weight:600;
  display:flex;align-items:center;gap:10px;
  animation:toastIn var(--transition-med);
}
.toast.success{border-color:rgba(0,255,136,0.4);color:var(--accent-green);}
.toast.error{border-color:rgba(255,0,85,0.4);color:var(--accent-red);}
.toast.warn{border-color:rgba(255,107,0,0.4);color:var(--accent-orange);}
.toast.info{border-color:rgba(0,212,255,0.4);color:var(--accent-cyan);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}
.toast.hide{animation:toastOut var(--transition-fast) forwards;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(2,5,12,0.75);
  backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
.modal-overlay.show{display:flex;}
.modal{
  width:100%;max-width:460px;
  max-height:90vh;overflow-y:auto;
  padding:24px;
  animation:modalIn var(--transition-med);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h2{font-size:1.3rem;margin-bottom:18px;color:var(--accent-cyan);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;}

/* ---------- Visually hidden ---------- */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* ---------- Skip link ---------- */
.skip-link{
  position:absolute;right:8px;top:-50px;z-index:10000;
  background:var(--accent-cyan);color:#04101C;padding:10px 16px;
  border-radius:var(--radius-sm);font-weight:700;transition:top var(--transition-fast);
}
.skip-link:focus{top:8px;}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
.login-box{width:100%;max-width:420px;padding:36px 30px;text-align:center;}
.login-logo{
  font-family:var(--font-display);font-weight:900;font-size:1.6rem;
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:4px;letter-spacing:0.5px;
}
.login-sub{color:var(--text-secondary);font-size:0.85rem;margin-bottom:28px;font-family:var(--font-mono);}
.login-box .field{text-align:right;}
.lockout-box{
  margin-top:14px;padding:14px;border-radius:var(--radius-sm);
  background:rgba(255,0,85,0.08);border:1px solid rgba(255,0,85,0.3);
  color:var(--accent-red);font-size:0.88rem;text-align:center;
}
.lockout-timer{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;margin-top:6px;}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(6,10,20,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-glass);
  padding:14px 0;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:900;color:#04101C;font-size:1.1rem;
  box-shadow:0 0 18px rgba(0,212,255,0.4);
  flex-shrink:0;
}
.brand-text{font-family:var(--font-display);font-weight:800;font-size:1.05rem;line-height:1.2;}
.brand-text small{display:block;color:var(--text-secondary);font-size:0.68rem;font-weight:500;font-family:var(--font-mono);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.shop-pill{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:20px;
  background:rgba(0,212,255,0.06);border:1px solid var(--border-glass);
  font-size:0.85rem;font-weight:700;
}
.conn-indicator{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:20px;
  font-size:0.78rem;font-weight:700;font-family:var(--font-mono);
  border:1px solid var(--border-glass);
}
.conn-indicator.online{color:var(--accent-green);border-color:rgba(0,255,136,0.35);}
.conn-indicator.offline{color:var(--accent-red);border-color:rgba(255,0,85,0.35);}
.conn-indicator.syncing{color:var(--accent-orange);border-color:rgba(255,107,0,0.35);}

/* ============================================================
   DATE BAR
   ============================================================ */
.date-bar{padding:16px 0;}
.date-bar-card{padding:18px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;}
.date-bar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.date-day-name{font-family:var(--font-display);font-weight:800;font-size:1.15rem;color:var(--accent-cyan);}
.date-input-wrap{display:flex;align-items:center;gap:8px;}
.date-input-wrap input[type=date]{
  background:rgba(6,10,20,0.6);border:1px solid var(--border-glass);
  color:var(--text-primary);padding:9px 12px;border-radius:var(--radius-sm);
  font-family:var(--font-mono);font-size:0.92rem;color-scheme:dark;
}
.date-actual-note{font-size:0.76rem;color:var(--text-secondary);font-family:var(--font-mono);}
span.date-warn-badge{display:none;}
span.date-warn-badge.show{display:inline-flex;}

/* ============================================================
   SECTION CARD
   ============================================================ */
.section{padding:20px 0;}
.section-card{padding:22px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.section-title{font-family:var(--font-display);font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:10px;}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);box-shadow:0 0 10px var(--accent-cyan);}

/* ============================================================
   EMPLOYEE / ATTENDANCE LIST
   ============================================================ */
.emp-grid{display:flex;flex-direction:column;gap:10px;}
.emp-row{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 16px;border-radius:var(--radius-md);
  background:rgba(6,10,20,0.45);
  border:1px solid var(--border-glass);
  transition:all var(--transition-fast);
}
.emp-row:hover{border-color:rgba(0,212,255,0.35);background:rgba(6,10,20,0.65);}
.emp-row.locked{opacity:0.7;}
.emp-identity{display:flex;flex-direction:column;gap:4px;min-width:140px;flex:1 1 160px;}
.emp-name{font-weight:700;font-size:0.98rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.emp-rate{font-size:0.76rem;color:var(--text-secondary);font-family:var(--font-mono);}
.emp-times{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.time-chip{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;border-radius:var(--radius-sm);
  background:rgba(0,212,255,0.05);border:1px solid var(--border-glass);
  min-width:78px;
}
.time-chip label{font-size:0.66rem;color:var(--text-secondary);font-weight:700;}
.time-chip .val{font-family:var(--font-mono);font-weight:700;font-size:0.95rem;}
.time-chip.empty .val{color:var(--text-secondary);}
.emp-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-inline-start:auto;}
.hours-pill{
  font-family:var(--font-mono);font-weight:700;font-size:0.82rem;
  padding:6px 12px;border-radius:20px;
  background:rgba(0,255,136,0.08);color:var(--accent-green);
  border:1px solid rgba(0,255,136,0.3);
}
.hours-pill.extra{background:rgba(255,107,0,0.08);color:var(--accent-orange);border-color:rgba(255,107,0,0.3);}

.empty-state{
  text-align:center;padding:40px 20px;color:var(--text-secondary);
}
.empty-state .icon{font-size:2.2rem;margin-bottom:10px;opacity:0.6;}

/* ============================================================
   FOOTER ACTIONS
   ============================================================ */
.footer-actions{
  padding:18px 0 40px;
  display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;
}

/* ============================================================
   REASON FIELD HIGHLIGHT
   ============================================================ */
.reason-required{border-color:var(--accent-orange) !important;box-shadow:0 0 0 3px rgba(255,107,0,0.12) !important;}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:640px){
  .topbar-inner{flex-direction:column;align-items:stretch;gap:10px;}
  .topbar-inner .brand{justify-content:center;}
  .topbar-right{justify-content:center;width:100%;}
  .topbar-right .shop-pill{order:1;flex:1 1 100%;justify-content:center;}
  .topbar-right .conn-indicator{order:2;}
  .topbar-right #logoutBtn{order:3;flex:1;}
  .date-bar-card{flex-direction:column;align-items:stretch;}
  .emp-actions{margin-inline-start:0;width:100%;justify-content:flex-start;}
  .emp-actions .btn{flex:1 1 auto;min-width:120px;}
  .emp-row{flex-direction:column;align-items:stretch;}
  .emp-times{justify-content:center;}
  .login-box{padding:28px 20px;}
}


/* ============================================================
   ADMIN-ONLY ADDITIONS (component classes unique to admin view —
   verified zero collisions with registration's class names above)
   ============================================================ */

  background:radial-gradient(ellipse at 50% 0%, rgba(0,102,255,0.10), transparent 60%),radial-gradient(ellipse at 80% 100%, rgba(0,212,255,0.06), transparent 55%);
}
@keyframes gridDrift{0%{background-position:0 0;}100%{background-position:42px 42px;}}
.scan-line{
  position:fixed;left:0;right:0;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  animation:scanMove 8s linear infinite;opacity:0.35;
}
@keyframes scanMove{0%{top:-2px;}100%{top:100%;}}

  background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);position:relative;
}
.glass-card.glow{box-shadow:0 0 20px rgba(0,212,255,0.12), inset 0 1px 0 rgba(255,255,255,0.04);}
h1,h2,h3{font-family:var(--font-display);font-weight:800;letter-spacing:0.2px;}
.mono{font-family:var(--font-mono);}
.text-secondary{color:var(--text-secondary);}
.text-cyan{color:var(--accent-cyan);}
.text-green{color:var(--accent-green);}
.text-orange{color:var(--accent-orange);}
.text-red{color:var(--accent-red);}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;transition:all var(--transition-fast);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;border-radius:var(--radius-sm);font-weight:700;font-size:0.95rem;
  background:rgba(0,212,255,0.08);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.3);

.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-primary{background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));color:#04101C;border:none;box-shadow:0 0 20px rgba(0,212,255,0.3);}
.btn-primary:hover{box-shadow:0 0 30px rgba(0,212,255,0.5);}
.btn-green{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.btn-green:hover{background:rgba(0,255,136,0.18);box-shadow:0 0 20px rgba(0,255,136,0.25);}
.btn-orange{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.btn-orange:hover{background:rgba(255,107,0,0.18);box-shadow:0 0 20px rgba(255,107,0,0.25);}
.btn-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.btn-red:hover{background:rgba(255,0,85,0.18);box-shadow:0 0 20px rgba(255,0,85,0.25);}
.btn-cyan{background:rgba(0,212,255,0.1);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.btn-cyan:hover{background:rgba(0,212,255,0.18);box-shadow:0 0 20px rgba(0,212,255,0.25);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-glass);}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--accent-cyan);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px;font-size:0.82rem;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:600;}
.input, select.input, textarea.input{
  width:100%;padding:13px 16px;background:rgba(6,10,20,0.6);border:1px solid var(--border-glass);
  border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:1rem;transition:all var(--transition-fast);
}
.input::placeholder{color:rgba(107,143,168,0.6);}
.input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.12);}
.input.error{border-color:var(--accent-red);}
.field-error{color:var(--accent-red);font-size:0.8rem;margin-top:6px;display:none;}
.field-error.show{display:block;}
.input-mono{font-family:var(--font-mono);}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:0.74rem;font-weight:700;font-family:var(--font-mono);white-space:nowrap;}
.badge-orange{background:rgba(255,107,0,0.12);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.badge-green{background:rgba(0,255,136,0.12);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.badge-red{background:rgba(255,0,85,0.12);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.badge-cyan{background:rgba(0,212,255,0.12);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulseDot 1.6s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:0.5;}}
.count-num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,212,255,0.2);border-top-color:var(--accent-cyan);animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
#toastHost{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:420px;}
.toast{padding:14px 18px;border-radius:var(--radius-sm);background:var(--bg-secondary);border:1px solid var(--border-glass);backdrop-filter:blur(16px);box-shadow:0 8px 30px rgba(0,0,0,0.4);font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:10px;animation:toastIn var(--transition-med);}
.toast.success{border-color:rgba(0,255,136,0.4);color:var(--accent-green);}
.toast.error{border-color:rgba(255,0,85,0.4);color:var(--accent-red);}
.toast.warn{border-color:rgba(255,107,0,0.4);color:var(--accent-orange);}
.toast.info{border-color:rgba(0,212,255,0.4);color:var(--accent-cyan);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}
.toast.hide{animation:toastOut var(--transition-fast) forwards;}
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(2,5,12,0.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px;animation:modalIn var(--transition-med);}

.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.skip-link{position:absolute;right:8px;top:-50px;z-index:10000;background:var(--accent-cyan);color:#04101C;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;transition:top var(--transition-fast);}

   LOGIN
   ============================================================ */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}

.login-logo{font-family:var(--font-display);font-weight:900;font-size:1.6rem;background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px;letter-spacing:0.5px;}

.lockout-box{margin-top:14px;padding:14px;border-radius:var(--radius-sm);background:rgba(255,0,85,0.08);border:1px solid rgba(255,0,85,0.3);color:var(--accent-red);font-size:0.88rem;text-align:center;}
.lockout-timer{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;margin-top:6px;}

   ============================================================ */
.topbar{position:sticky;top:0;z-index:50;background:rgba(6,10,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-glass);padding:14px 0;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;color:#04101C;font-size:1.1rem;box-shadow:0 0 18px rgba(0,212,255,0.4);flex-shrink:0;}
.brand-text{font-family:var(--font-display);font-weight:800;font-size:1.05rem;line-height:1.2;}
.brand-text small{display:block;color:var(--text-secondary);font-size:0.68rem;font-weight:500;font-family:var(--font-mono);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.tab-nav-wrap{position:relative;}
.tab-nav-wrap::before, .tab-nav-wrap::after{
  content:'';position:absolute;top:14px;bottom:0;width:28px;pointer-events:none;z-index:2;
}
.tab-nav-wrap::before{right:0;background:linear-gradient(to left, var(--bg-primary), transparent);}
.tab-nav-wrap::after{left:0;background:linear-gradient(to right, var(--bg-primary), transparent);}
.tab-nav{display:flex;gap:6px;overflow-x:auto;padding:14px 0 0;scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
.tab-nav::-webkit-scrollbar{height:4px;}
.tab-nav::-webkit-scrollbar-thumb{background:var(--border-glass);border-radius:4px;}
.tab-btn{
  padding:10px 18px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  background:transparent;color:var(--text-secondary);border:1px solid transparent;
  font-weight:700;font-size:0.9rem;white-space:nowrap;flex-shrink:0;
}
.tab-btn.active{color:var(--accent-cyan);border-color:var(--border-glass);border-bottom-color:transparent;background:var(--bg-card);}
.tab-btn:hover:not(.active){color:var(--text-primary);}

/* ============================================================
   KPI CARDS
   ============================================================ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.kpi-card{padding:20px;position:relative;overflow:hidden;}
.kpi-card .label{font-size:0.8rem;color:var(--text-secondary);font-weight:700;margin-bottom:8px;}
.kpi-card .value{font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--accent-cyan);}
.kpi-card .value.green{color:var(--accent-green);}
.kpi-card .value.orange{color:var(--accent-orange);}
.kpi-card .value.red{color:var(--accent-red);}
.kpi-card .value.blue{color:var(--accent-blue);}
.kpi-card .sub{font-size:0.74rem;color:var(--text-secondary);margin-top:4px;}
.dash-alert{transition:background 0.18s ease;}
.dash-alert:hover{background:rgba(255,107,0,0.12) !important;}

/* ============================================================
   SECTION CARD
   ============================================================ */
.section{padding:20px 0;}
.section-card{padding:22px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.section-title{font-family:var(--font-display);font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:10px;}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);box-shadow:0 0 10px var(--accent-cyan);}
.section-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ============================================================
   DATA TABLE
   ============================================================ */
.table-wrap{overflow-x:auto;border-radius:var(--radius-md);border:1px solid var(--border-glass);}
table.data-table{width:100%;border-collapse:collapse;min-width:600px;}
table.data-table th{
  text-align:right;padding:12px 14px;font-size:0.78rem;color:var(--text-secondary);

table.data-table tr:hover td{background:rgba(0,212,255,0.03);}
.table-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* ============================================================
   FILTER BAR
   ============================================================ */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
.filter-bar .field{margin-bottom:0;min-width:150px;flex:1 1 150px;}

/* ============================================================
   APPROVAL CARDS
   ============================================================ */

  display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;border-radius:var(--radius-md);

.approval-info .meta{font-size:0.78rem;color:var(--text-secondary);font-family:var(--font-mono);margin-top:2px;}
.approval-actions{display:flex;gap:8px;}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);}
.empty-state .icon{font-size:2.2rem;margin-bottom:10px;opacity:0.6;}

/* ============================================================
   SETTINGS GRID
   ============================================================ */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--radius-md);background:rgba(6,10,20,0.45);border:1px solid var(--border-glass);}

.toggle-slider{position:absolute;inset:0;background:rgba(107,143,168,0.3);border-radius:20px;cursor:pointer;transition:all var(--transition-fast);}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:var(--text-primary);border-radius:50%;transition:all var(--transition-fast);}
.toggle-switch input:checked + .toggle-slider{background:var(--accent-cyan);box-shadow:0 0 12px rgba(0,212,255,0.4);}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(-20px);}

/* ============================================================
   SHOP CARD (settings)
   ============================================================ */
.shop-card{padding:18px;margin-bottom:12px;}
.shop-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.shop-card-title{font-weight:700;font-size:1.05rem;}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:640px){
  .topbar-inner{flex-direction:column;align-items:stretch;gap:10px;}
  .topbar-inner .brand{justify-content:center;}
  .topbar-right{justify-content:center;width:100%;}
  .topbar-right .btn{flex:1;}
  .login-box{padding:28px 20px;}
  .kpi-card .value{font-size:1.5rem;}
  .kpi-grid{grid-template-columns:1fr 1fr;}

  .approval-actions{width:100%;}
  .approval-actions .btn{flex:1;}
  .tab-btn{padding:8px 12px;font-size:0.78rem;}
  .tab-nav{gap:4px;}
  .filter-bar{flex-direction:column;align-items:stretch;}
  .filter-bar .field{width:100%;}
  .filter-bar > .btn{width:100%;}
  .table-actions{flex-direction:column;width:100%;}
  .table-actions .btn{width:100%;}

  .shop-card-head .table-actions{flex-direction:row;flex-wrap:wrap;}
  .shop-card-head .table-actions .btn{width:auto;flex:1 1 auto;}
}

#adminView .modal{max-width:560px;}

async function pbkdf2Hash(password, saltB64, iterations = 150000){
  const enc = new TextEncoder();

  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);

}
function bytesToB64(bytes){ let bin=""; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); }
function b64ToBytes(b64){ const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes; }
function constantTimeEqual(a,b){ if(a.length!==b.length) return false; let diff=0; for(let i=0;i<a.length;i++) diff|=a.charCodeAt(i)^b.charCodeAt(i); return diff===0; }

  const ua = navigator.userAgent + "|" + navigator.language + "|" + screen.width + "x" + screen.height;
  let hash = 0;
  for(let i=0;i<ua.length;i++) hash = ((hash << 5) - hash + ua.charCodeAt(i)) | 0;
  return "fp_" + Math.abs(hash).toString(36);
}

/* ============================================================
   DATE HELPERS
   ============================================================ */
function todayISO(){
  const d = new Date();
  const tzOff = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOff).toISOString().slice(0,10);
}
function dayNameAr(isoDate){
  const d = new Date(isoDate + "T12:00:00");
  return ARABIC_DAYS[d.getDay()];
}
function formatTimeOnly(date){
  if(!date) return null;
  const d = (date instanceof Date) ? date : date.toDate();
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "م" : "ص";
  h = h % 12; if(h === 0) h = 12;
  return `${String(h).padStart(2,"0")}:${m} ${ampm}`;
}
function formatFullTimestamp(ts){
  if(!ts) return "—";
  const d = ts instanceof Date ? ts : ts.toDate();
  return `${ARABIC_DAYS[d.getDay()]} ${d.toISOString().slice(0,10)} الساعة ${formatTimeOnly(d)}`;
}
function calcHours(checkIn, checkOut, normalHours = DEFAULT_NORMAL_HOURS){
  if(!checkIn || !checkOut) return { total: 0, base: 0, extra: 0 };
  const inD = checkIn instanceof Date ? checkIn : checkIn.toDate();
  const outD = checkOut instanceof Date ? checkOut : checkOut.toDate();
  let diffMs = outD - inD;
  if(diffMs < 0) diffMs = 0;
  const total = Math.round((diffMs / 3600000) * 100) / 100;
  const base = Math.min(total, normalHours);
  const extra = Math.max(total - normalHours, 0);
  return { total, base, extra: Math.round(extra*100)/100 };
}
/* Converts a decimal hour count (e.g. 1.25) into a clear "X ساعة و Y دقيقة"
   string — display-only formatter, all underlying math stays in decimal. */
function formatHoursMinutes(decimalHours){
  if(!decimalHours || decimalHours <= 0) return "0 دقيقة";
  const totalMinutes = Math.round(decimalHours * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  if(h === 0) return `${m} دقيقة`;
  if(m === 0) return `${h} ساعة`;
  return `${h} ساعة و ${m} دقيقة`;
}

/* ============================================================
   SANITIZATION
   ============================================================ */
function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function sanitize(html){ return window.DOMPurify ? DOMPurify.sanitize(html) : escapeHtml(html); }

/* ============================================================
   LAZY-LOAD SHEETJS (Excel library) ON DEMAND
   Loaded only when an export button is actually clicked, instead
   of blocking every page load with a large library most visits
   never use (admin checks dashboards/approvals far more often
   than it exports).
   ============================================================ */
function loadSheetJS(){
  if(window.XLSX) return Promise.resolve();
  if(window.__xlsxLoadingPromise) return window.__xlsxLoadingPromise;
  window.__xlsxLoadingPromise = new Promise((resolve, reject)=>{
    const script = document.createElement("script");
    script.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("XLSX failed to load"));
    document.head.appendChild(script);
  });
  return window.__xlsxLoadingPromise;
}

/* ============================================================

function toast(message, type = "info", duration = 4200){
  const host = document.getElementById("adminToastHost");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icons = { success:"✅", error:"⛔", warn:"⚠️", info:"ℹ️" };
  el.innerHTML = `<span aria-hidden="true">${icons[type]||""}</span><span>${escapeHtml(message)}</span>`;
  host.appendChild(el);
  setTimeout(()=>{ el.classList.add("hide"); setTimeout(()=>el.remove(),250); }, duration);
}

/* ============================================================
   RATE LIMITING (client-side deterrent — see security note)
   ============================================================ */
function getLoginAttempts(){
  try{ return JSON.parse(localStorage.getItem(ADMIN_LOGIN_ATTEMPTS_KEY) || '{"count":0,"lockedUntil":0}'); }
  catch{ return { count: 0, lockedUntil: 0 }; }
}
function setLoginAttempts(data){ localStorage.setItem(ADMIN_LOGIN_ATTEMPTS_KEY, JSON.stringify(data)); }
function getLockoutSeconds(attemptCount){
  let secs = 0;
  for(const tier of LOCKOUT_TIERS) if(attemptCount >= tier.attempts) secs = tier.seconds;
  return secs;
}
function recordFailedLogin(){
  const data = getLoginAttempts();
  data.count += 1;
  const lockoutSecs = getLockoutSeconds(data.count);
  if(lockoutSecs > 0) data.lockedUntil = Date.now() + lockoutSecs * 1000;
  setLoginAttempts(data);
  if(data.count >= 10) writeAuditLog("admin_login_lockout_30min", { attempts: data.count });
  return data;
}
function clearLoginAttempts(){ setLoginAttempts({ count: 0, lockedUntil: 0 }); }

   ANONYMOUS AUTH BOOTSTRAP

let currentUid = null;
const authReady = new Promise((resolve)=>{
  onAuthStateChanged(auth, async (user)=>{
    if(user){

      resolve(user);

      }

});

/* ============================================================
   ADMIN CONFIG BOOTSTRAP
   Creates the hashed admin password on first run if it doesn't
   exist yet in /system_config/admin. Never stores plaintext.
   ============================================================ */
async function ensureAdminConfig(){
  const ref = doc(db, "system_config", "admin");
  const snap = await getDoc(ref);
  if(snap.exists()) return snap.data();
  const { hash, salt, iterations } = await pbkdf2Hash(ADMIN_PASSWORD_PLAIN_FALLBACK);
  const config = { passwordHash: hash, passwordSalt: salt, passwordIterations: iterations, createdAt: serverTimestamp() };
  await setDoc(ref, config);
  return config;
}

/* ============================================================
   SESSION PERSISTENCE
   ============================================================ */
function saveSession(session){ sessionStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify(session)); }
function loadSession(){
  try{
    const raw = sessionStorage.getItem(ADMIN_SESSION_KEY);
    if(!raw) return null;
    const session = JSON.parse(raw);
    if(session.fingerprint !== getFingerprint()) return null;
    if(Date.now() - session.lastActivity > SESSION_IDLE_LIMIT_MS) return null;
    return session;
  }catch{ return null; }
}
function touchSession(){ if(state.session){ state.session.lastActivity = Date.now(); saveSession(state.session); } }
function clearSession(){ sessionStorage.removeItem(ADMIN_SESSION_KEY); state.session = null; }
setInterval(()=>{
  if(state.session && Date.now() - state.session.lastActivity > SESSION_IDLE_LIMIT_MS){
    toast("انتهت الجلسة بسبب الخمول — يرجى تسجيل الدخول مجددًا", "warn");
    handleLogout(true);
  }
}, 15000);
["click","keydown","touchstart"].forEach(evt=>{
  document.addEventListener(evt, ()=>{ if(state.session) touchSession(); }, { passive:true });
});

let lockoutInterval = null;
function renderLogin(){
  const app = document.getElementById("adminApp");
  app.innerHTML = `

      <div class="glass-card glow login-box">
        <div class="login-logo">GR دوام الموظفين</div>
        <div class="login-sub mono">ADMIN CONTROL PANEL</div>
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="adminPassword">كلمة مرور الإدارة</label>
            <input type="password" id="adminPassword" class="input input-mono" placeholder="••••••••" required aria-required="true" autocomplete="current-password">
            <div class="field-error" id="passError">كلمة المرور غير صحيحة</div>
          </div>
          <div id="lockoutBox"></div>
          <button type="submit" class="btn btn-primary btn-block" id="loginBtn" style="margin-top:8px;">دخول</button>
        </form>
      </div>
    </div>
  `;
  document.getElementById("loginForm").addEventListener("submit", handleLoginSubmit);
  checkLockoutUI();
}

function checkLockoutUI(){
  const box = document.getElementById("lockoutBox");
  const btn = document.getElementById("loginBtn");
  if(lockoutInterval){ clearInterval(lockoutInterval); lockoutInterval = null; }
  if(!box) return;
  const data = getLoginAttempts();
  const remaining = data.lockedUntil - Date.now();
  if(remaining > 0){
    btn.disabled = true;
    const tick = ()=>{
      const r = Math.max(0, data.lockedUntil - Date.now());
      if(r <= 0){ box.innerHTML = ""; btn.disabled = false; clearInterval(lockoutInterval); return; }
      const mins = Math.floor(r/60000);
      const secs = Math.floor((r%60000)/1000);
      box.innerHTML = `<div class="lockout-box">🔒 الحساب مقفل مؤقتًا بسبب محاولات فاشلة<div class="lockout-timer mono">${mins}:${String(secs).padStart(2,"0")}</div></div>`;
    };
    tick();
    lockoutInterval = setInterval(tick, 1000);
  }else{
    box.innerHTML = "";
    btn.disabled = false;
  }
}

async function handleLoginSubmit(e){
  e.preventDefault();
  const password = document.getElementById("adminPassword").value;
  const passError = document.getElementById("passError");
  passError.classList.remove("show");
  if(!password) return;

  const attemptData = getLoginAttempts();
  if(attemptData.lockedUntil > Date.now()){ checkLockoutUI(); return; }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التحقق...`;

  try{
    const config = await ensureAdminConfig();
    const valid = await verifyPassword(password, config.passwordHash, config.passwordSalt, config.passwordIterations || 150000);
    if(!valid){
      recordFailedLogin();
      passError.classList.add("show");
      writeAuditLog("admin_login_failed", {});
      checkLockoutUI();
      btn.disabled = false;
      btn.textContent = "دخول";
      return;
    }
    clearLoginAttempts();
    state.session = { loginAt: Date.now(), lastActivity: Date.now(), fingerprint: getFingerprint() };
    saveSession(state.session);
    writeAuditLog("admin_login_success", {});
    toast("أهلًا بك في لوحة الإدارة", "success");
    await renderMain();
  }catch(err){
    console.error(err);
    toast("تعذّر تسجيل الدخول — تحقق من الاتصال بالإنترنت", "error");
    btn.disabled = false;
    btn.textContent = "دخول";
  }
}

function handleLogout(silent = false){
  state.unsubscribers.forEach(fn=>{ try{ fn(); }catch{} });
  state.unsubscribers = [];
  clearSession();
  if(!silent) toast("تم تسجيل الخروج", "info");
  renderLogin();
}

/* ============================================================
   DATA LOADING — shops + cross-shop subscriptions
   ============================================================ */
async function loadAllShops(){
  try{
    const snap = await getDocs(collection(db, "shops"));
    state.shops = snap.docs.map(d=>({ id: d.id, ...d.data() })).sort((a,b)=>(a.shopNumber||0)-(b.shopNumber||0));
  }catch(e){
    console.error("Failed to load shops:", e);
    toast("تعذّر تحميل قائمة المحلات", "error");
  }
}

function subscribeGlobalData(){
  state.unsubscribers.forEach(fn=>{ try{ fn(); }catch{} });
  state.unsubscribers = [];

  state.shops.forEach(shop=>{
    const empCol = collection(db, "shops", shop.id, "employees");
    const unsub = onSnapshot(empCol, (snap)=>{
      state.employeesByShop[shop.id] = snap.docs.map(d=>({ id: d.id, shopId: shop.id, ...d.data() }));
      recomputePendingEmployees();
      if(state.activeTab === "approvals") renderApprovalsTab();
      if(state.activeTab === "employees") renderEmployeesTab();
      if(state.activeTab === "dashboard") renderDashboardTab();
    }, (err)=>console.error(`Employees sub error (${shop.id}):`, err));
    state.unsubscribers.push(unsub);
  });

  // Single live query across ALL shops' attendance records where approvalStatus == "pending".
  // Uses a Firestore collectionGroup query so this is one network round-trip + one
  // realtime listener total, instead of looping (shops × days) sequential reads.
  // NOTE: collection-group queries with a where() filter require a Firestore index to
  // be deployed (see firestore.indexes.json) — without it this fails with
  // "failed-precondition" and Firestore's error message includes a direct link to
  // auto-create the missing index in Firebase Console.
  const overtimeQuery = query(collectionGroup(db, "records"), where("approvalStatus", "==", "pending"));
  const unsubOvertime = onSnapshot(overtimeQuery, (snap)=>{
    state.pendingOvertimeError = null;
    state.pendingOvertime = snap.docs.map(d=>{
      // doc path: attendance/{shopId}_{date}/records/{employeeId}
      const attendanceDocId = d.ref.parent.parent.id;
      const sepIndex = attendanceDocId.lastIndexOf("_");
      const shopId = attendanceDocId.slice(0, sepIndex);
      const date = attendanceDocId.slice(sepIndex + 1);
      const shop = state.shops.find(s=>s.id===shopId);
      const emp = (state.employeesByShop[shopId]||[]).find(e=>e.id===d.id);
      return {
        shopId, shopName: shop?.name || shopId, date,
        employeeId: d.id, employeeName: emp?.name || "—",
        ...d.data()
      };
    }).sort((a,b)=> b.date.localeCompare(a.date));
    if(state.activeTab === "approvals") renderApprovalsTab();
    if(state.activeTab === "dashboard") renderDashboardTab();
  }, (err)=>{
    console.error("Overtime collectionGroup subscription error:", err);
    state.pendingOvertimeError = err.message || String(err);
    if(err.code === "failed-precondition"){
      toast("الساعات الإضافية تحتاج إعداد فهرس في قاعدة البيانات (مرة واحدة فقط) — راجع تبويب الموافقات للتفاصيل", "error", 9000);
    }else{
      toast("تعذّر تحميل الساعات الإضافية بانتظار الاعتماد", "error");
    }
    if(state.activeTab === "approvals") renderApprovalsTab();
  });
  state.unsubscribers.push(unsubOvertime);

  // Live listener for pending correction requests — for dashboard alert badge
  const corrQuery = query(collection(db, "correction_requests"), where("status", "==", "pending"), limit(100));
  const unsubCorr = onSnapshot(corrQuery, (snap) => {
    state.correctionRequestsPending = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if(state.activeTab === "dashboard") renderDashboardTab();
    if(state.activeTab === "corrections") renderCorrectionsTab();
  }, (err) => {
    console.warn("Correction requests sub error:", err);
    state.correctionRequestsPending = [];
  });
  state.unsubscribers.push(unsubCorr);
}

function recomputePendingEmployees(){
  state.pendingEmployees = [];
  Object.values(state.employeesByShop).flat().forEach(emp=>{
    if(emp.status === "pending"){
      const shop = state.shops.find(s=>s.id===emp.shopId);
      state.pendingEmployees.push({ ...emp, shopName: shop?.name || emp.shopId });
    }
  });
}

  content.querySelectorAll("[data-approve-ot]").forEach(btn=>{
    btn.addEventListener("click", ()=>setOvertimeApproval(btn.dataset.shop, btn.dataset.date, btn.dataset.approveOt, "approved"));
  });
  content.querySelectorAll("[data-reject-ot]").forEach(btn=>{
    btn.addEventListener("click", ()=>setOvertimeApproval(btn.dataset.shop, btn.dataset.date, btn.dataset.rejectOt, "rejected"));
  });
}

async function setEmployeeApproval(shopId, empId, status){
  try{
    if(status === "rejected"){
      await deleteDoc(doc(db, "shops", shopId, "employees", empId));
    }else{
      await updateDoc(doc(db, "shops", shopId, "employees", empId), { status: "approved", approvedAt: serverTimestamp() });
    }
    writeAuditLog(status==="approved"?"employee_approved":"employee_rejected", { shopId, empId });
    toast(status === "approved" ? "تم اعتماد الموظف" : "تم رفض الموظف وحذفه", "success");
    renderApprovalsTab();
  }catch(e){
    console.error(e);
    toast("فشلت العملية", "error");
  }
}

async function setOvertimeApproval(shopId, date, empId, status){
  try{
    const docId = `${shopId}_${date}`;
    await updateDoc(doc(db, "attendance", docId, "records", empId), {
      approvalStatus: status,
      reviewedAt: serverTimestamp()
    });
    writeAuditLog(status==="approved"?"overtime_approved":"overtime_rejected", { shopId, empId, date });
    toast(status === "approved" ? "تم اعتماد الساعات الإضافية" : "تم رفض الساعات الإضافية", "success");
    renderApprovalsTab();
  }catch(e){
    console.error(e);
    toast("فشلت العملية", "error");
  }
}

async function loadEditableDay(){
  const shopId = document.getElementById("editDayShop").value;
  const date = document.getElementById("editDayDate").value;
  const resultsEl = document.getElementById("editDayResults");
  if(!shopId || !date) return;
  resultsEl.innerHTML = `<div class="empty-state"><div class="spinner" aria-hidden="true"></div></div>`;

  const shop = state.shops.find(s=>s.id===shopId);
  const docId = `${shopId}_${date}`;
  let dayDoc, recordsSnap;
  try{
    [dayDoc, recordsSnap] = await Promise.all([
      getDoc(doc(db, "attendance", docId)),
      getDocs(collection(db, "attendance", docId, "records"))
    ]);
  }catch(e){
    console.error(e);
    resultsEl.innerHTML = `<div class="empty-state">تعذّر تحميل بيانات اليوم</div>`;
    return;
  }

  const employees = state.employeesByShop[shopId] || [];
  const records = {};
  recordsSnap.docs.forEach(d=>{ records[d.id] = d.data(); });
  const isLocked = dayDoc.exists() && dayDoc.data().locked === true;
  const normalHours = shop?.settings?.normalHours || DEFAULT_NORMAL_HOURS;

  if(employees.length === 0){
    resultsEl.innerHTML = `<div class="empty-state">لا يوجد موظفون في هذا المحل</div>`;
    return;
  }

  resultsEl.innerHTML = `
    <div style="margin-bottom:12px;">
      ${isLocked ? `<span class="badge badge-red">🔒 هذا اليوم مقفول في صفحة التسجيل — التعديل هنا متاح للإدارة فقط</span>` : `<span class="badge badge-green">هذا اليوم لا يزال مفتوحًا</span>`}
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>الموظف</th><th>الحالة</th><th>حضور</th><th>انصراف</th><th>ساعات</th><th></th></tr></thead>
        <tbody>
          ${employees.map(emp=>{
            const rec = records[emp.id] || {};
            const onVacation = rec.onVacation === true;
            const { total } = (rec.checkIn && rec.checkOut) ? calcHours(rec.checkIn, rec.checkOut, normalHours) : { total: 0 };
            return `<tr>
              <td>${escapeHtml(emp.name)}</td>
              <td>${onVacation ? '<span class="badge badge-cyan">🌴 إجازة</span>' : '—'}</td>
              <td class="mono">${onVacation ? "—" : (rec.checkIn ? formatTimeOnly(rec.checkIn) : "—")}</td>
              <td class="mono">${onVacation ? "—" : (rec.checkOut ? formatTimeOnly(rec.checkOut) : "—")}</td>
              <td class="mono">${total > 0 ? formatHoursMinutes(total) : "—"}</td>
              <td class="table-actions">
                <button class="btn btn-ghost btn-sm" data-edit-day-emp="${escapeHtml(emp.id)}">تعديل</button>
                <button class="btn ${onVacation ? 'btn-ghost' : 'btn-cyan'} btn-sm" data-toggle-vacation="${escapeHtml(emp.id)}">${onVacation ? 'إلغاء الإجازة' : '🌴 تسجيل إجازة'}</button>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;

  resultsEl.querySelectorAll("[data-edit-day-emp]").forEach(btn=>{
    btn.addEventListener("click", ()=>openEditDayRecordModal(shopId, date, btn.dataset.editDayEmp, records[btn.dataset.editDayEmp] || {}));
  });
  resultsEl.querySelectorAll("[data-toggle-vacation]").forEach(btn=>{
    btn.addEventListener("click", ()=>toggleVacationFromAdmin(shopId, date, btn.dataset.toggleVacation, records[btn.dataset.toggleVacation] || {}));
  });
}

async function toggleVacationFromAdmin(shopId, date, empId, rec){
  const newValue = !(rec.onVacation === true);
  if(newValue && (rec.checkIn || rec.checkOut)){
    const confirmed = await new Promise(resolve=>{
      showModal(`
        <h2>تسجيل إجازة</h2>
        <p class="text-secondary">هذا الموظف لديه تسجيل حضور/انصراف بالفعل في هذا اليوم. تسجيل إجازة الآن سيُبقي على وقت الحضور والانصراف المسجَّل لكنه سيُخفيهما من العرض ولن يُحسبا. هل تريد المتابعة؟</p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelToggleVacation">إلغاء</button>
          <button type="button" class="btn btn-primary" id="confirmToggleVacation">تأكيد</button>
        </div>
      `);
      document.getElementById("cancelToggleVacation").addEventListener("click", ()=>{ closeModal(); resolve(false); });
      document.getElementById("confirmToggleVacation").addEventListener("click", ()=>{ closeModal(); resolve(true); });
    });
    if(!confirmed) return;
  }
  try{
    await setDoc(doc(db, "attendance", `${shopId}_${date}`, "records", empId), {
      onVacation: newValue, adminEdited: true, adminEditedAt: serverTimestamp()
    }, { merge: true });
    writeAuditLog(newValue ? "vacation_marked_by_admin" : "vacation_cancelled_by_admin", { shopId, empId, date });
    toast(newValue ? "تم تسجيل الإجازة" : "تم إلغاء الإجازة", "success");
    loadEditableDay();
  }catch(err){
    console.error(err);
    toast("فشلت العملية", "error");
  }
}

function openEditDayRecordModal(shopId, date, empId, rec){
  const allEmployees = Object.values(state.employeesByShop).flat();
  const emp = allEmployees.find(e=>e.id===empId);
  const inVal = rec.checkIn ? toLocalTimeInputAdmin(rec.checkIn) : "";
  const outVal = rec.checkOut ? toLocalTimeInputAdmin(rec.checkOut) : "";
  showModal(`
    <h2>تعديل سجل — ${escapeHtml(emp?.name || "")}</h2>
    <p class="text-secondary" style="margin-bottom:14px;">${dayNameAr(date)} ${date}</p>
    <form id="editDayRecordForm">
      <div class="field">
        <label for="editDayIn">وقت الحضور</label>
        <input type="time" id="editDayIn" class="input input-mono" value="${inVal}">
      </div>
      <div class="field">
        <label for="editDayOut">وقت الانصراف</label>
        <input type="time" id="editDayOut" class="input input-mono" value="${outVal}">
      </div>
      <div class="field">
        <label for="editDayNote">ملاحظة (اختياري)</label>
        <textarea id="editDayNote" class="input" rows="2" maxlength="300">${escapeHtml(rec.note || "")}</textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelEditDayRecord">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ وإعادة الحساب</button>
      </div>
    </form>
  `);
  document.getElementById("cancelEditDayRecord").addEventListener("click", closeModal);
  document.getElementById("editDayRecordForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const inTime = document.getElementById("editDayIn").value;
    const outTime = document.getElementById("editDayOut").value;
    const note = document.getElementById("editDayNote").value.trim();
    const updates = {
      adminEdited: true,
      adminEditedAt: serverTimestamp(),
      previousCheckIn: rec.checkIn || null,
      previousCheckOut: rec.checkOut || null,
    };
    const finalCheckIn  = inTime  ? timeInputToDateAdmin(inTime, date)  : null;
    const finalCheckOut = outTime ? timeInputToDateAdmin(outTime, date) : null;
    if(finalCheckIn)  updates.checkIn  = finalCheckIn;
    if(finalCheckOut) updates.checkOut = finalCheckOut;
    if(note) updates.note = sanitize(note);

    // Recompute hours with updated values
    const ciCalc  = finalCheckIn  || (rec.checkIn  instanceof Date ? rec.checkIn  : rec.checkIn?.toDate?.()  || null);
    const coCalc  = finalCheckOut || (rec.checkOut instanceof Date ? rec.checkOut : rec.checkOut?.toDate?.() || null);
    const shopForCalc = state.shops.find(s => s.id === shopId);
    const normalHoursCalc = shopForCalc?.settings?.normalHours || DEFAULT_NORMAL_HOURS;
    if(ciCalc && coCalc){
      const { total, base, extra } = calcHours(ciCalc, coCalc, normalHoursCalc);
      updates.totalHours = Math.round(total * 100) / 100;
      updates.baseHours  = Math.round(base  * 100) / 100;
      updates.extraHours = Math.round(extra * 100) / 100;
      if(extra <= 0) updates.approvalStatus = null;
    }

    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
    try{
      await setDoc(doc(db, "attendance", `${shopId}_${date}`, "records", empId), updates, { merge: true });
      writeAuditLog("admin_edited_locked_day", {
        shopId, empId, date,
        oldCheckIn: rec.checkIn?.toDate?.()?.toISOString() || null,
        oldCheckOut: rec.checkOut?.toDate?.()?.toISOString() || null,
        newCheckIn: inTime || null,
        newCheckOut: outTime || null,
        editReason: note || null,
      });
      toast("تم حفظ التعديل — أعد تشغيل التقرير/الرواتب لتحديث الحساب", "success");
      closeModal();
      loadEditableDay();
    }catch(err){
      console.error(err);
      toast("فشل حفظ التعديل", "error");
      btn.disabled = false; btn.textContent = "حفظ وإعادة الحساب";
    }
  });
}
function toLocalTimeInputAdmin(ts){
  const d = ts instanceof Date ? ts : ts.toDate();
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function timeInputToDateAdmin(timeStr, dateStr){
  const [h,m] = timeStr.split(":").map(Number);
  const d = new Date(dateStr + "T00:00:00");
  d.setHours(h, m, 0, 0);
  return d;
}

/* ============================================================

   ============================================================ */
function showModal(innerHtml){
  let overlay = document.getElementById("modalOverlay");
  if(!overlay){
    overlay = document.createElement("div");
    overlay.id = "modalOverlay";
    overlay.className = "modal-overlay";
    overlay.innerHTML = `<div class="glass-card glow modal" id="modalContent" role="dialog" aria-modal="true"></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeModal(); });
    document.addEventListener("keydown", (e)=>{ if(e.key === "Escape") closeModal(); });
  }
  document.getElementById("modalContent").innerHTML = innerHtml;
  overlay.classList.add("show");
}
function closeModal(){
  const overlay = document.getElementById("modalOverlay");
  if(overlay) overlay.classList.remove("show");
}

function openAddEmployeeToShopModal(shopId){
  const shop = state.shops.find(s=>s.id===shopId);
  if(!shop) return;
  showModal(`
    <h2>إضافة موظف — ${escapeHtml(shop.name)}</h2>
    <p class="text-secondary" style="margin-bottom:14px;font-size:0.83rem;">سيتم توليد رابط خاص بالموظف تلقائيًا يمكّنه من تسجيل الحضور والانصراف بنفسه.</p>
    <form id="addEmpShopForm">
      <div class="field">
        <label for="newEmpShopName">اسم الموظف (بالعربي) *</label>
        <input type="text" id="newEmpShopName" class="input" required maxlength="80" autocomplete="off" placeholder="مثال: أحمد حسن">
      </div>
      <div class="field">
        <label for="newEmpShopNameEn">اسم الموظف (بالإنجليزي — للرابط)</label>
        <input type="text" id="newEmpShopNameEn" class="input input-mono" maxlength="60" placeholder="ahmed-hassan (اختياري، سيتم توليده تلقائيًا)">
      </div>
      <div class="field">
        <label for="newEmpShopRate">سعر الساعة (€)</label>
        <input type="number" id="newEmpShopRate" class="input input-mono" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelAddEmpShop">إلغاء</button>
        <button type="submit" class="btn btn-primary">إضافة وتوليد الرابط</button>
      </div>
    </form>
  `);
  // Auto-suggest slug from Arabic name
  document.getElementById("newEmpShopName").addEventListener("input", e=>{
    const slug = e.target.value.replace(/[\u0621-\u064A]/g,c=>{
      const m={"ا":"a","ب":"b","ت":"t","ث":"th","ج":"j","ح":"h","خ":"kh","د":"d","ذ":"th","ر":"r","ز":"z","س":"s","ش":"sh","ص":"s","ض":"d","ط":"t","ظ":"z","ع":"a","غ":"gh","ف":"f","ق":"q","ك":"k","ل":"l","م":"m","ن":"n","ه":"h","و":"w","ي":"y","ة":"a","ى":"a"};
      return m[c]||c;
    }).replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"").toLowerCase();
    const enField = document.getElementById("newEmpShopNameEn");
    if(!enField.value) enField.value = slug;
  });
  document.getElementById("cancelAddEmpShop").addEventListener("click", closeModal);
  document.getElementById("addEmpShopForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const name = sanitize(document.getElementById("newEmpShopName").value.trim());
    const nameSlugRaw = document.getElementById("newEmpShopNameEn").value.trim();
    const nameSlug = nameSlugRaw
      ? nameSlugRaw.toLowerCase().replace(/[^a-z0-9-]/g,"").replace(/\s+/g,"-")
      : name.replace(/[\u0621-\u064A]/g,c=>{
          const m={"ا":"a","ب":"b","ت":"t","ث":"th","ج":"j","ح":"h","خ":"kh","د":"d","ذ":"th","ر":"r","ز":"z","س":"s","ش":"sh","ص":"s","ض":"d","ط":"t","ظ":"z","ع":"a","غ":"gh","ف":"f","ق":"q","ك":"k","ل":"l","م":"m","ن":"n","ه":"h","و":"w","ي":"y","ة":"a","ى":"a"};
          return m[c]||c;
        }).replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"").toLowerCase() || `emp-${Date.now()}`;
    const rateVal = document.getElementById("newEmpShopRate").value;
    if(!name){ toast("أدخل اسم الموظف","warn"); return; }

    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span> جاري الإضافة...`;

    try{
      // Generate unique 128-bit token (the employee's permanent secret URL key)
      const token = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,"0")).join("");
      const empId = `emp_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      const empData = {
        name, nameSlug, token,
        hourlyRate: rateVal ? parseFloat(rateVal) : null,
        status: "active",
        shopId, tenantId: shopId,
        addedByAdmin: true,
        createdAt: serverTimestamp(),
        approvedAt: serverTimestamp(),
      };

      // 1. Save to the shop's employee sub-collection (tenant-scoped)
      await setDoc(doc(db,"shops",shopId,"employees",empId), empData);

      // 2. Write to root-level token index so employee.html can resolve
      //    token → employeeId+shopId without knowing either in advance.
      //    This is the core of the Employee Self-Check-In architecture.
      await setDoc(doc(db,"employees_by_token",token),{
        token, employeeId: empId,
        shopId, tenantId: shopId,
        name, nameSlug,
        createdAt: serverTimestamp(),
      });

      writeAuditLog("employee_added_by_admin",{ shopId, name, empId, token });
      toast(`تمت إضافة ${name} وتوليد الرابط الخاص به`,"success",5000);
      closeModal();
    }catch(err){
      console.error(err);
      toast("فشلت إضافة الموظف","error");
      btn.disabled=false; btn.textContent="إضافة وتوليد الرابط";
    }
  });
}

      </div>

        <button type="submit" class="btn btn-primary">إضافة</button>
      </div>
    </form>
  `);
  document.getElementById("cancelAddShop").addEventListener("click", closeModal);
  document.getElementById("addShopForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const name = document.getElementById("newShopName").value.trim();
    const ownerName = document.getElementById("newShopOwner").value.trim();
    const username = document.getElementById("newShopUsername").value.trim().toLowerCase();
    const number = document.getElementById("newShopNumber").value;
    const password = document.getElementById("newShopPassword").value;
    const hours = parseFloat(document.getElementById("newShopHours").value) || DEFAULT_NORMAL_HOURS;
    const usernameErr = document.getElementById("newShopUsernameError");

    if(username.length < 4){ usernameErr.classList.add("show"); return; }
    usernameErr.classList.remove("show");
    if(!name || password.length < 6) return;

    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
    try{
      // Check username uniqueness
      const existingQ = query(collection(db,"shops"), where("username","==",username), limit(1));
      const existingSnap = await getDocs(existingQ);
      if(!existingSnap.empty){
        toast("اسم المستخدم هذا مستخدم بالفعل — اختر اسماً آخر","error");
        btn.disabled=false; btn.textContent="إضافة";
        return;
      }
      const { hash, salt, iterations } = await pbkdf2Hash(password);
      const ref = await addDoc(collection(db,"shops"), {
        name: sanitize(name),
        ownerName: ownerName ? sanitize(ownerName) : null,
        username,
        shopNumber: number ? parseInt(number) : null,
        passwordHash: hash, passwordSalt: salt, passwordIterations: iterations,
        settings: { normalHours: hours, requireReason: true },
        archived: false,
        createdAt: serverTimestamp()
      });
      writeAuditLog("shop_created", { shopId: ref.id, name, ownerName, username });
      toast("تم إضافة المحل", "success");
      await loadAllShops();
      subscribeGlobalData();
      closeModal();
      renderShopsTab();
    }catch(err){
      console.error(err);
      toast("فشلت إضافة المحل", "error");
      btn.disabled = false; btn.textContent = "إضافة";
    }
  });
}

    await updateDoc(doc(db,"shops",shopId), { archived: !shop.archived });
    writeAuditLog(shop.archived ? "shop_unarchived" : "shop_archived", { shopId });
    toast(shop.archived ? "تم إلغاء أرشفة المحل" : "تم أرشفة المحل", "success");

    renderShopsTab();
  }catch(err){
    console.error(err);
    toast("فشلت العملية", "error");
  }
}

function isoRange(fromISO, toISO){
  const dates = [];
  let cur = new Date(fromISO + "T00:00:00");
  const end = new Date(toISO + "T00:00:00");
  while(cur <= end){
    const tzOff = cur.getTimezoneOffset()*60000;
    dates.push(new Date(cur.getTime()-tzOff).toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

async function renderReportsTab(){
  const content = document.getElementById("tabContent");
  const today = todayISO();
  const defaultFrom = (()=>{ const d=new Date(); d.setDate(d.getDate()-6); const tz=d.getTimezoneOffset()*60000; return new Date(d.getTime()-tz).toISOString().slice(0,10); })();

  content.innerHTML = `
    <div class="glass-card section-card">
      <div class="section-head">
        <div class="section-title"><span class="dot" aria-hidden="true"></span> تقارير الحضور</div>
        <div class="section-actions">
          <button class="btn btn-green btn-sm" id="exportReportBtn">⬇ تصدير Excel</button>
        </div>
      </div>
      <div class="filter-bar">
        <div class="field">
          <label for="repShop">المحل</label>
          <select id="repShop" class="input">
            <option value="">كل المحلات</option>

    </div>
  `;

  let lastReportRows = [];

  async function runReport(){
    const shopFilter = document.getElementById("repShop").value;
    const from = document.getElementById("repFrom").value;
    const to = document.getElementById("repTo").value;
    if(!from || !to || from > to){ toast("نطاق التاريخ غير صحيح", "error"); return; }

    const resultsEl = document.getElementById("reportResults");
    resultsEl.innerHTML = `<div class="empty-state"><div class="spinner" aria-hidden="true"></div></div>`;

    const shopsToQuery = shopFilter ? state.shops.filter(s=>s.id===shopFilter) : state.shops;
    const dates = isoRange(from, to);
    const rows = [];

    // Fetch every shop×day combination in parallel instead of sequential awaits —
    // turns a month-long report across several shops from dozens of round-trips
    // taken one at a time into a single batch.
    const fetchJobs = [];
    for(const shop of shopsToQuery){
      for(const date of dates){
        const docId = `${shop.id}_${date}`;
        fetchJobs.push(
          getDocs(collection(db,"attendance",docId,"records"))
            .then(snap => ({ shop, date, snap }))
            .catch(() => null)
        );
      }
    }
    const fetchResults = await Promise.all(fetchJobs);

    for(const result of fetchResults){
      if(!result) continue;
      const { shop, date, snap } = result;
      snap.docs.forEach(r=>{
        const rec = r.data();
        const emp = (state.employeesByShop[shop.id]||[]).find(e=>e.id===r.id);
        const onVacation = rec.onVacation === true;
        const { total, base, extra } = onVacation ? { total:0, base:0, extra:0 } : calcHours(rec.checkIn, rec.checkOut, shop.settings?.normalHours || DEFAULT_NORMAL_HOURS);
        rows.push({
          shopName: shop.name, date, dayName: dayNameAr(date),
          employeeName: emp?.name || "—",
          onVacation,
          checkIn: onVacation ? "—" : (rec.checkIn ? formatTimeOnly(rec.checkIn) : "—"),
          checkOut: onVacation ? "—" : (rec.checkOut ? formatTimeOnly(rec.checkOut) : "—"),
          total, base, extra,
          reason: rec.reason || "",
          approvalStatus: rec.approvalStatus || (extra>0 ? "—" : "")
        });
      });
    }
    // Keep a stable, predictable order since Promise.all results aren't guaranteed
    // to be grouped by shop/date the way the old sequential loop produced.
    rows.sort((a,b)=> a.date === b.date ? a.shopName.localeCompare(b.shopName,"ar") : a.date.localeCompare(b.date));
    lastReportRows = rows;


    if(rows.length === 0){
      resultsEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div>لا توجد بيانات في هذا النطاق</div>`;

          <thead><tr><th>المحل</th><th>التاريخ</th><th>الموظف</th><th>حضور</th><th>انصراف</th><th>إجمالي الساعات</th><th>إضافي</th><th>الحالة</th></tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td>${escapeHtml(r.shopName)}</td>
              <td class="mono">${r.dayName} ${r.date}</td>
              <td>${escapeHtml(r.employeeName)}</td>
              <td class="mono">${r.checkIn}</td>
              <td class="mono">${r.checkOut}</td>
              <td class="mono">${formatHoursMinutes(r.total)}</td>
              <td class="mono">${r.extra > 0 ? formatHoursMinutes(r.extra) : "—"}</td>
              <td>${r.onVacation ? '<span class="badge badge-cyan">🌴 إجازة</span>' : r.approvalStatus === "pending" ? '<span class="badge badge-orange">معلّق</span>' : r.approvalStatus === "approved" ? '<span class="badge badge-green">معتمد</span>' : r.approvalStatus === "rejected" ? '<span class="badge badge-red">مرفوض</span>' : '—'}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  document.getElementById("runReportBtn").addEventListener("click", runReport);
  document.getElementById("exportReportBtn").addEventListener("click", async ()=>{
    if(lastReportRows.length === 0){ toast("شغّل التقرير أولًا قبل التصدير", "warn"); return; }
    const exportBtn = document.getElementById("exportReportBtn");
    exportBtn.disabled = true;
    const originalLabel = exportBtn.textContent;
    exportBtn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التجهيز...`;
    try{
      await loadSheetJS();
    }catch(e){
      toast("تعذّر تحميل مكتبة Excel — تحقق من الاتصال", "error");
      exportBtn.disabled = false; exportBtn.textContent = originalLabel;
      return;
    }
    exportBtn.disabled = false; exportBtn.textContent = originalLabel;
    const data = lastReportRows.map(r=>({
      "المحل": r.shopName, "اليوم": r.dayName, "التاريخ": r.date, "الموظف": r.employeeName,
      "الحالة": r.onVacation ? "إجازة" : "عمل عادي",
      "حضور": r.checkIn, "انصراف": r.checkOut, "إجمالي الساعات": r.total,
      "ساعات أساسية": r.base, "ساعات إضافية": r.extra, "بيان السبب": r.reason,
      "حالة الاعتماد": r.onVacation ? "—" : r.approvalStatus
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{wch:18},{wch:10},{wch:12},{wch:22},{wch:12},{wch:10},{wch:10},{wch:12},{wch:12},{wch:12},{wch:30},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "التقرير");
    XLSX.writeFile(wb, `GR_تقرير_${todayISO()}.xlsx`);
    writeAuditLog("report_exported", { rowCount: lastReportRows.length });
  });
}
