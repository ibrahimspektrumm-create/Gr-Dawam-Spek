<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://www.gstatic.com https://cdn.sheetjs.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.sheetjs.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;">
<meta http-equiv="X-Frame-Options" content="DENY">
<title>GR دوام الموظفين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   GR دوام الموظفين — Merged Single-File App
   (index landing + registration app + admin app)
   Base styles below are shared by all three views.
   ============================================================ */

/* ============================================================
   GR دوام الموظفين — Registration Page
   Jarvis / Sci-Fi Interface System
   ============================================================ */
:root{
  --bg-primary:#060A14;
  --bg-secondary:#0A1628;
  --bg-card:rgba(10,22,40,0.65);
  --accent-cyan:#00D4FF;
  --accent-blue:#0066FF;
  --accent-green:#00FF88;
  --accent-orange:#FF6B00;
  --accent-red:#FF0055;
  --text-primary:#E8F4FF;
  --text-secondary:#6B8FA8;
  --border-glass:rgba(0,212,255,0.15);
  --font-body:'Cairo',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --font-display:'Tajawal',sans-serif;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --transition-fast:200ms cubic-bezier(.4,0,.2,1);
  --transition-med:300ms cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{
  background:var(--bg-primary);
  color:var(--text-primary);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  line-height:1.5;
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}

/* ---------- HUD grid background ---------- */
.hud-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,212,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.045) 1px, transparent 1px);
  background-size:42px 42px;
  animation:gridDrift 60s linear infinite;
}
.hud-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(0,102,255,0.10), transparent 60%),
             radial-gradient(ellipse at 80% 100%, rgba(0,212,255,0.06), transparent 55%);
}
@keyframes gridDrift{
  0%{background-position:0 0;}
  100%{background-position:42px 42px;}
}
.scan-line{
  position:fixed;left:0;right:0;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  animation:scanMove 8s linear infinite;
  opacity:0.35;
}
@keyframes scanMove{
  0%{top:-2px;}
  100%{top:100%;}
}

/* ---------- Layout ---------- */
.app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
.container{width:100%;max-width:1180px;margin:0 auto;padding:0 16px;}

/* ---------- Glass card ---------- */
.glass-card{
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);
  border-radius:var(--radius-lg);
  position:relative;
}
.glass-card.glow{
  box-shadow:0 0 20px rgba(0,212,255,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ---------- Typography ---------- */
h1,h2,h3{font-family:var(--font-display);font-weight:800;letter-spacing:0.2px;}
.mono{font-family:var(--font-mono);}
.text-secondary{color:var(--text-secondary);}
.text-cyan{color:var(--accent-cyan);}
.text-green{color:var(--accent-green);}
.text-orange{color:var(--accent-orange);}
.text-red{color:var(--accent-red);}

/* ---------- Buttons ---------- */
button{
  font-family:var(--font-body);
  cursor:pointer;
  border:none;
  outline:none;
  transition:all var(--transition-fast);
}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:2px solid var(--accent-cyan);
  outline-offset:2px;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;
  border-radius:var(--radius-sm);
  font-weight:700;font-size:0.95rem;
  background:rgba(0,212,255,0.08);
  color:var(--accent-cyan);
  border:1px solid rgba(0,212,255,0.3);
}
.btn:hover{background:rgba(0,212,255,0.16);box-shadow:0 0 20px rgba(0,212,255,0.25);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-primary{
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  color:#04101C;border:none;
  box-shadow:0 0 20px rgba(0,212,255,0.3);
}
.btn-primary:hover{box-shadow:0 0 30px rgba(0,212,255,0.5);}
.btn-green{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.btn-green:hover{background:rgba(0,255,136,0.18);box-shadow:0 0 20px rgba(0,255,136,0.25);}
.btn-orange{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.btn-orange:hover{background:rgba(255,107,0,0.18);box-shadow:0 0 20px rgba(255,107,0,0.25);}
.btn-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.btn-red:hover{background:rgba(255,0,85,0.18);box-shadow:0 0 20px rgba(255,0,85,0.25);}
.btn-cyan{background:rgba(0,212,255,0.08);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.btn-cyan:hover{background:rgba(0,212,255,0.16);box-shadow:0 0 18px rgba(0,212,255,0.2);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-glass);}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--accent-cyan);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px;font-size:0.82rem;}
.btn-icon{padding:10px;border-radius:var(--radius-sm);}
/* البند 13: pending checkout indicator */
.time-chip.pending-out .val{color:var(--accent-orange);animation:pulse-orange 1.5s infinite;}
@keyframes pulse-orange{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* ---------- Inputs ---------- */
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:600;}
.input, select.input, textarea.input{
  width:100%;
  padding:13px 16px;
  background:rgba(6,10,20,0.6);
  border:1px solid var(--border-glass);
  border-radius:var(--radius-sm);
  color:var(--text-primary);
  font-family:var(--font-body);
  font-size:1rem;
  transition:all var(--transition-fast);
}
.input::placeholder{color:rgba(107,143,168,0.6);}
.input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.12);}
.input.error{border-color:var(--accent-red);}
.field-error{color:var(--accent-red);font-size:0.8rem;margin-top:6px;display:none;}
.field-error.show{display:block;}
.input-mono{font-family:var(--font-mono);}

/* ---------- Badges ---------- */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  font-size:0.74rem;font-weight:700;
  font-family:var(--font-mono);
  white-space:nowrap;
}
.badge-orange{background:rgba(255,107,0,0.12);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.badge-green{background:rgba(0,255,136,0.12);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.badge-red{background:rgba(255,0,85,0.12);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.badge-cyan{background:rgba(0,212,255,0.12);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.pulse-dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;
  animation:pulseDot 1.6s ease-in-out infinite;
}
@keyframes pulseDot{
  0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor;}
  50%{opacity:0.5;}
}

/* ---------- Counting numbers ---------- */
.count-num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

/* ---------- Loading ---------- */
.spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(0,212,255,0.2);
  border-top-color:var(--accent-cyan);
  animation:spin 0.7s linear infinite;
  display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- Toast ---------- */
#toastHost{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:10px;
  width:calc(100% - 32px);max-width:420px;
}
.toast{
  padding:14px 18px;border-radius:var(--radius-sm);
  background:var(--bg-secondary);
  border:1px solid var(--border-glass);
  backdrop-filter:blur(16px);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  font-size:0.9rem;font-weight:600;
  display:flex;align-items:center;gap:10px;
  animation:toastIn var(--transition-med);
}
.toast.success{border-color:rgba(0,255,136,0.4);color:var(--accent-green);}
.toast.error{border-color:rgba(255,0,85,0.4);color:var(--accent-red);}
.toast.warn{border-color:rgba(255,107,0,0.4);color:var(--accent-orange);}
.toast.info{border-color:rgba(0,212,255,0.4);color:var(--accent-cyan);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}
.toast.hide{animation:toastOut var(--transition-fast) forwards;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(2,5,12,0.75);
  backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
.modal-overlay.show{display:flex;}
.modal{
  width:100%;max-width:460px;
  max-height:90vh;overflow-y:auto;
  padding:24px;
  animation:modalIn var(--transition-med);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h2{font-size:1.3rem;margin-bottom:18px;color:var(--accent-cyan);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;}

/* ---------- Visually hidden ---------- */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* ---------- Skip link ---------- */
.skip-link{
  position:absolute;right:8px;top:-50px;z-index:10000;
  background:var(--accent-cyan);color:#04101C;padding:10px 16px;
  border-radius:var(--radius-sm);font-weight:700;transition:top var(--transition-fast);
}
.skip-link:focus{top:8px;}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
.login-box{width:100%;max-width:420px;padding:36px 30px;text-align:center;}
.login-logo{
  font-family:var(--font-display);font-weight:900;font-size:1.6rem;
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:4px;letter-spacing:0.5px;
}
.login-sub{color:var(--text-secondary);font-size:0.85rem;margin-bottom:28px;font-family:var(--font-mono);}
.login-box .field{text-align:right;}
.lockout-box{
  margin-top:14px;padding:14px;border-radius:var(--radius-sm);
  background:rgba(255,0,85,0.08);border:1px solid rgba(255,0,85,0.3);
  color:var(--accent-red);font-size:0.88rem;text-align:center;
}
.lockout-timer{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;margin-top:6px;}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(6,10,20,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-glass);
  padding:14px 0;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:900;color:#04101C;font-size:1.1rem;
  box-shadow:0 0 18px rgba(0,212,255,0.4);
  flex-shrink:0;
}
.brand-text{font-family:var(--font-display);font-weight:800;font-size:1.05rem;line-height:1.2;}
.brand-text small{display:block;color:var(--text-secondary);font-size:0.68rem;font-weight:500;font-family:var(--font-mono);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.shop-pill{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:20px;
  background:rgba(0,212,255,0.06);border:1px solid var(--border-glass);
  font-size:0.85rem;font-weight:700;
}
.conn-indicator{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:20px;
  font-size:0.78rem;font-weight:700;font-family:var(--font-mono);
  border:1px solid var(--border-glass);
}
.conn-indicator.online{color:var(--accent-green);border-color:rgba(0,255,136,0.35);}
.conn-indicator.offline{color:var(--accent-red);border-color:rgba(255,0,85,0.35);}
.conn-indicator.syncing{color:var(--accent-orange);border-color:rgba(255,107,0,0.35);}

/* ============================================================
   DATE BAR
   ============================================================ */
.date-bar{padding:16px 0;}
.date-bar-card{padding:18px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;}
.date-bar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.date-day-name{font-family:var(--font-display);font-weight:800;font-size:1.15rem;color:var(--accent-cyan);}
.date-input-wrap{display:flex;align-items:center;gap:8px;}
.date-input-wrap input[type=date]{
  background:rgba(6,10,20,0.6);border:1px solid var(--border-glass);
  color:var(--text-primary);padding:9px 12px;border-radius:var(--radius-sm);
  font-family:var(--font-mono);font-size:0.92rem;color-scheme:dark;
}
.date-actual-note{font-size:0.76rem;color:var(--text-secondary);font-family:var(--font-mono);}
span.date-warn-badge{display:none;}
span.date-warn-badge.show{display:inline-flex;}

/* ============================================================
   SECTION CARD
   ============================================================ */
.section{padding:20px 0;}
.section-card{padding:22px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.section-title{font-family:var(--font-display);font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:10px;}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);box-shadow:0 0 10px var(--accent-cyan);}

/* ============================================================
   EMPLOYEE / ATTENDANCE LIST
   ============================================================ */
.emp-grid{display:flex;flex-direction:column;gap:10px;}
.emp-row{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 16px;border-radius:var(--radius-md);
  background:rgba(6,10,20,0.45);
  border:1px solid var(--border-glass);
  transition:all var(--transition-fast);
}
.emp-row:hover{border-color:rgba(0,212,255,0.35);background:rgba(6,10,20,0.65);}
.emp-row.locked{opacity:0.7;}
.emp-identity{display:flex;flex-direction:column;gap:4px;min-width:140px;flex:1 1 160px;}
.emp-name{font-weight:700;font-size:0.98rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.emp-rate{font-size:0.76rem;color:var(--text-secondary);font-family:var(--font-mono);}
.emp-times{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.time-chip{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;border-radius:var(--radius-sm);
  background:rgba(0,212,255,0.05);border:1px solid var(--border-glass);
  min-width:78px;
}
.time-chip label{font-size:0.66rem;color:var(--text-secondary);font-weight:700;}
.time-chip .val{font-family:var(--font-mono);font-weight:700;font-size:0.95rem;}
.time-chip.empty .val{color:var(--text-secondary);}
.emp-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-inline-start:auto;}
.hours-pill{
  font-family:var(--font-mono);font-weight:700;font-size:0.82rem;
  padding:6px 12px;border-radius:20px;
  background:rgba(0,255,136,0.08);color:var(--accent-green);
  border:1px solid rgba(0,255,136,0.3);
}
.hours-pill.extra{background:rgba(255,107,0,0.08);color:var(--accent-orange);border-color:rgba(255,107,0,0.3);}

.empty-state{
  text-align:center;padding:40px 20px;color:var(--text-secondary);
}
.empty-state .icon{font-size:2.2rem;margin-bottom:10px;opacity:0.6;}

/* ============================================================
   FOOTER ACTIONS
   ============================================================ */
.footer-actions{
  padding:18px 0 40px;
  display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;
}

/* ============================================================
   REASON FIELD HIGHLIGHT
   ============================================================ */
.reason-required{border-color:var(--accent-orange) !important;box-shadow:0 0 0 3px rgba(255,107,0,0.12) !important;}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:640px){
  .topbar-inner{flex-direction:column;align-items:stretch;gap:10px;}
  .topbar-inner .brand{justify-content:center;}
  .topbar-right{justify-content:center;width:100%;}
  .topbar-right .shop-pill{order:1;flex:1 1 100%;justify-content:center;}
  .topbar-right .conn-indicator{order:2;}
  .topbar-right #backToMenuBtn{order:3;flex:1;}
  .topbar-right #logoutBtn{order:4;flex:1;}
  .date-bar-card{flex-direction:column;align-items:stretch;}
  .emp-actions{margin-inline-start:0;width:100%;justify-content:flex-start;}
  .emp-actions .btn{flex:1 1 auto;min-width:120px;}
  .emp-row{flex-direction:column;align-items:stretch;}
  .emp-times{justify-content:center;}
  .login-box{padding:28px 20px;}
}


/* ============================================================
   ADMIN-ONLY ADDITIONS (component classes unique to admin view —
   verified zero collisions with registration's class names above)
   ============================================================ */


/* ============================================================
   GR دوام الموظفين — Admin Dashboard
   Jarvis / Sci-Fi Interface System
   ============================================================ */

  --bg-primary:#060A14;
  --bg-secondary:#0A1628;
  --bg-card:rgba(10,22,40,0.65);
  --accent-cyan:#00D4FF;
  --accent-blue:#0066FF;
  --accent-green:#00FF88;
  --accent-orange:#FF6B00;
  --accent-red:#FF0055;
  --text-primary:#E8F4FF;
  --text-secondary:#6B8FA8;
  --border-glass:rgba(0,212,255,0.15);
  --font-body:'Cairo',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --font-display:'Tajawal',sans-serif;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --transition-fast:200ms cubic-bezier(.4,0,.2,1);
  --transition-med:300ms cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{
  background:var(--bg-primary);color:var(--text-primary);
  font-family:var(--font-body);min-height:100vh;overflow-x:hidden;position:relative;line-height:1.5;
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}
.hud-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,0.045) 1px, transparent 1px),linear-gradient(90deg, rgba(0,212,255,0.045) 1px, transparent 1px);
  background-size:42px 42px;animation:gridDrift 60s linear infinite;
}
.hud-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(0,102,255,0.10), transparent 60%),radial-gradient(ellipse at 80% 100%, rgba(0,212,255,0.06), transparent 55%);
}
@keyframes gridDrift{0%{background-position:0 0;}100%{background-position:42px 42px;}}
.scan-line{
  position:fixed;left:0;right:0;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  animation:scanMove 8s linear infinite;opacity:0.35;
}
@keyframes scanMove{0%{top:-2px;}100%{top:100%;}}
.app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
.container{width:100%;max-width:1320px;margin:0 auto;padding:0 16px;}
.glass-card{
  background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);position:relative;
}
.glass-card.glow{box-shadow:0 0 20px rgba(0,212,255,0.12), inset 0 1px 0 rgba(255,255,255,0.04);}
h1,h2,h3{font-family:var(--font-display);font-weight:800;letter-spacing:0.2px;}
.mono{font-family:var(--font-mono);}
.text-secondary{color:var(--text-secondary);}
.text-cyan{color:var(--accent-cyan);}
.text-green{color:var(--accent-green);}
.text-orange{color:var(--accent-orange);}
.text-red{color:var(--accent-red);}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none;transition:all var(--transition-fast);}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2px solid var(--accent-cyan);outline-offset:2px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;border-radius:var(--radius-sm);font-weight:700;font-size:0.95rem;
  background:rgba(0,212,255,0.08);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.3);
}
.btn:hover{background:rgba(0,212,255,0.16);box-shadow:0 0 20px rgba(0,212,255,0.25);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-primary{background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));color:#04101C;border:none;box-shadow:0 0 20px rgba(0,212,255,0.3);}
.btn-primary:hover{box-shadow:0 0 30px rgba(0,212,255,0.5);}
.btn-green{background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.btn-green:hover{background:rgba(0,255,136,0.18);box-shadow:0 0 20px rgba(0,255,136,0.25);}
.btn-orange{background:rgba(255,107,0,0.1);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.btn-orange:hover{background:rgba(255,107,0,0.18);box-shadow:0 0 20px rgba(255,107,0,0.25);}
.btn-red{background:rgba(255,0,85,0.1);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.btn-red:hover{background:rgba(255,0,85,0.18);box-shadow:0 0 20px rgba(255,0,85,0.25);}
.btn-cyan{background:rgba(0,212,255,0.1);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.btn-cyan:hover{background:rgba(0,212,255,0.18);box-shadow:0 0 20px rgba(0,212,255,0.25);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-glass);}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--accent-cyan);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px;font-size:0.82rem;}
/* البند 13: pending checkout animation */
.time-chip.pending-out .val{color:var(--accent-orange);animation:pulse-ot 1.5s infinite;}
@keyframes pulse-ot{0%,100%{opacity:1;}50%{opacity:0.45;}}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:600;}
.input, select.input, textarea.input{
  width:100%;padding:13px 16px;background:rgba(6,10,20,0.6);border:1px solid var(--border-glass);
  border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:1rem;transition:all var(--transition-fast);
}
.input::placeholder{color:rgba(107,143,168,0.6);}
.input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.12);}
.input.error{border-color:var(--accent-red);}
.field-error{color:var(--accent-red);font-size:0.8rem;margin-top:6px;display:none;}
.field-error.show{display:block;}
.input-mono{font-family:var(--font-mono);}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:0.74rem;font-weight:700;font-family:var(--font-mono);white-space:nowrap;}
.badge-orange{background:rgba(255,107,0,0.12);color:var(--accent-orange);border:1px solid rgba(255,107,0,0.35);}
.badge-green{background:rgba(0,255,136,0.12);color:var(--accent-green);border:1px solid rgba(0,255,136,0.35);}
.badge-red{background:rgba(255,0,85,0.12);color:var(--accent-red);border:1px solid rgba(255,0,85,0.35);}
.badge-cyan{background:rgba(0,212,255,0.12);color:var(--accent-cyan);border:1px solid rgba(0,212,255,0.35);}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulseDot 1.6s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:0.5;}}
.count-num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,212,255,0.2);border-top-color:var(--accent-cyan);animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
#toastHost{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:420px;}
.toast{padding:14px 18px;border-radius:var(--radius-sm);background:var(--bg-secondary);border:1px solid var(--border-glass);backdrop-filter:blur(16px);box-shadow:0 8px 30px rgba(0,0,0,0.4);font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:10px;animation:toastIn var(--transition-med);}
.toast.success{border-color:rgba(0,255,136,0.4);color:var(--accent-green);}
.toast.error{border-color:rgba(255,0,85,0.4);color:var(--accent-red);}
.toast.warn{border-color:rgba(255,107,0,0.4);color:var(--accent-orange);}
.toast.info{border-color:rgba(0,212,255,0.4);color:var(--accent-cyan);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}
.toast.hide{animation:toastOut var(--transition-fast) forwards;}
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(2,5,12,0.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px;animation:modalIn var(--transition-med);}
@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h2{font-size:1.3rem;margin-bottom:18px;color:var(--accent-cyan);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.skip-link{position:absolute;right:8px;top:-50px;z-index:10000;background:var(--accent-cyan);color:#04101C;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;transition:top var(--transition-fast);}
.skip-link:focus{top:8px;}

/* ============================================================
   LOGIN
   ============================================================ */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
.login-box{width:100%;max-width:420px;padding:36px 30px;text-align:center;}
.login-logo{font-family:var(--font-display);font-weight:900;font-size:1.6rem;background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px;letter-spacing:0.5px;}
.login-sub{color:var(--text-secondary);font-size:0.85rem;margin-bottom:28px;font-family:var(--font-mono);}
.login-box .field{text-align:right;}
.lockout-box{margin-top:14px;padding:14px;border-radius:var(--radius-sm);background:rgba(255,0,85,0.08);border:1px solid rgba(255,0,85,0.3);color:var(--accent-red);font-size:0.88rem;text-align:center;}
.lockout-timer{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;margin-top:6px;}

/* ============================================================
   TOPBAR / NAV
   ============================================================ */
.topbar{position:sticky;top:0;z-index:50;background:rgba(6,10,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-glass);padding:14px 0;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;color:#04101C;font-size:1.1rem;box-shadow:0 0 18px rgba(0,212,255,0.4);flex-shrink:0;}
.brand-text{font-family:var(--font-display);font-weight:800;font-size:1.05rem;line-height:1.2;}
.brand-text small{display:block;color:var(--text-secondary);font-size:0.68rem;font-weight:500;font-family:var(--font-mono);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.tab-nav-wrap{position:relative;}
.tab-nav-wrap::before, .tab-nav-wrap::after{
  content:'';position:absolute;top:14px;bottom:0;width:28px;pointer-events:none;z-index:2;
}
.tab-nav-wrap::before{right:0;background:linear-gradient(to left, var(--bg-primary), transparent);}
.tab-nav-wrap::after{left:0;background:linear-gradient(to right, var(--bg-primary), transparent);}
.tab-nav{display:flex;gap:6px;overflow-x:auto;padding:14px 0 0;scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
.tab-nav::-webkit-scrollbar{height:4px;}
.tab-nav::-webkit-scrollbar-thumb{background:var(--border-glass);border-radius:4px;}
.tab-btn{
  padding:10px 18px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  background:transparent;color:var(--text-secondary);border:1px solid transparent;
  font-weight:700;font-size:0.9rem;white-space:nowrap;flex-shrink:0;
}
.tab-btn.active{color:var(--accent-cyan);border-color:var(--border-glass);border-bottom-color:transparent;background:var(--bg-card);}
.tab-btn:hover:not(.active){color:var(--text-primary);}

/* ============================================================
   KPI CARDS
   ============================================================ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.kpi-card{padding:20px;position:relative;overflow:hidden;}
.kpi-card .label{font-size:0.8rem;color:var(--text-secondary);font-weight:700;margin-bottom:8px;}
.kpi-card .value{font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--accent-cyan);}
.kpi-card .value.green{color:var(--accent-green);}
.kpi-card .value.orange{color:var(--accent-orange);}
.kpi-card .value.red{color:var(--accent-red);}
.kpi-card .value.blue{color:var(--accent-blue, #4fc3f7);}
.kpi-card .sub{font-size:0.74rem;color:var(--text-secondary);margin-top:4px;}

/* ============================================================
   SECTION CARD
   ============================================================ */
.section{padding:20px 0;}
.section-card{padding:22px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.section-title{font-family:var(--font-display);font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:10px;}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);box-shadow:0 0 10px var(--accent-cyan);}
.section-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ============================================================
   DATA TABLE
   ============================================================ */
.table-wrap{overflow-x:auto;border-radius:var(--radius-md);border:1px solid var(--border-glass);}
table.data-table{width:100%;border-collapse:collapse;min-width:600px;}
table.data-table th{
  text-align:right;padding:12px 14px;font-size:0.78rem;color:var(--text-secondary);
  background:rgba(0,212,255,0.04);border-bottom:1px solid var(--border-glass);font-weight:700;
  position:sticky;top:0;
}
table.data-table td{padding:12px 14px;font-size:0.88rem;border-bottom:1px solid rgba(0,212,255,0.07);}
table.data-table tr:last-child td{border-bottom:none;}
table.data-table tr:hover td{background:rgba(0,212,255,0.03);}
.table-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* ============================================================
   FILTER BAR
   ============================================================ */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
.filter-bar .field{margin-bottom:0;min-width:150px;flex:1 1 150px;}

/* ============================================================
   APPROVAL CARDS
   ============================================================ */
.approval-card{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;border-radius:var(--radius-md);
  background:rgba(255,107,0,0.04);border:1px solid rgba(255,107,0,0.25);margin-bottom:10px;
}
.approval-info{flex:1 1 220px;}
.approval-info .name{font-weight:700;}
.approval-info .meta{font-size:0.78rem;color:var(--text-secondary);font-family:var(--font-mono);margin-top:2px;}
.approval-actions{display:flex;gap:8px;}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);}
.empty-state .icon{font-size:2.2rem;margin-bottom:10px;opacity:0.6;}

/* ============================================================
   SETTINGS GRID
   ============================================================ */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--radius-md);background:rgba(6,10,20,0.45);border:1px solid var(--border-glass);}
.toggle-switch{position:relative;width:46px;height:26px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:rgba(107,143,168,0.3);border-radius:20px;cursor:pointer;transition:all var(--transition-fast);}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:var(--text-primary);border-radius:50%;transition:all var(--transition-fast);}
.toggle-switch input:checked + .toggle-slider{background:var(--accent-cyan);box-shadow:0 0 12px rgba(0,212,255,0.4);}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(-20px);}

/* ============================================================
   SHOP CARD (settings)
   ============================================================ */
.shop-card{padding:18px;margin-bottom:12px;}
.shop-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.shop-card-title{font-weight:700;font-size:1.05rem;}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:640px){
  .topbar-inner{flex-direction:column;align-items:stretch;gap:10px;}
  .topbar-inner .brand{justify-content:center;}
  .topbar-right{justify-content:center;width:100%;}
  .topbar-right .btn{flex:1;}
  .login-box{padding:28px 20px;}
  .kpi-card .value{font-size:1.5rem;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .approval-card{flex-direction:column;align-items:stretch;}
  .approval-actions{width:100%;}
  .approval-actions .btn{flex:1;}
  .tab-btn{padding:8px 12px;font-size:0.78rem;}
  .tab-nav{gap:4px;}
  .filter-bar{flex-direction:column;align-items:stretch;}
  .filter-bar .field{width:100%;}
  .filter-bar > .btn{width:100%;}
  .table-actions{flex-direction:column;width:100%;}
  .table-actions .btn{width:100%;}
  .shop-card-head{flex-direction:column;align-items:stretch;}
  .shop-card-head .table-actions{flex-direction:row;flex-wrap:wrap;}
  .shop-card-head .table-actions .btn{width:auto;flex:1 1 auto;}
}


/* ============================================================
   ADMIN VIEW OVERRIDES (container/modal width differ from reg's
   defaults above; scoped so registration view is unaffected)
   ============================================================ */
#adminView .container{max-width:1320px;}
#adminView .modal{max-width:560px;}

/* ============================================================
   INDEX / LANDING VIEW
   ============================================================ */
.login-screen.index-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
.index-wrap{position:relative;z-index:2;width:100%;max-width:460px;text-align:center;}
.index-logo{
  font-family:var(--font-display);font-weight:900;font-size:1.9rem;
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:6px;letter-spacing:0.5px;
}
.index-sub{color:var(--text-secondary);font-size:0.85rem;font-family:var(--font-mono);margin-bottom:36px;}
.index-card-link{
  display:flex;align-items:center;gap:16px;text-align:right;
  background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);
  padding:20px 22px;margin-bottom:16px;text-decoration:none;color:inherit;
  transition:all var(--transition-fast);width:100%;cursor:pointer;font-family:var(--font-body);
}
.index-card-link:hover, .index-card-link:focus-visible{
  border-color:rgba(0,212,255,0.4);box-shadow:0 0 24px rgba(0,212,255,0.18);transform:translateY(-2px);
  outline:none;
}
.index-card-icon{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  background:rgba(0,212,255,0.08);border:1px solid var(--border-glass);
}
.index-card-text{flex:1;}
.index-card-title{font-family:var(--font-display);font-weight:800;font-size:1.05rem;margin-bottom:3px;}
.index-card-desc{font-size:0.8rem;color:var(--text-secondary);}
.index-card-arrow{color:var(--accent-cyan);font-size:1.2rem;flex-shrink:0;}
.index-card-link.green:hover, .index-card-link.green:focus-visible{
  border-color:rgba(0,255,136,0.4);box-shadow:0 0 24px rgba(0,255,136,0.18);
}
.index-card-link.green .index-card-icon{color:var(--accent-green);}
.index-card-link.green .index-card-arrow{color:var(--accent-green);}
.index-footer-note{margin-top:28px;font-size:0.74rem;color:var(--text-secondary);font-family:var(--font-mono);}

/* ============================================================
   VIEW SWITCHING — only one of these three is visible at a time
   ============================================================ */
#gateView, #indexView, #regView, #adminView{ display:none; }
#gateView.active, #indexView.active, #regView.active, #adminView.active{ display:block; }
</style>
</head>

<body>
<div class="hud-bg" aria-hidden="true"></div>
<div class="scan-line" aria-hidden="true"></div>
<a href="#mainContent" class="skip-link">تخطّى إلى المحتوى</a>

<!-- ============================================================
     GATE VIEW — system login, shown first always, before index
     ============================================================ -->
<div id="gateView" class="app active">
  <div id="gateToastHost" role="status" aria-live="polite" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:420px;"></div>
  <div class="login-screen">
    <div class="glass-card glow login-box">
      <div class="login-logo">GR دوام الموظفين</div>
      <div class="login-sub mono">GR DAWAM SYSTEM — تسجيل الدخول</div>
      <form id="gateLoginForm" novalidate>
        <div class="field">
          <label for="gateUsername">اسم المستخدم</label>
          <input type="text" id="gateUsername" class="input" required aria-required="true" autocomplete="username" placeholder="اسم المستخدم">
          <div class="field-error" id="gateUserError">اسم المستخدم غير صحيح</div>
        </div>
        <div class="field">
          <label for="gatePassword">كلمة المرور</label>
          <input type="password" id="gatePassword" class="input input-mono" required aria-required="true" autocomplete="current-password" placeholder="••••••••">
          <div class="field-error" id="gatePassError">كلمة المرور غير صحيحة</div>
        </div>
        <div id="gateLockoutBox"></div>

<script>
/* ============================================================

<script type="module">
/* ============================================================
   GATE LOGIN MODULE — system-wide login layer, 10 fixed accounts.
   Independent Firebase app instance/module scope from both the
   registration and admin apps below (no shared state, no risk of
   collision) — purely an access gate that must succeed before the
   index menu (and therefore registration/admin) becomes reachable.
   ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, runTransaction, serverTimestamp, collection, addDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const gateFirebaseConfig = {
  apiKey: "AIzaSyA7kz4w60iHijlrTqGOERTHw52zaJWFFGo",
  authDomain: "gr-dawam-spek.firebaseapp.com",
  projectId: "gr-dawam-spek",
  storageBucket: "gr-dawam-spek.firebasestorage.app",
  messagingSenderId: "446257840423",
  appId: "1:446257840423:web:672937f47bbc93e57ac7cc",
  measurementId: "G-4WER1NZWZM"
};
const gateApp = initializeApp(gateFirebaseConfig, "gateApp");
const gateDb = getFirestore(gateApp);
const gateAuth = getAuth(gateApp);

// Gate accounts are now fully dynamic — created and managed from the admin panel.
// No hardcoded credentials exist in the source code.
// Initial gate admin account must be created from admin panel on first setup.
const GATE_SESSION_KEY = "gr_dawam_gate_session_v2"; // v2 = localStorage (persists across browser close)
const GATE_LOGIN_ATTEMPTS_KEY = "gr_dawam_gate_login_attempts";
const GATE_LOCKOUT_TIERS = [
  { attempts: 3, seconds: 30 },
  { attempts: 5, seconds: 300 },
  { attempts: 10, seconds: 1800 }
];

function gateToast(message, type = "info", duration = 4200){
  const host = document.getElementById("gateToastHost");
  if(!host) return;
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icons = { success:"✅", error:"⛔", warn:"⚠️", info:"ℹ️" };
  el.innerHTML = `<span aria-hidden="true">${icons[type]||""}</span><span></span>`;
  el.lastElementChild.textContent = message;
  host.appendChild(el);
  setTimeout(()=>{ el.classList.add("hide"); setTimeout(()=>el.remove(),250); }, duration);
}

async function pbkdf2Hash(password, saltB64, iterations = 150000){
  const enc = new TextEncoder();
  const salt = saltB64 ? b64ToBytes(saltB64) : crypto.getRandomValues(new Uint8Array(16));
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, keyMaterial, 256);
  return { hash: bytesToB64(new Uint8Array(bits)), salt: bytesToB64(salt), iterations };
}
function bytesToB64(bytes){ let bin=""; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); }
function b64ToBytes(b64){ const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes; }
function constantTimeEqual(a,b){
  if(typeof a !== "string" || typeof b !== "string"){
    console.error("[constantTimeEqual] قيمة غير صالحة للمقارنة — a:", a, "(type:", typeof a, ") b:", b, "(type:", typeof b, ")");
    return false;
  }
  if(a.length!==b.length) return false;
  let diff=0; for(let i=0;i<a.length;i++) diff|=a.charCodeAt(i)^b.charCodeAt(i); return diff===0;
}
async function verifyPassword(password, storedHash, storedSalt, iterations){
  if(!storedHash || !storedSalt){
    console.error("[verifyPassword] storedHash أو storedSalt غير موجودين — storedHash:", storedHash, "storedSalt:", storedSalt);
    return false;
  }
  const result = await pbkdf2Hash(password, storedSalt, iterations);
  return constantTimeEqual(result.hash, storedHash);
}
function getFingerprint(){
  const ua = navigator.userAgent + "|" + navigator.language + "|" + screen.width + "x" + screen.height;
  let hash = 0;
  for(let i=0;i<ua.length;i++) hash = ((hash << 5) - hash + ua.charCodeAt(i)) | 0;
  return "fp_" + Math.abs(hash).toString(36);
}

let gateUid = null;
const gateAuthReady = new Promise((resolve)=>{
  onAuthStateChanged(gateAuth, async (user)=>{
    if(user){ gateUid = user.uid; resolve(user); }
    else{
      try{ const cred = await signInAnonymously(gateAuth); gateUid = cred.user.uid; resolve(cred.user); }
      catch(err){ console.error("Gate anonymous auth failed:", err); gateToast("فشل الاتصال بالنظام", "error"); }
    }
  });
});

/* ---------- (Gate accounts are managed from admin panel — no seeding needed) ---------- */

/* ---------- rate limiting (client-side deterrent, same pattern as the rest of the app) ---------- */
function getGateLoginAttempts(){
  try{ return JSON.parse(localStorage.getItem(GATE_LOGIN_ATTEMPTS_KEY) || '{"count":0,"lockedUntil":0}'); }
  catch{ return { count: 0, lockedUntil: 0 }; }
}
function setGateLoginAttempts(data){ localStorage.setItem(GATE_LOGIN_ATTEMPTS_KEY, JSON.stringify(data)); }
function getGateLockoutSeconds(attemptCount){
  let secs = 0;
  for(const tier of GATE_LOCKOUT_TIERS) if(attemptCount >= tier.attempts) secs = tier.seconds;
  return secs;
}
function recordGateFailedLogin(){
  const data = getGateLoginAttempts();
  data.count += 1;
  const lockoutSecs = getGateLockoutSeconds(data.count);
  if(lockoutSecs > 0) data.lockedUntil = Date.now() + lockoutSecs * 1000;
  setGateLoginAttempts(data);
  return data;
}
function clearGateLoginAttempts(){ setGateLoginAttempts({ count: 0, lockedUntil: 0 }); }

let gateLockoutInterval = null;
function checkGateLockoutUI(){
  const box = document.getElementById("gateLockoutBox");
  const btn = document.getElementById("gateLoginBtn");
  if(gateLockoutInterval){ clearInterval(gateLockoutInterval); gateLockoutInterval = null; }
  const data = getGateLoginAttempts();
  const remaining = data.lockedUntil - Date.now();
  if(remaining > 0){
    btn.disabled = true;
    const tick = ()=>{
      const r = Math.max(0, data.lockedUntil - Date.now());
      if(r <= 0){ box.innerHTML = ""; btn.disabled = false; clearInterval(gateLockoutInterval); return; }
      const mins = Math.floor(r/60000);
      const secs = Math.floor((r%60000)/1000);
      box.innerHTML = `<div class="lockout-box">🔒 الحساب مقفل مؤقتًا بسبب محاولات فاشلة<div class="lockout-timer mono">${mins}:${String(secs).padStart(2,"0")}</div></div>`;
    };
    tick();
    gateLockoutInterval = setInterval(tick, 1000);
  }else{
    box.innerHTML = "";
    btn.disabled = false;
  }
}

/* ---------- session persistence (localStorage so it survives browser restarts, not just tab refresh) ---------- */
function saveGateSession(session){ localStorage.setItem(GATE_SESSION_KEY, JSON.stringify(session)); }
function loadGateSession(){
  try{
    const raw = localStorage.getItem(GATE_SESSION_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch{ return null; }
}
function clearGateSession(){ localStorage.removeItem(GATE_SESSION_KEY); }

/* ---------- single-device-per-account lock, via Firestore transaction to avoid races ---------- */
async function acquireGateSession(username){
  const sessionRef = doc(gateDb, "gate_sessions", username);
  const fingerprint = getFingerprint();
  return await runTransaction(gateDb, async (tx)=>{
    const snap = await tx.get(sessionRef);
    if(snap.exists() && snap.data().active === true && snap.data().deviceFingerprint !== fingerprint){
      // Already active on a different device — refuse, per spec (admin must release manually,
      // no automatic timeout-based takeover unless the prior holder explicitly logs out).
      return { granted: false, lastSeen: snap.data().lastSeen || null };
    }
    tx.set(sessionRef, {
      username, active: true, deviceFingerprint: fingerprint,
      loggedInAt: serverTimestamp(), lastSeen: serverTimestamp()
    });
    return { granted: true };
  });
}
async function releaseGateSession(username){
  try{
    await setDoc(doc(gateDb, "gate_sessions", username), { active: false, loggedOutAt: serverTimestamp() }, { merge: true });
  }catch(e){ console.error("releaseGateSession failed:", e); }
}
let gateHeartbeatInterval = null;
function startGateHeartbeat(username){
  if(gateHeartbeatInterval) clearInterval(gateHeartbeatInterval);
  gateHeartbeatInterval = setInterval(()=>{
    setDoc(doc(gateDb, "gate_sessions", username), { lastSeen: serverTimestamp() }, { merge: true }).catch(()=>{});
  }, 60000);
}
function stopGateHeartbeat(){
  if(gateHeartbeatInterval){ clearInterval(gateHeartbeatInterval); gateHeartbeatInterval = null; }
}

async function writeGateAuditLog(action, details = {}){
  try{
    await addDoc(collection(gateDb, "audit_logs"), {
      action, timestamp: serverTimestamp(), uid: gateUid,
      gateUser: window.__gateUsername || details.username || null,
      source: "gate", details
    });
  }catch(e){ console.error("Gate audit log failed:", e); }
}

/* ---------- login handler ---------- */
async function handleGateLoginSubmit(e){
  e.preventDefault();
  const usernameInput = document.getElementById("gateUsername");
  const username = usernameInput.value.trim();
  const password = document.getElementById("gatePassword").value;
  const userError = document.getElementById("gateUserError");
  const passError = document.getElementById("gatePassError");
  const sessionBox = document.getElementById("gateSessionBox");
  userError.classList.remove("show");
  passError.classList.remove("show");
  sessionBox.innerHTML = "";

  if(!username){ userError.classList.add("show"); return; }
  if(!password){ passError.textContent = "أدخل كلمة المرور"; passError.classList.add("show"); return; }

  const attemptData = getGateLoginAttempts();
  if(attemptData.lockedUntil > Date.now()){ checkGateLockoutUI(); return; }

  const btn = document.getElementById("gateLoginBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التحقق...`;

  try{
    await gateAuthReady;
    const accRef = doc(gateDb, "gate_accounts", username);
    const accSnap = await getDoc(accRef);

    // ── البند: توحيد رسالة الخطأ بين "اسم مستخدم غير موجود" و"كلمة مرور خاطئة" ──
    // لمنع تسريب معلومة (oracle) تسمح بمعرفة أسماء المستخدمين الصحيحة بشكل منفصل
    // عن تخمين كلمة المرور. كما نستخدم تحققًا وهميًا لإبقاء زمن الاستجابة متقاربًا
    // (timing-safe) بين الحالتين.
    const DUMMY_HASH = "0".repeat(64), DUMMY_SALT = "0".repeat(32);
    const accExists = accSnap.exists();
    const acc = accExists ? accSnap.data() : null;

    const valid = accExists
      ? await verifyPassword(password, acc.passwordHash, acc.passwordSalt, acc.passwordIterations || 150000)
      : await verifyPassword(password, DUMMY_HASH, DUMMY_SALT, 150000).catch(()=>false);

    if(!accExists || !valid){
      passError.textContent = "اسم المستخدم أو كلمة المرور غير صحيحة";
      passError.classList.add("show");
      recordGateFailedLogin();
      writeGateAuditLog("gate_login_failed", { username });
      checkGateLockoutUI();
      btn.disabled = false; btn.textContent = "دخول";
      return;
    }

    // البند 11: فحص الحساب المعطّل — يُعرض فقط بعد التأكد من صحة كلمة المرور
    // (لمنع استخدام رسالة "معطّل" كوسيلة لمعرفة أسماء حسابات صحيحة بدون كلمة مرور)
    if(acc.disabled === true){
      passError.textContent = "هذا الحساب معطّل — تواصل مع الإدارة";
      passError.classList.add("show");
      writeGateAuditLog("gate_login_blocked_disabled", { username });
      btn.disabled = false; btn.textContent = "دخول";
      return;
    }

    // البند 12: GROOT ADMIN — Super Admin تجاوز قيود الجلسة
    const isSuperAdmin = acc.role === "super_admin";

    const result = isSuperAdmin ? { granted: true } : await acquireGateSession(username);
    if(!result.granted){
      const lastSeenNote = result.lastSeen ? "" : " (لا يوجد نشاط مسجَّل لها بعد)";
      sessionBox.innerHTML = `<div class="lockout-box">⚠ هذا الحساب مسجَّل دخول حاليًا من جهاز آخر${lastSeenNote}. تواصل مع الإدارة لفك الجلسة لو كانت هذه الجلسة غير حقيقية.</div>`;
      writeGateAuditLog("gate_login_blocked_in_use", { username });
      btn.disabled = false; btn.textContent = "دخول";
      return;
    }

    clearGateLoginAttempts();
    const session = { username, loggedInAt: Date.now(), fingerprint: getFingerprint(), role: acc.role || "user", shopId: acc.shopId || null };
    saveGateSession(session);
    window.__gateUsername = username;
    window.__gateRole = acc.role || "user";      // البند 12: expose role globally
    window.__gateShopId = acc.shopId || null;
    if(!isSuperAdmin) startGateHeartbeat(username);  // Super Admin لا يحتاج heartbeat
    writeGateAuditLog("gate_login_success", { username, role: acc.role||"user" });
    gateToast(isSuperAdmin ? `👑 أهلًا Super Admin — ${username}` : `أهلًا بك — ${username}`, "success");
    btn.disabled = false;
    btn.textContent = "دخول";
    enterIndexAfterGateLogin(username);
  }catch(err){
    console.error(err);
    gateToast("تعذّر تسجيل الدخول — تحقق من الاتصال بالإنترنت", "error");
    btn.disabled = false;
    btn.textContent = "دخول";
  }
}

function enterIndexAfterGateLogin(username){
  const note = document.getElementById("gateWelcomeNote");
  if(note) note.textContent = `مسجَّل دخول: ${username}`;
  showView("indexView");
}

async function handleGateLogout(){
  const session = loadGateSession();
  if(session?.username){
    await releaseGateSession(session.username);
    writeGateAuditLog("gate_logout", { username: session.username });
  }
  stopGateHeartbeat();
  clearGateSession();
  window.__gateUsername = null;
  gateToast("تم تسجيل الخروج", "info");
  renderGateLoginForm();
  showView("gateView");
}

function renderGateLoginForm(){
  document.getElementById("gateLoginForm").reset();
  document.getElementById("gateUserError").classList.remove("show");
  document.getElementById("gatePassError").classList.remove("show");
  document.getElementById("gateSessionBox").innerHTML = "";
  checkGateLockoutUI();
}

/* ============================================================
   إعادة تعيين كلمة المرور — مفتاح ماستر موحَّد لكل الحسابات
   (admin / shops / موظفين) عبر gate_accounts
   ============================================================ */
const RESET_MASTER_KEY_FALLBACK = "GROOT";

function showResetModal(innerHtml){
  let overlay = document.getElementById("resetModalOverlay");
  if(!overlay){
    overlay = document.createElement("div");
    overlay.id = "resetModalOverlay";
    overlay.className = "modal-overlay";
    overlay.innerHTML = `<div class="glass-card glow modal" id="resetModalContent" role="dialog" aria-modal="true"></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeResetModal(); });
  }
  document.getElementById("resetModalContent").innerHTML = innerHtml;
  overlay.classList.add("show");
}
function closeResetModal(){
  const overlay = document.getElementById("resetModalOverlay");
  if(overlay) overlay.classList.remove("show");
}

async function verifyResetMasterKey(entered){
  try{
    const ref = doc(gateDb, "system_config", "reset_master_key");
    const snap = await getDoc(ref);
    if(snap.exists() && snap.data().passwordHash){
      const d = snap.data();
      return await verifyPassword(entered, d.passwordHash, d.passwordSalt, d.passwordIterations || 150000);
    }
    // أول استخدام: مقارنة بالقيمة الافتراضية، ثم تخزين الـ hash فقط من بعدها
    if(entered === RESET_MASTER_KEY_FALLBACK){
      const { hash, salt, iterations } = await pbkdf2Hash(RESET_MASTER_KEY_FALLBACK);
      await setDoc(ref, { passwordHash: hash, passwordSalt: salt, passwordIterations: iterations, createdAt: serverTimestamp() });
      return true;
    }
    return false;
  }catch(e){
    console.error("verifyResetMasterKey error:", e);
    return false;
  }
}

function openForgotPasswordModal(){
  showResetModal(`
    <h2>إعادة تعيين كلمة المرور</h2>
    <p class="text-secondary" style="margin-bottom:14px;font-size:0.84rem;">أدخل اسم المستخدم المطلوب إعادة تعيين كلمة مروره، ومفتاح الاسترداد، وكلمة المرور الجديدة.</p>
    <form id="resetPassMasterForm" novalidate>
      <div class="field">
        <label for="resetUsername">اسم المستخدم</label>
        <input type="text" id="resetUsername" class="input" required autocomplete="off">
      </div>
      <div class="field">
        <label for="resetMasterKey">مفتاح الاسترداد</label>
        <input type="password" id="resetMasterKey" class="input input-mono" required autocomplete="off">
      </div>
      <div class="field">
        <label for="resetNewPassword">كلمة المرور الجديدة</label>
        <input type="password" id="resetNewPassword" class="input input-mono" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field-error" id="resetMasterError">بيانات غير صحيحة</div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelResetMaster">إلغاء</button>
        <button type="submit" class="btn btn-primary" id="confirmResetMaster">إعادة التعيين</button>
      </div>
    </form>
  `);
  document.getElementById("cancelResetMaster").addEventListener("click", closeResetModal);
  document.getElementById("resetPassMasterForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const username = document.getElementById("resetUsername").value.trim();
    const masterKey = document.getElementById("resetMasterKey").value;
    const newPassword = document.getElementById("resetNewPassword").value;
    const errBox = document.getElementById("resetMasterError");
    errBox.classList.remove("show");
    if(!username || !masterKey || newPassword.length < 6){
      errBox.textContent = "تأكد من تعبئة كل الحقول (٦ أحرف على الأقل لكلمة المرور)";
      errBox.classList.add("show");
      return;
    }
    const btn = document.getElementById("confirmResetMaster");
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
    try{
      await gateAuthReady;
      const accRef = doc(gateDb, "gate_accounts", username);
      const accSnap = await getDoc(accRef);
      if(!accSnap.exists()){
        errBox.textContent = "بيانات غير صحيحة";
        errBox.classList.add("show");
        btn.disabled = false; btn.textContent = "إعادة التعيين";
        return;
      }
      const masterValid = await verifyResetMasterKey(masterKey);
      if(!masterValid){
        errBox.textContent = "بيانات غير صحيحة";
        errBox.classList.add("show");
        btn.disabled = false; btn.textContent = "إعادة التعيين";
        return;
      }
      const { hash, salt, iterations } = await pbkdf2Hash(newPassword);
      await updateDoc(accRef, { passwordHash: hash, passwordSalt: salt, passwordIterations: iterations });
      writeGateAuditLog("password_reset_via_master_key", { username });
      gateToast("تم تغيير كلمة المرور بنجاح", "success");
      closeResetModal();
    }catch(err){
      console.error(err);
      errBox.textContent = "تعذّرت العملية — تحقق من الاتصال بالإنترنت";
      errBox.classList.add("show");
    }finally{
      btn.disabled = false;
      btn.textContent = "إعادة التعيين";
    }
  });
}

/* ---------- init: seed accounts, restore session if valid, else show gate login ---------- */
async function gateInit(){
  await gateAuthReady;
  // Gate accounts managed from admin — no seeding needed here

  document.getElementById("gateLoginForm").addEventListener("submit", handleGateLoginSubmit);
  document.getElementById("gateLogoutBtn").addEventListener("click", handleGateLogout);
  document.getElementById("forgotPassBtn").addEventListener("click", openForgotPasswordModal);
  checkGateLockoutUI();

  const restored = loadGateSession();
  if(restored?.username){
    // Re-validate the session is still genuinely ours (not released/reassigned by admin
    // while this device was offline) before trusting the local copy.
    try{
      const sessionSnap = await getDoc(doc(gateDb, "gate_sessions", restored.username));
      const stillOurs = sessionSnap.exists()
        && sessionSnap.data().active === true
        && sessionSnap.data().deviceFingerprint === getFingerprint();
      if(stillOurs){
        window.__gateUsername = restored.username;
        window.__gateRole = restored.role || "user";
        window.__gateShopId = restored.shopId || null;
        const isSuperAdmin = restored.role === "super_admin";
        if(!isSuperAdmin) startGateHeartbeat(restored.username);
        enterIndexAfterGateLogin(restored.username);
        return;
      }
    }catch(e){ console.error("Session restore check failed:", e); }
    // Session no longer valid (released by admin, or claimed by another device) — clear and show gate login.
    clearGateSession();
  }
  showView("gateView");
}
gateInit();
</script>

/* ============================================================
   CRYPTO — PBKDF2 password hashing (see security note above)
   ============================================================ */
async function pbkdf2Hash(password, saltB64, iterations = 150000){
  const enc = new TextEncoder();
  const salt = saltB64 ? b64ToBytes(saltB64) : crypto.getRandomValues(new Uint8Array(16));
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]
  );
  const bits = await crypto.subtle.deriveBits(
    { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
    keyMaterial,
    256
  );
  return {
    hash: bytesToB64(new Uint8Array(bits)),
    salt: bytesToB64(salt),
    iterations
  };
}
function bytesToB64(bytes){
  let bin = "";
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function b64ToBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function constantTimeEqual(a, b){
  if(typeof a !== "string" || typeof b !== "string"){
    console.error("[constantTimeEqual] قيمة غير صالحة للمقارنة — a:", a, "(type:", typeof a, ") b:", b, "(type:", typeof b, ")");
    return false;
  }
  if(a.length !== b.length) return false;
  let diff = 0;
  for(let i=0;i<a.length;i++) diff |= a.charCodeAt(i) ^ b.charCodeAt(i);
  return diff === 0;
}
async function verifyPassword(password, storedHash, storedSalt, iterations){
  if(!storedHash || !storedSalt){
    console.error("[verifyPassword] storedHash أو storedSalt غير موجودين — storedHash:", storedHash, "storedSalt:", storedSalt);
    return false;
  }
  const result = await pbkdf2Hash(password, storedSalt, iterations);
  return constantTimeEqual(result.hash, storedHash);
}

/* ============================================================

function getFingerprint(){

  let hash = 0;

    hash = ((hash << 5) - hash + ua.charCodeAt(i)) | 0;
  }
  return "fp_" + Math.abs(hash).toString(36);
}

/* ============================================================

function todayISO(){
  const d = new Date();

}
function dayNameAr(isoDate){
  const d = new Date(isoDate + "T12:00:00");
  return ARABIC_DAYS[d.getDay()];
}
function formatDateTimeAr(date){
  if(!date) return "—";
  const d = (date instanceof Date) ? date : date.toDate();
  const dayName = ARABIC_DAYS[d.getDay()];
  const dateStr = d.toISOString().slice(0,10);
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "م" : "ص";
  h = h % 12; if(h === 0) h = 12;
  return `${dayName} ${String(h).padStart(2,"0")}:${m} ${ampm} — ${dateStr}`;
}
function formatTimeOnly(date){
  if(!date) return null;
  const d = (date instanceof Date) ? date : date.toDate();
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "م" : "ص";
  h = h % 12; if(h === 0) h = 12;
  return `${String(h).padStart(2,"0")}:${m} ${ampm}`;
}
function fullStandardDateDisplay(enteredDateISO, actualTimestamp){

}

/* ============================================================

function escapeHtml(str){
  if(str === null || str === undefined) return "";

    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")

}

/* ============================================================
   RATE LIMITING (client-side deterrent — see security note)
   ============================================================ */
function getLoginAttempts(shopId){
  try{
    const raw = localStorage.getItem(LOGIN_ATTEMPTS_KEY_PREFIX + shopId);
    return raw ? JSON.parse(raw) : { count: 0, lockedUntil: 0 };
  }catch{
    return { count: 0, lockedUntil: 0 };
  }
}
function setLoginAttempts(shopId, data){
  localStorage.setItem(LOGIN_ATTEMPTS_KEY_PREFIX + shopId, JSON.stringify(data));
}
function getLockoutSeconds(attemptCount){
  let secs = 0;
  for(const tier of LOCKOUT_TIERS){
    if(attemptCount >= tier.attempts) secs = tier.seconds;
  }
  return secs;
}
function recordFailedLogin(shopId){
  const data = getLoginAttempts(shopId);
  data.count += 1;
  const lockoutSecs = getLockoutSeconds(data.count);
  if(lockoutSecs > 0){
    data.lockedUntil = Date.now() + lockoutSecs * 1000;
  }
  setLoginAttempts(shopId, data);
  if(data.count >= 10){
    writeAuditLog("login_lockout_30min", { shopId, attempts: data.count });
  }
  return data;
}
function clearLoginAttempts(shopId){
  setLoginAttempts(shopId, { count: 0, lockedUntil: 0 });
}
/* ============================================================
   SESSION PERSISTENCE — localStorage so session survives browser restart
   (البند 9: استمرار الجلسة بعد إغلاق وإعادة فتح المتصفح)
   ============================================================ */
function saveSession(session){
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}
function loadSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(!raw) return null;
    const session = JSON.parse(raw);
    if(session.fingerprint !== getFingerprint()) return null; // device/browser changed -> invalidate
    if(Date.now() - session.lastActivity > SESSION_IDLE_LIMIT_MS) return null; // idle timeout
    return session;
  }catch{
    return null;
  }
}
function touchSession(){
  if(state.session){
    state.session.lastActivity = Date.now();
    saveSession(state.session);
  }
}
function clearSession(){
  localStorage.removeItem(SESSION_KEY);
  state.session = null;
}
let idleCheckInterval = null;
function startIdleCheck(){
  if(idleCheckInterval) clearInterval(idleCheckInterval);
  idleCheckInterval = setInterval(()=>{

      handleLogout(true);
    }
  }, 15000);
}
startIdleCheck();
["click","keydown","touchstart"].forEach(evt=>{

/* ============================================================
   OFFLINE QUEUE
   ============================================================ */
function getOfflineQueue(){
  try{
    return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || "[]");
  }catch{ return []; }
}
function pushOfflineQueue(item){
  const q = getOfflineQueue();
  q.push({ ...item, queuedAt: Date.now() });
  localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
}
function clearOfflineQueue(){
  localStorage.removeItem(OFFLINE_QUEUE_KEY);
}
async function flushOfflineQueue(){
  const q = getOfflineQueue();
  if(q.length === 0) return;
  state.syncing = true;
  renderConnIndicator();
  try{
    for(const item of q){
      if(item.type === "attendance_update"){
        const ref = doc(db, "attendance", item.attendanceDocId, "records", item.employeeId);
        await setDoc(ref, item.data, { merge: true });

    toast(`تمت مزامنة ${q.length} تغييرات معلَّقة`, "success");
  }catch(e){
    console.error("Sync failed:", e);
    toast("فشلت مزامنة بعض البيانات — سيُعاد المحاولة", "error");
  }finally{
    state.syncing = false;
    renderConnIndicator();
  }
}

/* ============================================================
   CONNECTION MONITOR
   ============================================================ */
window.addEventListener("online", ()=>{
  state.online = true;

window.addEventListener("offline", ()=>{

function renderConnIndicator(){

  }else if(state.online){
    el.className = "conn-indicator online";
    el.innerHTML = `<span class="pulse-dot" aria-hidden="true"></span> متصل`;

/* ============================================================

let lockoutInterval = null;
async function renderLogin(){

          </div>

            <div class="field-error" id="passError">كلمة المرور غير صحيحة</div>
          </div>
          <div id="lockoutBox"></div>
          <button type="submit" class="btn btn-primary btn-block" id="loginBtn" style="margin-top:8px;">
            دخول
          </button>
        </form>
      </div>
    </div>
  `;
  document.getElementById("loginForm").addEventListener("submit", handleLoginSubmit);
  document.getElementById("shopSelect").addEventListener("change", checkLockoutUI);
  document.getElementById("regBackToMenuBtn").addEventListener("click", ()=>{
    if(window.__returnToIndex) window.__returnToIndex();
  });
  checkLockoutUI();
}

function checkLockoutUI(){
  const shopId = document.getElementById("shopSelect")?.value;
  const box = document.getElementById("lockoutBox");
  const btn = document.getElementById("loginBtn");
  if(lockoutInterval){ clearInterval(lockoutInterval); lockoutInterval = null; }
  if(!shopId || !box){ if(box) box.innerHTML = ""; if(btn) btn.disabled = false; return; }
  const data = getLoginAttempts(shopId);
  const remaining = data.lockedUntil - Date.now();
  if(remaining > 0){
    btn.disabled = true;
    const tick = ()=>{
      const r = Math.max(0, data.lockedUntil - Date.now());
      if(r <= 0){
        box.innerHTML = "";
        btn.disabled = false;
        clearInterval(lockoutInterval);
        return;
      }
      const mins = Math.floor(r/60000);
      const secs = Math.floor((r%60000)/1000);
      box.innerHTML = `<div class="lockout-box">🔒 الحساب مقفل مؤقتًا بسبب محاولات فاشلة<div class="lockout-timer mono">${mins}:${String(secs).padStart(2,"0")}</div></div>`;
    };
    tick();
    lockoutInterval = setInterval(tick, 1000);
  }else{
    box.innerHTML = "";
    btn.disabled = false;
  }
}

async function handleLoginSubmit(e){
  e.preventDefault();
  const shopId = document.getElementById("shopSelect").value;
  const password = document.getElementById("shopPassword").value;
  const shopError = document.getElementById("shopError");
  const passError = document.getElementById("passError");
  shopError.classList.remove("show");
  passError.classList.remove("show");

  if(!shopId){ shopError.classList.add("show"); return; }
  if(!password){ passError.textContent = "أدخل كلمة المرور"; passError.classList.add("show"); return; }

  const attemptData = getLoginAttempts(shopId);
  if(attemptData.lockedUntil > Date.now()){
    checkLockoutUI();
    return;
  }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التحقق...`;

  try{
    const shopRef = doc(db, "shops", shopId);
    const shopSnap = await getDoc(shopRef);
    if(!shopSnap.exists()){
      throw new Error("shop_not_found");
    }
    const shop = shopSnap.data();
    const valid = await verifyPassword(password, shop.passwordHash, shop.passwordSalt, shop.passwordIterations || 150000);

    if(!valid){
      recordFailedLogin(shopId);
      passError.textContent = "كلمة المرور غير صحيحة";
      passError.classList.add("show");
      writeAuditLog("login_failed", { shopId });
      checkLockoutUI();
      btn.disabled = false;
      btn.textContent = "دخول";
      return;
    }

    clearLoginAttempts(shopId);
    state.session = {
      shopId,
      shopName: shop.name,
      shopNumber: shop.shopNumber,
      loginAt: Date.now(),
      lastActivity: Date.now(),
      fingerprint: getFingerprint()
    };
    saveSession(state.session);
    state.normalHours = shop.settings?.normalHours || DEFAULT_NORMAL_HOURS;
    state.requireReason = shop.settings?.requireReason !== false;
    writeAuditLog("login_success", { shopId });
    toast(`أهلًا بك — ${shop.name}`, "success");
    await renderMain();
  }catch(err){
    console.error(err);
    if(err.message === "shop_not_found"){
      shopError.textContent = "هذا المحل غير موجود";
      shopError.classList.add("show");
    }else{
      toast("تعذّر تسجيل الدخول: " + (err.code || err.name || "") + " — " + (err.message || ""), "error", 15000);
    }
    btn.disabled = false;
    btn.textContent = "دخول";
  }
}

async function loadShopsList(){
  try{
    const snap = await getDocs(collection(db, "shops"));
    state.shops = snap.docs
      .filter(d => !d.data().archived)
      .map(d => ({ id: d.id, name: d.data().name, shopNumber: d.data().shopNumber }))
      .sort((a,b)=> (a.shopNumber||0) - (b.shopNumber||0));
  }catch(e){
    console.error("Failed to load shops:", e);
    state.shops = [];
    toast("تعذّر تحميل قائمة المحلات", "error");
  }
}

function handleLogout(silent = false){
  if(state.unsubEmployees){ state.unsubEmployees(); state.unsubEmployees = null; }
  if(state.unsubAttendance){ state.unsubAttendance(); state.unsubAttendance = null; }
  if(state.unsubRecords){ state.unsubRecords(); state.unsubRecords = null; }
  clearSession();
  if(!silent) toast("تم تسجيل الخروج", "info");
  renderLogin();
}

/* ============================================================
   APP INIT
   ============================================================ */
async function init(){
  await authReady;
  state.online = navigator.onLine;
  const restored = loadSession();
  if(restored){
    state.session = restored;
    try{
      const shopSnap = await getDoc(doc(db, "shops", restored.shopId));
      if(shopSnap.exists()){
        const shop = shopSnap.data();
        state.normalHours = shop.settings?.normalHours || DEFAULT_NORMAL_HOURS;
        state.requireReason = shop.settings?.requireReason !== false;
        await renderMain();
        return;
      }
    }catch(e){
      console.warn("Session restore failed:", e);
    }
  }
  renderLogin();
}
init();

   ============================================================ */
async function renderMain(){
  state.selectedDate = todayISO();
  const app = document.getElementById("regApp");
  app.innerHTML = `

          <div class="brand-mark" aria-hidden="true">GR</div>

  if(state.unsubEmployees) state.unsubEmployees();
  const empCol = collection(db, "shops", state.session.shopId, "employees");
  state.unsubEmployees = onSnapshot(empCol, (snap)=>{
    state.employees = snap.docs
      .filter(d => !d.data().archived && !d.data().deleted && d.data().status !== "deleted") // البند 7: exclude deleted

/* ============================================================
   ATTENDANCE — load + realtime subscription for selected date
   ============================================================ */
function attendanceDocId(date){
  return `${state.session.shopId}_${date}`;
}

async function loadAttendanceForDate(date){
  if(state.unsubAttendance){ state.unsubAttendance(); state.unsubAttendance = null; }
  if(state.unsubRecords){ state.unsubRecords(); state.unsubRecords = null; }
  const docId = attendanceDocId(date);
  const attRef = doc(db, "attendance", docId);

  // Attach the live listener immediately — it will reflect the doc the moment
  // it exists, whether created by us below or already present. No need to
  // block UI updates on a getDoc() round-trip first.
  state.unsubAttendance = onSnapshot(attRef, (snap)=>{
    state.attendanceDoc = snap.exists() ? { id: snap.id, ...snap.data() } : null;
    renderDayLockStatus();
    renderAttendanceList();
  }, (err)=>{
    console.error("Attendance doc subscription error:", err);
  });

  const recordsCol = collection(db, "attendance", docId, "records");
  state.unsubRecords = onSnapshot(recordsCol, (snap)=>{
    state.attendanceRecords = {};
    snap.docs.forEach(d => { state.attendanceRecords[d.id] = { id: d.id, ...d.data() }; });
    renderAttendanceList();
  }, (err)=>{
    console.error("Records subscription error:", err);
  });

  // Ensure the parent day-doc exists (idempotent) — runs in the background;
  // the listener above will pick up the change automatically once it lands.
  try{
    const snap = await getDoc(attRef);
    if(!snap.exists()){
      await setDoc(attRef, {
        shopId: state.session.shopId,
        date,
        dayName: dayNameAr(date),
        locked: false,
        createdAt: serverTimestamp()
      });
    }
  }catch(e){
    console.error("Failed to ensure attendance doc:", e);
  }
}
