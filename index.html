async function renderPayrollTab(){
  // البند 6: حماية الرواتب
  const allowed = await requireSensitiveTabAuth("payroll");
  if(!allowed){ switchTab("dashboard"); return; }

  const content = document.getElementById("tabContent");
  const now = new Date();
  const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

  content.innerHTML = `
    <div class="glass-card section-card">
      <div class="section-head">
        <div class="section-title"><span class="dot" aria-hidden="true"></span> حساب الرواتب الشهرية</div>
        <div class="section-actions">
          <button class="btn btn-green btn-sm" id="exportPayrollBtn">⬇ تصدير Excel</button>
        </div>
      </div>
      <div class="filter-bar">
        <div class="field">
          <label for="payShop">المحل</label>
          <select id="payShop" class="input">
            <option value="">كل المحلات</option>
            ${state.shops.map(s=>`<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label for="payMonth">الشهر</label>
          <input type="month" id="payMonth" class="input input-mono" value="${defaultMonth}">
        </div>
        <button class="btn btn-primary" id="runPayrollBtn">احسب الرواتب</button>
      </div>
      <div id="payrollResults"><div class="empty-state">اختر الشهر واضغط "احسب الرواتب"</div></div>
    </div>
  `;

  let lastPayrollRows = [];

  async function loadDeductions(empId, month){
    try{
      const snap = await getDoc(doc(db, "payroll_deductions", `${empId}_${month}`));
      if(snap.exists()) return snap.data();
    }catch(e){ console.error("loadDeductions failed:", e); }
    return { insurance: 0, advance: 0, manualDeductions: [], bonuses: [] };
  }

  function deductionsTotal(d){
    const manual = (d.manualDeductions||[]).reduce((s,m)=>s + (parseFloat(m.amount)||0), 0);
    return (parseFloat(d.insurance)||0) + (parseFloat(d.advance)||0) + manual;
  }

  function bonusesTotal(d){
    return (d.bonuses||[]).reduce((s,b)=>s + (parseFloat(b.amount)||0), 0);
  }

  async function runPayroll(){
    const shopFilter = document.getElementById("payShop").value;
    const month = document.getElementById("payMonth").value;
    if(!month) return;
    const [y,m] = month.split("-").map(Number);
    const from = `${month}-01`;
    const lastDay = new Date(y, m, 0).getDate();
    const to = `${month}-${String(lastDay).padStart(2,"0")}`;
    const dates = isoRange(from, to);

    const resultsEl = document.getElementById("payrollResults");
    const shopsToQuery = shopFilter ? state.shops.filter(s=>s.id===shopFilter) : state.shops;
    const totalJobs = dates.length * shopsToQuery.length;

    resultsEl.innerHTML = `
      <div class="empty-state">
        <div class="spinner" aria-hidden="true"></div>
        <div id="payrollProgress" style="margin-top:12px;font-size:0.82rem;color:var(--text-secondary);">
          جاري حساب الرواتب… (0 / ${totalJobs})
        </div>
      </div>`;

    const totals = {};

    // Build lazy jobs for chunked fetching
    const fetchJobs = [];
    for(const shop of shopsToQuery){
      const normalHours = shop.settings?.normalHours || DEFAULT_NORMAL_HOURS;
      for(const date of dates){
        const docId = `${shop.id}_${date}`;
        fetchJobs.push(() =>
          getDocs(collection(db,"attendance",docId,"records"))
            .then(snap => ({ shop, normalHours, snap }))
            .catch(() => null)
        );
      }
    }

    const results = await chunkFetch(fetchJobs, 15, (done, total) => {
      const el = document.getElementById("payrollProgress");
      if(el) el.textContent = `جاري حساب الرواتب… (${done} / ${total})`;
    });

    for(const result of results){
      if(!result) continue;
      const { shop, normalHours, snap } = result;
      snap.docs.forEach(r=>{
        const rec = r.data();
        const { base, extra: rawExtra } = calcTotalHoursFromRecord(rec, normalHours);
        if(base === 0 && rawExtra === 0) return;
        const extra = rec.approvalStatus === "rejected" ? 0 : rawExtra;
        const emp = (state.employeesByShop[shop.id]||[]).find(e=>e.id===r.id);
        if(!emp) return;
        const isDeleted = emp.deleted || emp.status === "deleted";
        const rate = emp.hourlyRate || 0;
        if(!totals[emp.id]) totals[emp.id] = {
          empId: emp.id,
          name: isDeleted ? `${emp.name} (هذا الموظف محذوف)` : emp.name,
          shopName: shop.name, baseHours:0, extraHours:0, rate, basePay:0, extraPay:0,
          isDeleted
        };
        totals[emp.id].baseHours  += base;
        totals[emp.id].extraHours += extra;
      });
    }

    // Load deductions for all employees in parallel
    const empIds = Object.keys(totals);
    const deductionsList = await Promise.all(empIds.map(empId => loadDeductions(empId, month)));
    const deductionsByEmp = {};
    empIds.forEach((empId, i) => { deductionsByEmp[empId] = deductionsList[i]; });

    const rows = Object.values(totals).map(t=>{
      t.basePay  = Math.round(t.baseHours  * t.rate        * 100) / 100;
      t.extraPay = Math.round(t.extraHours * t.rate * 1.25 * 100) / 100;
      t.grossPay = Math.round((t.basePay + t.extraPay) * 100) / 100;
      t.deductions      = deductionsByEmp[t.empId] || { insurance:0, advance:0, manualDeductions:[], bonuses:[] };
      t.deductionsTotal = Math.round(deductionsTotal(t.deductions) * 100) / 100;
      t.bonusesTotal    = Math.round(bonusesTotal(t.deductions)    * 100) / 100;  // الإضافات
      t.total = Math.round((t.grossPay - t.deductionsTotal + t.bonusesTotal) * 100) / 100;
      return t;
    }).sort((a,b)=>a.name.localeCompare(b.name,"ar"));
    lastPayrollRows = rows;

    if(rows.length === 0){
      resultsEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div>لا توجد بيانات رواتب لهذا الشهر</div>`;
      return;
    }
    const grandGross      = rows.reduce((s,r)=>s+r.grossPay,      0);
    const grandDeductions = rows.reduce((s,r)=>s+r.deductionsTotal,0);
    const grandBonuses    = rows.reduce((s,r)=>s+r.bonusesTotal,   0);
    const grandTotal      = rows.reduce((s,r)=>s+r.total,          0);

    resultsEl.innerHTML = `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th>الموظف</th><th>المحل</th><th>سعر الساعة</th>
            <th>ساعات أساسية</th><th>ساعات إضافية</th>
            <th>الراتب الإجمالي</th>
            <th>الخصومات</th><th>الإضافات</th>
            <th>صافي الراتب</th><th></th>
          </tr></thead>
          <tbody>
            ${rows.map(r=>`<tr ${r.isDeleted?"style='opacity:0.6;'":""}>
              <td>${escapeHtml(r.name)}</td>
              <td>${escapeHtml(r.shopName)}</td>
              <td class="mono">${r.rate.toFixed(2)} €</td>
              <td class="mono">${formatHoursMinutes(r.baseHours)}</td>
              <td class="mono">${formatHoursMinutes(r.extraHours)}</td>
              <td class="mono">${r.grossPay.toFixed(2)} €</td>
              <td class="mono text-red">${r.deductionsTotal > 0 ? "-"+r.deductionsTotal.toFixed(2)+" €" : "—"}</td>
              <td class="mono text-green">${r.bonusesTotal > 0 ? "+"+r.bonusesTotal.toFixed(2)+" €" : "—"}</td>
              <td class="mono text-cyan" style="font-weight:700;">${r.total.toFixed(2)} €</td>
              <td><button class="btn btn-ghost btn-sm" data-edit-deductions="${escapeHtml(r.empId)}">± تعديل</button></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="margin-top:14px;text-align:left;" class="mono">
        <div class="text-secondary">إجمالي الرواتب قبل التعديل: ${grandGross.toFixed(2)} €</div>
        <div class="text-red">إجمالي الخصومات: -${grandDeductions.toFixed(2)} €</div>
        <div class="text-green">إجمالي الإضافات: +${grandBonuses.toFixed(2)} €</div>
        <div class="text-cyan" style="font-size:1.05rem;margin-top:6px;font-weight:700;">
          صافي إجمالي رواتب الشهر: ${grandTotal.toFixed(2)} €
        </div>
      </div>
    `;

    resultsEl.querySelectorAll("[data-edit-deductions]").forEach(btn=>{
      btn.addEventListener("click", ()=>openDeductionsModal(btn.dataset.editDeductions, month, runPayroll));
    });
  }

  document.getElementById("runPayrollBtn").addEventListener("click", runPayroll);
  document.getElementById("exportPayrollBtn").addEventListener("click", async ()=>{
    if(lastPayrollRows.length === 0){ toast("احسب الرواتب أولًا قبل التصدير", "warn"); return; }
    const exportBtn = document.getElementById("exportPayrollBtn");
    exportBtn.disabled = true;
    const originalLabel = exportBtn.textContent;
    exportBtn.innerHTML = `<span class="spinner" aria-hidden="true"></span> جاري التجهيز...`;
    try{
      await loadSheetJS();
    }catch(e){
      toast("تعذّر تحميل مكتبة Excel — تحقق من الاتصال", "error");
      exportBtn.disabled = false; exportBtn.textContent = originalLabel;
      return;
    }
    exportBtn.disabled = false; exportBtn.textContent = originalLabel;
    const data = lastPayrollRows.map(r=>({
      "الموظف": r.name, "المحل": r.shopName, "سعر الساعة": r.rate,
      "ساعات أساسية": r.baseHours.toFixed(2), "ساعات إضافية": r.extraHours.toFixed(2),
      "أجر أساسي": r.basePay, "أجر إضافي": r.extraPay, "الراتب الإجمالي": r.grossPay,
      "التأمين": r.deductions.insurance || 0, "السلف": r.deductions.advance || 0,
      "خصومات أخرى": (r.deductions.manualDeductions||[]).reduce((s,m)=>s+(parseFloat(m.amount)||0),0),
      "إجمالي الخصومات": r.deductionsTotal,
      "الإضافات والمكافآت": r.bonusesTotal || 0,
      "صافي الراتب": r.total
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{wch:22},{wch:18},{wch:12},{wch:14},{wch:14},{wch:14},{wch:12},{wch:10},{wch:14},{wch:14},{wch:14}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "الرواتب");
    XLSX.writeFile(wb, `GR_رواتب_${document.getElementById("payMonth").value}.xlsx`);
    writeAuditLog("payroll_exported", { month: document.getElementById("payMonth").value });
  });
}

/* ============================================================
   DEDUCTIONS MODAL — insurance, advances, manual deductions
   stored at payroll_deductions/{empId}_{month}, applied to net pay
   ============================================================ */
async function openDeductionsModal(empId, month, onSaved){
  let current = { insurance: 0, advance: 0, manualDeductions: [], bonuses: [] };
  try{
    const snap = await getDoc(doc(db, "payroll_deductions", `${empId}_${month}`));
    if(snap.exists()) current = { insurance: 0, advance: 0, manualDeductions: [], bonuses: [], ...snap.data() };
  }catch(e){ console.error(e); }

  const allEmployees = Object.values(state.employeesByShop).flat();
  const emp = allEmployees.find(e=>e.id===empId);

  function manualRowHtml(item, idx){
    return `
      <div class="filter-bar" data-manual-row="${idx}" style="margin-bottom:8px;align-items:center;">
        <div class="field" style="margin-bottom:0;flex:2;">
          <input type="text" class="input manual-label" placeholder="بيان الخصم" value="${escapeHtml(item.label||"")}" maxlength="60">
        </div>
        <div class="field" style="margin-bottom:0;flex:1;">
          <input type="number" class="input input-mono manual-amount" placeholder="0.00" min="0" step="0.01" value="${item.amount||""}">
        </div>
        <button type="button" class="btn btn-red btn-sm" data-remove-manual="${idx}">حذف</button>
      </div>`;
  }

  function bonusRowHtml(item, idx){
    return `
      <div class="filter-bar" data-bonus-row="${idx}" style="margin-bottom:8px;align-items:center;">
        <div class="field" style="margin-bottom:0;flex:2;">
          <input type="text" class="input bonus-label" placeholder="بيان الإضافة" value="${escapeHtml(item.label||"")}" maxlength="60">
        </div>
        <div class="field" style="margin-bottom:0;flex:1;">
          <input type="number" class="input input-mono bonus-amount" placeholder="0.00" min="0" step="0.01" value="${item.amount||""}">
        </div>
        <button type="button" class="btn btn-red btn-sm" data-remove-bonus="${idx}">حذف</button>
      </div>`;
  }

  showModal(`
    <h2>الخصومات والإضافات — ${escapeHtml(emp?.name || "")}</h2>
    <form id="deductionsForm">

      <div style="font-size:0.82rem;font-weight:700;color:var(--accent-red);margin-bottom:10px;">➖ الخصومات</div>
      <div class="field">
        <label for="dedInsurance">التأمين (€)</label>
        <input type="number" id="dedInsurance" class="input input-mono" min="0" step="0.01" value="${current.insurance || ""}">
      </div>
      <div class="field">
        <label for="dedAdvance">السلف (€)</label>
        <input type="number" id="dedAdvance" class="input input-mono" min="0" step="0.01" value="${current.advance || ""}">
      </div>
      <div class="field">
        <label>خصومات أخرى</label>
        <div id="manualDeductionsList">
          ${(current.manualDeductions||[]).map(manualRowHtml).join("")}
        </div>
        <button type="button" class="btn btn-ghost btn-sm" id="addManualDeduction" style="margin-top:6px;">+ إضافة خصم</button>
      </div>

      <div style="border-top:1px solid var(--border-glass);margin:16px 0 14px;"></div>
      <div style="font-size:0.82rem;font-weight:700;color:var(--accent-green);margin-bottom:10px;">➕ الإضافات والمكافآت</div>
      <div class="field">
        <label>مكافآت وإضافات</label>
        <div id="bonusList">
          ${(current.bonuses||[]).map(bonusRowHtml).join("")}
        </div>
        <button type="button" class="btn btn-ghost btn-sm" id="addBonusBtn" style="margin-top:6px;">+ إضافة مكافأة</button>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelDeductions">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>
  `);

  let manualCount = (current.manualDeductions||[]).length;
  let bonusCount  = (current.bonuses||[]).length;

  document.getElementById("addManualDeduction").addEventListener("click", ()=>{
    const list = document.getElementById("manualDeductionsList");
    const div = document.createElement("div");
    div.innerHTML = manualRowHtml({label:"",amount:""}, manualCount);
    list.appendChild(div.firstElementChild);
    manualCount++;
    wireRemoveButtons();
  });

  document.getElementById("addBonusBtn").addEventListener("click", ()=>{
    const list = document.getElementById("bonusList");
    const div = document.createElement("div");
    div.innerHTML = bonusRowHtml({label:"",amount:""}, bonusCount);
    list.appendChild(div.firstElementChild);
    bonusCount++;
    wireRemoveButtons();
  });

  function wireRemoveButtons(){
    document.querySelectorAll("[data-remove-manual]").forEach(btn=>{
      btn.onclick = ()=> btn.closest("[data-manual-row]")?.remove();
    });
    document.querySelectorAll("[data-remove-bonus]").forEach(btn=>{
      btn.onclick = ()=> btn.closest("[data-bonus-row]")?.remove();
    });
  }
  wireRemoveButtons();

  document.getElementById("cancelDeductions").addEventListener("click", closeModal);
  document.getElementById("deductionsForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const insurance = parseFloat(document.getElementById("dedInsurance").value) || 0;
    const advance   = parseFloat(document.getElementById("dedAdvance").value)   || 0;
    const manualDeductions = [];
    document.querySelectorAll("[data-manual-row]").forEach(row=>{
      const label  = row.querySelector(".manual-label").value.trim();
      const amount = parseFloat(row.querySelector(".manual-amount").value) || 0;
      if(label || amount > 0) manualDeductions.push({ label: sanitize(label), amount });
    });
    const bonuses = [];
    document.querySelectorAll("[data-bonus-row]").forEach(row=>{
      const label  = row.querySelector(".bonus-label").value.trim();
      const amount = parseFloat(row.querySelector(".bonus-amount").value) || 0;
      if(label || amount > 0) bonuses.push({ label: sanitize(label), amount });
    });
    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
    try{
      await setDoc(doc(db, "payroll_deductions", `${empId}_${month}`), {
        empId, month, insurance, advance, manualDeductions, bonuses, updatedAt: serverTimestamp()
      });
      writeAuditLog("deductions_and_bonuses_updated", { empId, month, insurance, advance, manualDeductions, bonuses });
      toast("تم حفظ الخصومات والإضافات ✅", "success");
      closeModal();
      if(typeof onSaved === "function") onSaved();
    }catch(err){
      console.error(err);
      toast("فشل الحفظ", "error");
      btn.disabled = false; btn.textContent = "حفظ";
    }
  });
}

/* ============================================================
   البند 5: مركز الإصلاحات الذكي (Smart Repair Center)
   يفحص النظام كاملاً ويُصلح المشاكل تلقائياً مع سجل العمليات
   ============================================================ */
async function renderRepairCenterTab(){
  const content = document.getElementById("tabContent");
  content.innerHTML = `
    <div class="glass-card section-card">
      <div class="section-head">
        <div class="section-title"><span class="dot" aria-hidden="true"></span> مركز الإصلاحات الذكي</div>
        <button class="btn btn-primary btn-sm" id="runDiagBtn">🔍 فحص النظام</button>
      </div>
      <p class="text-secondary" style="font-size:0.83rem;margin-bottom:18px;">
        يفحص النظام شاملاً — قاعدة البيانات، الصلاحيات، الجلسات، المزامنة، البيانات المفقودة أو التالفة.
        كل إصلاح يُسجَّل في سجل العمليات تلقائياً.
      </p>
      <div id="repairLog" style="margin-bottom:18px;"></div>
      <div id="repairResults"></div>
    </div>
  `;

  const SEVERITY = { critical:"🔴", high:"🟠", medium:"🟡", low:"🟢", info:"🔵" };
  const SEV_COLOR = { critical:"var(--accent-red)", high:"var(--accent-orange)", medium:"#F0C040", low:"var(--accent-green)", info:"var(--accent-cyan)" };
  let repairLog = [];

  function log(msg){ repairLog.push(`[${new Date().toLocaleTimeString("ar-EG")}] ${msg}`); refreshLog(); }
  function refreshLog(){
    const el = document.getElementById("repairLog");
    if(!el) return;
    el.innerHTML = repairLog.length ? `
      <div class="glass-card" style="padding:12px;max-height:160px;overflow-y:auto;background:rgba(0,0,0,0.3);">
        <div style="font-size:0.75rem;font-family:var(--font-mono);color:var(--text-secondary);">
          ${repairLog.map(l=>`<div>${l}</div>`).join("")}
        </div>
      </div>` : "";
  }

  async function runDiagnostics(){
    repairLog = [];
    const resultsEl = document.getElementById("repairResults");
    resultsEl.innerHTML = `<div class="empty-state"><div class="spinner" aria-hidden="true"></div> جاري الفحص…</div>`;
    document.getElementById("runDiagBtn").disabled = true;

    const issues = [];

    // ─── فحص 1: gate_accounts بلا passwordHash ───
    log("فحص حسابات البوابة…");
    try{
      const accsSnap = await getDocs(collection(db,"gate_accounts"));
      accsSnap.docs.forEach(d=>{
        const data = d.data();
        if(!data.passwordHash){
          issues.push({
            id:`acc_no_hash_${d.id}`, severity:"critical",
            title:`حساب بلا كلمة مرور: ${data.username||d.id}`,
            location:`gate_accounts/${d.id}`,
            description:"هذا الحساب لا يملك passwordHash — لن يتمكن المستخدم من تسجيل الدخول.",
            impact:"تعطّل تام لتسجيل الدخول",
            autoFix: async ()=>{
              await setDoc(doc(db,"gate_accounts",d.id),{ disabled:true, disabledReason:"no_password_hash" },{ merge:true });
              writeAuditLog("repair_account_disabled_no_hash",{ accId:d.id });
            }, fixLabel:"تعطيل الحساب مؤقتاً"
          });
        }
      });
    }catch(e){ log(`خطأ في فحص gate_accounts: ${e.message}`); }

    // ─── فحص 2: حضور مفتوح (checkIn بلا checkOut) من أمس أو قبله ───
    log("فحص سجلات الحضور المفتوحة…");
    try{
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yesterdayISO = yesterday.toISOString().slice(0,10);
      for(const shop of state.shops){
        const dayRef = doc(db,"attendance",`${shop.id}_${yesterdayISO}`);
        const daySnap = await getDoc(dayRef);
        if(!daySnap.exists()) continue;
        const recsSnap = await getDocs(collection(db,"attendance",`${shop.id}_${yesterdayISO}`,"records"));
        recsSnap.docs.forEach(r=>{
          const rec = r.data();
          if(rec.checkIn && !rec.checkOut && !rec.onVacation){
            const emp = (state.employeesByShop[shop.id]||[]).find(e=>e.id===r.id);
            issues.push({
              id:`open_checkin_${shop.id}_${r.id}`, severity:"high",
              title:`حضور مفتوح من أمس: ${emp?.name||r.id}`,
              location:`attendance/${shop.id}_${yesterdayISO}/records/${r.id}`,
              description:`الموظف سجّل حضوراً بتاريخ ${yesterdayISO} ولم يُسجَّل انصرافه.`,
              impact:"خطأ في احتساب الراتب وساعات العمل",
              autoFix: async ()=>{
                await setDoc(doc(db,"attendance",`${shop.id}_${yesterdayISO}`,"records",r.id),{
                  checkOut: serverTimestamp(), autoClosedByRepair:true
                },{ merge:true });
                writeAuditLog("repair_auto_checkout",{ shopId:shop.id, empId:r.id, date:yesterdayISO });
              }, fixLabel:"إغلاق الحضور تلقائياً"
            });
          }
        });
      }
    }catch(e){ log(`خطأ في فحص الحضور المفتوح: ${e.message}`); }

    // ─── فحص 3: موظفون بلا hourlyRate ───
    log("فحص بيانات الموظفين…");
    Object.values(state.employeesByShop).flat().forEach(emp=>{
      if(!emp.hourlyRate && !emp.deleted && emp.status!=="pending"){
        issues.push({
          id:`no_rate_${emp.id}`, severity:"medium",
          title:`موظف بلا سعر ساعة: ${emp.name}`,
          location:`shops/${emp.shopId}/employees/${emp.id}`,
          description:"لم يُحدَّد سعر الساعة لهذا الموظف — سيظهر راتبه 0 في الرواتب.",
          impact:"احتساب راتب خاطئ (صفر)",
          autoFix: null, fixLabel:"يدوي فقط — افتح قائمة الموظفين وعدّل السعر"
        });
      }
    });

    // ─── فحص 4: محلات بلا إعدادات normalHours ───
    log("فحص إعدادات المحلات…");
    state.shops.forEach(shop=>{
      if(!shop.settings?.normalHours){
        issues.push({
          id:`no_hours_${shop.id}`, severity:"low",
          title:`محل بلا ساعات عمل طبيعية: ${shop.name}`,
          location:`shops/${shop.id}`,
          description:"سيُستخدم الافتراضي (8 ساعات) — قد يختلف عن ساعات المحل الفعلية.",
          impact:"احتساب الساعات الإضافية قد يكون غير دقيق",
          autoFix: async ()=>{
            await setDoc(doc(db,"shops",shop.id),{ settings:{ normalHours:8 } },{ merge:true });
            writeAuditLog("repair_set_default_hours",{ shopId:shop.id });
          }, fixLabel:"تعيين 8 ساعات افتراضياً"
        });
      }
    });

    // ─── فحص 5: جلسات بوابة منتهية الصلاحية لم تُغلق ───
    log("فحص الجلسات النشطة…");
    try{
      const sessSnap = await getDocs(collection(db,"gate_sessions"));
      const now = Date.now();
      sessSnap.docs.forEach(d=>{
        const s = d.data();
        if(s.active && s.lastHeartbeat?.toMillis && now - s.lastHeartbeat.toMillis() > 4*60*60*1000){
          issues.push({
            id:`stale_session_${d.id}`, severity:"low",
            title:`جلسة قديمة لم تُغلق: ${d.id}`,
            location:`gate_sessions/${d.id}`,
            description:`آخر نشاط منذ أكثر من 4 ساعات (${new Date(s.lastHeartbeat.toMillis()).toLocaleTimeString("ar-EG")}).`,
            impact:"الحساب يبدو مشغولاً ويمنع تسجيل الدخول من جهاز آخر",
            autoFix: async ()=>{
              await setDoc(doc(db,"gate_sessions",d.id),{ active:false, closedByRepair:true },{ merge:true });
              writeAuditLog("repair_closed_stale_session",{ username:d.id });
            }, fixLabel:"إغلاق الجلسة المنتهية"
          });
        }
      });
    }catch(e){ log(`خطأ في فحص الجلسات: ${e.message}`); }

    // ─── فحص 6: طلبات تحويل معلّقة من أكثر من 7 أيام ───
    log("فحص طلبات التحويل…");
    try{
      const pendingStatuses = ["pending","pending_shop","pending_admin"];
      const tResults = await Promise.all(pendingStatuses.map(st=>
        getDocs(query(collection(db,"transfer_requests"), where("status","==",st)))
      ));
      const weekAgo = Date.now() - 7*24*60*60*1000;
      tResults.forEach(tSnap=>{
        tSnap.docs.forEach(d=>{
          const t = d.data();
          if(t.requestedAt?.toMillis?.() && t.requestedAt.toMillis() < weekAgo){
            issues.push({
              id:`old_transfer_${d.id}`, severity:"low",
              title:`طلب تحويل معلّق منذ أكثر من أسبوع: ${t.employeeName||"—"}`,
              location:`transfer_requests/${d.id}`,
              description:`طلب التحويل من ${t.fromShopName} إلى ${t.toShopName} لم يُتّخذ قرار بشأنه.`,
              impact:"الموظف قد يعمل في محل غير محدد رسمياً",
              autoFix:null, fixLabel:"يدوي — افتح مركز الطلبات قسم التحويلات"
            });
          }
        });
      });
    }catch(e){ log(`خطأ في فحص التحويلات: ${e.message}`); }

    log(`انتهى الفحص — ${issues.length} مشكلة`);
    document.getElementById("runDiagBtn").disabled = false;

    // ─── عرض النتائج ───
    if(issues.length === 0){
      resultsEl.innerHTML = `
        <div class="empty-state">
          <div class="icon">✅</div>
          <div style="color:var(--accent-green);font-weight:700;">النظام سليم — لم يُعثر على مشاكل</div>
        </div>`;
      return;
    }

    resultsEl.innerHTML = `
      <div style="margin-bottom:14px;font-size:0.85rem;font-weight:700;">
        تم اكتشاف <span style="color:var(--accent-orange);">${issues.length} مشكلة</span> — راجع التفاصيل وطبّق الإصلاح المناسب
      </div>
      ${issues.map(issue=>`
        <div class="glass-card" style="padding:16px;margin-bottom:12px;border-right:3px solid ${SEV_COLOR[issue.severity]||"gray"};" id="issue_${issue.id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap;">
            <div style="font-weight:700;">${SEVERITY[issue.severity]||""} ${escapeHtml(issue.title)}</div>
            <span class="badge" style="background:${SEV_COLOR[issue.severity]}22;color:${SEV_COLOR[issue.severity]};border:1px solid ${SEV_COLOR[issue.severity]}44;">${issue.severity}</span>
          </div>
          <div class="mono text-secondary" style="font-size:0.75rem;margin-bottom:6px;">${escapeHtml(issue.location)}</div>
          <div style="font-size:0.83rem;margin-bottom:6px;">${escapeHtml(issue.description)}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:10px;">التأثير: ${escapeHtml(issue.impact)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${issue.autoFix ? `<button class="btn btn-green btn-sm" data-fix="${escapeHtml(issue.id)}">🔧 ${escapeHtml(issue.fixLabel)}</button>` : `<span class="text-secondary" style="font-size:0.8rem;">📋 ${escapeHtml(issue.fixLabel)}</span>`}
            <span id="fix_status_${issue.id}" style="font-size:0.8rem;color:var(--accent-green);align-self:center;"></span>
          </div>
        </div>
      `).join("")}
    `;

    // Wire fix buttons
    issues.forEach(issue=>{
      if(!issue.autoFix) return;
      const btn = resultsEl.querySelector(`[data-fix="${issue.id}"]`);
      if(!btn) return;
      btn.addEventListener("click", async ()=>{
        btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span> جاري الإصلاح…`;
        try{
          await issue.autoFix();
          const statusEl = document.getElementById(`fix_status_${issue.id}`);
          if(statusEl) statusEl.textContent = "✅ تم الإصلاح";
          btn.textContent = "✅ مكتمل";
          writeAuditLog("repair_applied",{ issueId: issue.id, title: issue.title });
        }catch(e){
          btn.disabled=false; btn.textContent=`🔧 ${issue.fixLabel}`;
          toast(`فشل الإصلاح: ${e.message}`,"error");
        }
      });
    });
  }

  document.getElementById("runDiagBtn").addEventListener("click", runDiagnostics);
}

/* ============================================================
   البند 11: إدارة حسابات الموظفين
   البند 12: نظام GROOT ADMIN (Super Admin)
   ============================================================ */
const GROOT_ADMIN_KEY = "GROOT ADMIN";
const SUPER_ADMIN_ROLE = "super_admin";

/* ─── GROOT ADMIN password verification ─── */
async function verifyGrootAdmin(enteredPassword){
  // الكلمة مخزّنة hash في Firestore فقط — لا تُخزَّن في Frontend أبداً
  try{
    const snap = await getDoc(doc(db,"system_config","groot_admin"));
    if(snap.exists() && snap.data().passwordHash){
      return await verifyPassword(enteredPassword, snap.data().passwordHash, snap.data().passwordSalt, snap.data().passwordIterations||150000);
    }
    // First-time: compare against hardcoded key directly, then persist hash
    if(enteredPassword === GROOT_ADMIN_KEY){
      const { hash, salt, iterations } = await pbkdf2Hash(GROOT_ADMIN_KEY);
      await setDoc(doc(db,"system_config","groot_admin"),{ passwordHash:hash, passwordSalt:salt, passwordIterations:iterations, initializedAt:serverTimestamp(), isDefaultPassword:true });
      return true;
    }
    return false;
  }catch(e){
    console.error("verifyGrootAdmin error:", e);
    return false;
  }
}

/* ─── Prompt for GROOT ADMIN password ─── */
function promptGrootAdmin(purposeLabel, onSuccess){
  showModal(`
    <h2>🔒 تحقق GROOT ADMIN</h2>
    <p class="text-secondary" style="margin-bottom:14px;font-size:0.84rem;">${escapeHtml(purposeLabel)}</p>
    <div class="field">
      <label for="grootPassInput">كلمة مرور GROOT ADMIN</label>
      <input type="password" id="grootPassInput" class="input input-mono" autocomplete="off">
      <div class="field-error" id="grootPassError">كلمة المرور غير صحيحة</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelGroot">إلغاء</button>
      <button class="btn btn-primary" id="confirmGroot">تحقق</button>
    </div>
  `);
  const input = document.getElementById("grootPassInput");
  input.focus();
  document.getElementById("cancelGroot").addEventListener("click", closeModal);
  async function attempt(){
    const val = input.value;
    if(!val){ document.getElementById("grootPassError").classList.add("show"); return; }
    const btn = document.getElementById("confirmGroot");
    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span>`;
    const valid = await verifyGrootAdmin(val);
    if(valid){
      writeAuditLog("groot_admin_auth_success", { purpose: purposeLabel });
      closeModal();
      onSuccess();
    }else{
      writeAuditLog("groot_admin_auth_failed", { purpose: purposeLabel });
      document.getElementById("grootPassError").classList.add("show");
      btn.disabled=false; btn.textContent="تحقق";
    }
  }
  document.getElementById("confirmGroot").addEventListener("click", attempt);
  input.addEventListener("keydown", e=>{ if(e.key==="Enter") attempt(); });
}

/* ─── Render Accounts Tab ─── */
async function renderAccountsTab(){
  const content = document.getElementById("tabContent");
  content.innerHTML = `<div class="empty-state"><div class="spinner" aria-hidden="true"></div></div>`;

  // Load all gate accounts
  let accounts = [];
  try{
    const snap = await getDocs(collection(db,"gate_accounts"));
    // استبعاد حسابات الموظفين (role:"employee") — هذه تُدار من تبويب "الموظفون" نفسه
    // عبر بيانات الدخول التي تظهر عند الإضافة/الاستعادة. هذا التبويب مخصص فقط
    // لحسابات مديري المحلات والإدمن (role: "user" أو SUPER_ADMIN_ROLE).
    accounts = snap.docs.map(d=>({ id:d.id, ...d.data() }))

function renderAccountsRows(accounts){
  if(accounts.length === 0) return `<tr><td colspan="5"><div class="empty-state">لا يوجد حسابات</div></td></tr>`;
  return accounts.map(acc=>{
    const shop = state.shops.find(s=>s.id===acc.shopId);
    const isSuperAdmin = acc.role === SUPER_ADMIN_ROLE;
    const isDisabled = acc.disabled === true;
    return `<tr ${isDisabled?"style='opacity:0.55;'":""}>
      <td class="mono" style="font-weight:700;">${escapeHtml(acc.username||acc.id)}</td>
      <td>${escapeHtml(shop?.name || acc.shopId || "—")}</td>
      <td>${isDisabled
        ? `<span class="badge badge-red">⛔ معطّل</span>`
        : `<span class="badge badge-green">✅ نشط</span>`}
      </td>
      <td>${isSuperAdmin
        ? `<span class="badge badge-orange" style="font-size:0.75rem;">👑 Super Admin</span>`
        : `<span class="badge" style="background:rgba(122,154,181,0.12);color:var(--text-secondary);">عادي</span>`}
      </td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${!isSuperAdmin ? `<button class="btn btn-ghost btn-sm" data-edit-acc="${escapeHtml(acc.id)}">تعديل</button>` : ""}
          ${!isSuperAdmin ? `<button class="btn btn-ghost btn-sm" data-reset-pass="${escapeHtml(acc.id)}">🔑 كلمة المرور</button>` : ""}
          ${!isSuperAdmin ? (isDisabled
            ? `<button class="btn btn-green btn-sm" data-enable-acc="${escapeHtml(acc.id)}">تفعيل</button>`
            : `<button class="btn btn-orange btn-sm" data-disable-acc="${escapeHtml(acc.id)}">تعطيل</button>`)
            : ""}
          ${!isSuperAdmin
            ? `<button class="btn btn-primary btn-sm" style="font-size:0.72rem;" data-grant-groot="${escapeHtml(acc.id)}" data-uname="${escapeHtml(acc.username||acc.id)}">👑 إعطاء كل الصلاحيات</button>`
            : `<button class="btn btn-red btn-sm" style="font-size:0.72rem;" data-revoke-groot="${escapeHtml(acc.id)}" data-uname="${escapeHtml(acc.username||acc.id)}">🚫 إزالة الصلاحيات</button>`}
        </div>
      </td>
    </tr>`;
  }).join("");
}

function wireAccountsTable(accounts, reload){
  const tbody = document.getElementById("accountsTbody");
  if(!tbody) return;

  // Edit account (username)
  tbody.querySelectorAll("[data-edit-acc]").forEach(btn=>{
    const acc = accounts.find(a=>a.id===btn.dataset.editAcc);
    if(!acc) return;
    btn.addEventListener("click", ()=>openEditAccountModal(acc, reload));
  });

  // Reset password
  tbody.querySelectorAll("[data-reset-pass]").forEach(btn=>{
    const acc = accounts.find(a=>a.id===btn.dataset.resetPass);
    if(!acc) return;
    btn.addEventListener("click", ()=>openResetPasswordModal(acc, reload));
  });

  // Disable account
  tbody.querySelectorAll("[data-disable-acc]").forEach(btn=>{
    const acc = accounts.find(a=>a.id===btn.dataset.disableAcc);
    if(!acc) return;
    btn.addEventListener("click", ()=>toggleAccountDisabled(acc, true, reload));
  });

  // Enable account
  tbody.querySelectorAll("[data-enable-acc]").forEach(btn=>{
    const acc = accounts.find(a=>a.id===btn.dataset.enableAcc);
    if(!acc) return;
    btn.addEventListener("click", ()=>toggleAccountDisabled(acc, false, reload));
  });

  // Grant GROOT ADMIN
  tbody.querySelectorAll("[data-grant-groot]").forEach(btn=>{
    const accId = btn.dataset.grantGroot;
    const uname = btn.dataset.uname;
    btn.addEventListener("click", ()=>{
      promptGrootAdmin(`منح صلاحيات Super Admin للحساب: ${uname}`, async ()=>{
        try{
          await setDoc(doc(db,"gate_accounts",accId),{ role: SUPER_ADMIN_ROLE, superAdminGrantedAt: serverTimestamp(), superAdminGrantedBy: window.__gateUsername||"admin" },{ merge:true });
          writeAuditLog("groot_admin_granted",{ targetAccId: accId, targetUsername: uname });
          toast(`تم منح صلاحيات Super Admin لـ ${uname} ✅`,"success");
          reload();
        }catch(e){ console.error(e); toast("فشلت العملية","error"); }
      });
    });
  });

  // Revoke GROOT ADMIN
  tbody.querySelectorAll("[data-revoke-groot]").forEach(btn=>{
    const accId = btn.dataset.revokeGroot;
    const uname = btn.dataset.uname;
    btn.addEventListener("click", ()=>{
      promptGrootAdmin(`إزالة صلاحيات Super Admin من الحساب: ${uname}`, async ()=>{
        try{
          await setDoc(doc(db,"gate_accounts",accId),{ role: "user", superAdminRevokedAt: serverTimestamp(), superAdminRevokedBy: window.__gateUsername||"admin" },{ merge:true });
          writeAuditLog("groot_admin_revoked",{ targetAccId: accId, targetUsername: uname });
          toast(`تم إزالة صلاحيات Super Admin من ${uname}`,"info");
          reload();
        }catch(e){ console.error(e); toast("فشلت العملية","error"); }
      });
    });
  });
}

async function approveCorrection(reqId, shopId, date, empId, requestedCheckIn, requestedCheckOut, onDone){
  // Build a modal that lets admin confirm and optionally override the requested time
  showModal(`
    <h2>تأكيد الموافقة على الطلب</h2>
    <p class="text-secondary" style="margin-bottom:16px;font-size:0.84rem;">سيتم تعديل سجل الحضور فعلياً وتطبيق التغييرات التالية:</p>
    <div class="field">
      <label>وقت الحضور المطلوب</label>
      <input type="time" id="approveCheckIn" class="input input-mono" value="${escapeHtml(requestedCheckIn)}">
    </div>
    <div class="field">
      <label>وقت الانصراف المطلوب</label>
      <input type="time" id="approveCheckOut" class="input input-mono" value="${escapeHtml(requestedCheckOut)}">
    </div>
    <div class="field">
      <label>ملاحظة للموظف/المسؤول (اختياري)</label>
      <input type="text" id="approveNote" class="input" placeholder="سبب الموافقة أو أي ملاحظة..." maxlength="200">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelApproveCorr">إلغاء</button>
      <button class="btn btn-green" id="confirmApproveCorr">تأكيد الموافقة وتطبيق التعديل</button>
    </div>
  `);
  document.getElementById("cancelApproveCorr").addEventListener("click", closeModal);
  document.getElementById("confirmApproveCorr").addEventListener("click", async ()=>{
    const newCheckIn = document.getElementById("approveCheckIn").value;
    const newCheckOut = document.getElementById("approveCheckOut").value;
    const adminNote = document.getElementById("approveNote").value.trim();
    const btn = document.getElementById("confirmApproveCorr");
    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span> جاري التطبيق...`;

    try{
      // Read the current record to preserve old values for audit trail
      const recRef = doc(db, "attendance", `${shopId}_${date}`, "records", empId);
      const oldSnap = await getDoc(recRef);
      const oldData = oldSnap.data() || {};

      // Apply the approved times to the actual attendance record
      const updates = {
        adminEdited: true,
        adminEditedAt: serverTimestamp(),
        adminEditedBy: window.__gateUsername || "admin",
        editReason: adminNote || "موافقة على طلب تعديل",
        previousCheckIn: oldData.checkIn || null,
        previousCheckOut: oldData.checkOut || null,
      };
      let finalCheckIn = null, finalCheckOut = null;
      if(newCheckIn){
        const [h,m] = newCheckIn.split(":").map(Number);
        const d = new Date(date+"T00:00:00"); d.setHours(h,m,0,0);
        updates.checkIn = d; finalCheckIn = d;
      }
      if(newCheckOut){
        const [h,m] = newCheckOut.split(":").map(Number);
        const d = new Date(date+"T00:00:00"); d.setHours(h,m,0,0);
        updates.checkOut = d; finalCheckOut = d;
      }

      // ── إعادة حساب الساعات بعد تطبيق الأوقات الجديدة (السبب الجذري للمشكلة) ──
      // كان الكود يكتب checkIn/checkOut فقط بدون تحديث totalHours/extraHours/baseHours
      // فتبقى الساعات القديمة في الـ record وتظهر التقارير والرواتب بيانات خاطئة
      const ciCalc  = finalCheckIn  || (oldData.checkIn  instanceof Date ? oldData.checkIn  : oldData.checkIn?.toDate?.()  || null);
      const coCalc  = finalCheckOut || (oldData.checkOut instanceof Date ? oldData.checkOut : oldData.checkOut?.toDate?.() || null);
      const shopForNH = state.shops.find(s => s.id === shopId);
      const normalHoursForNH = shopForNH?.settings?.normalHours || DEFAULT_NORMAL_HOURS;
      if(ciCalc && coCalc){
        const { total, base, extra } = calcHours(ciCalc, coCalc, normalHoursForNH);
        updates.totalHours = Math.round(total * 100) / 100;
        updates.baseHours  = Math.round(base  * 100) / 100;
        updates.extraHours = Math.round(extra * 100) / 100;
        // لو بعد التعديل مفيش ساعات إضافية — امسح pending flag تلقائياً
        if(extra <= 0 && oldData.approvalStatus === "pending"){
          updates.approvalStatus = null;
        }
      }

      await setDoc(recRef, updates, { merge: true });

      // Mark the request as approved
      await updateDoc(doc(db,"correction_requests",reqId),{
        status:"approved",
        reviewedAt: serverTimestamp(),
        reviewedBy: window.__gateUsername || "admin",
        adminNote: adminNote || null,
        appliedCheckIn: newCheckIn || null,
        appliedCheckOut: newCheckOut || null,
      });

      // Audit log with full before/after trail
      writeAuditLog("correction_approved_and_applied",{
        requestId: reqId, shopId, date, empId,
        oldCheckIn: oldData.checkIn?.toDate?.()?.toISOString() || null,
        oldCheckOut: oldData.checkOut?.toDate?.()?.toISOString() || null,
        newCheckIn, newCheckOut, adminNote,
      });

      toast("تم قبول الطلب وتطبيق التعديل على سجل الحضور","success",5000);
      closeModal();
      if(typeof onDone==="function") onDone();
    }catch(err){
      console.error(err);
      toast("فشل تطبيق التعديل: "+err.message,"error");
      btn.disabled=false; btn.textContent="تأكيد الموافقة وتطبيق التعديل";
    }
  });
}

async function loadSessionsTable(){
  const wrap = document.getElementById("sessionsTableWrap");
  wrap.innerHTML = `<div class="empty-state"><div class="spinner" aria-hidden="true"></div></div>`;
  try{
    // Load gate accounts dynamically — no hardcoded list
    const accountsSnap = await getDocs(collection(db, "gate_accounts"));
    const GATE_USERNAMES = accountsSnap.docs.map(d => d.data().username || d.id);

function auditActionMeta(action){
  return AUDIT_ACTION_LABELS[action] || { label: action || "—", icon: "•", color: "cyan" };

function formatAuditDetails(log){
  const d = log.details || {};
  const parts = [];
  if(log.performedBy && log.performedBy !== log.gateUser) parts.push(`بواسطة: ${log.performedBy}`);
  if(d.name) parts.push(`الاسم: ${d.name}`);
  if(d.username) parts.push(`المستخدم: ${d.username}`);
  if(d.empId || d.employeeId){
    const allEmps = Object.values(state.employeesByShop).flat();
    const emp = allEmps.find(e=>e.id===(d.empId||d.employeeId));
    if(emp) parts.push(`الموظف: ${emp.name}`);
  }
  if(d.date) parts.push(`التاريخ: ${d.date}`);
  // Before/After values (structured audit trail per البند 9)
  if(d.oldValue){
    const old = d.oldValue;
    const parts2 = [];
    if(old.checkIn) parts2.push(`حضور: ${old.checkIn}`);
    if(old.checkOut) parts2.push(`انصراف: ${old.checkOut}`);
    if(parts2.length) parts.push(`قبل: ${parts2.join(" / ")}`);
  }
  if(d.newValue){
    const nv = d.newValue;
    const parts2 = [];
    if(nv.checkIn) parts2.push(`حضور: ${nv.checkIn}`);
    if(nv.checkOut) parts2.push(`انصراف: ${nv.checkOut}`);
    if(parts2.length) parts.push(`بعد: ${parts2.join(" / ")}`);
  }
  if(d.editReason) parts.push(`سبب: ${d.editReason}`);
  if(d.reason) parts.push(`السبب: ${d.reason}`);
  if(d.month) parts.push(`الشهر: ${d.month}`);
  if(d.rowCount !== undefined) parts.push(`عدد الصفوف: ${d.rowCount}`);
  if(d.attempts !== undefined) parts.push(`محاولات: ${d.attempts}`);
  if(d.restoredShops !== undefined) parts.push(`محلات مستعادة: ${d.restoredShops}`);
  return parts.length > 0 ? parts.join(" · ") : "—";
}

const SENSITIVE_TAB_SESSION_KEY = "gr_dawam_tab_auth_v1";
const SENSITIVE_TABS = ["audit","settings","sessions","payroll"];
const DEFAULT_TAB_PASSWORD = "GR1";

/* ============================================================
   ملاحظة: "نظام إعادة تعيين كلمات المرور" العام (كلمة افتراضية واحدة
   تُطبَّق على أي حساب في النظام بدون تحقق) تم حذفه بالكامل من الجذور
   بناءً على طلب الإدارة — كان يشكّل ثغرة أمنية واضحة (Backdoor).
   الدوال المحذوفة: getDefaultResetPassword, saveDefaultResetPassword,
   resetPasswordTo, openPasswordResetModal — وكذلك الزر والقسم في
   صفحة الإعدادات، ورسالة "إجراء أمني مطلوب فورًا" المرتبطة بها.
   إعادة تعيين كلمة مرور محل بعينه تبقى متاحة عبر openShopResetPasswordModal
   (أداة منفصلة ومستقلة، تتطلب اختيار المحل صراحة من الإدارة).
   ============================================================ */

function getTabAuthSession(){
  try{
    const raw = sessionStorage.getItem(SENSITIVE_TAB_SESSION_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    // Tab auth expires after 2 hours of admin session
    if(Date.now() - s.grantedAt > 2 * 60 * 60 * 1000) return null;
    return s;
  }catch{ return null; }
}
function setTabAuthSession(){ sessionStorage.setItem(SENSITIVE_TAB_SESSION_KEY, JSON.stringify({ grantedAt: Date.now() })); }
function clearTabAuthSession(){ sessionStorage.removeItem(SENSITIVE_TAB_SESSION_KEY); }

async function getTabPassword(){
  try{
    const snap = await getDoc(doc(db,"system_config","tab_password"));
    if(snap.exists() && snap.data().passwordHash) return snap.data();
  }catch(e){ console.error(e); }
  return null; // fallback: use DEFAULT_TAB_PASSWORD plain check
}

async function requireSensitiveTabAuth(tabName){
  // البند 12: Super Admin يتجاوز حماية الصفحات الحساسة تلقائياً
  if(window.__gateRole === "super_admin") return true;
  // Already authenticated this session?
  if(getTabAuthSession()) return true;
  return new Promise((resolve)=>{
    showModal(`
      <h2>🔒 صفحة محمية</h2>
      <p class="text-secondary" style="margin-bottom:14px;">هذه الصفحة تتطلب كلمة مرور خاصة.</p>
      <div class="field">
        <label for="tabPasswordInput">كلمة المرور</label>
        <input type="password" id="tabPasswordInput" class="input input-mono" autocomplete="off" placeholder="أدخل كلمة المرور">
        <div class="field-error" id="tabPasswordError">كلمة المرور غير صحيحة</div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelTabAuth">إلغاء</button>
        <button type="button" class="btn btn-primary" id="confirmTabAuth">دخول</button>
      </div>
    `);
    const input = document.getElementById("tabPasswordInput");
    input.focus();
    document.getElementById("cancelTabAuth").addEventListener("click", ()=>{ closeModal(); resolve(false); });
    async function attemptTabAuth(){
      const entered = input.value;
      if(!entered){ document.getElementById("tabPasswordError").classList.add("show"); return; }
      const btn = document.getElementById("confirmTabAuth");
      btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
      try{
        const cfg = await getTabPassword();
        let valid = false;
        if(cfg && cfg.passwordHash){
          valid = await verifyPassword(entered, cfg.passwordHash, cfg.passwordSalt, cfg.passwordIterations || 150000);
        }else{
          // No hash stored yet — compare against DEFAULT_TAB_PASSWORD
          valid = (entered === DEFAULT_TAB_PASSWORD);
        }
        if(valid){
          setTabAuthSession();
          writeAuditLog("sensitive_tab_unlocked", { tab: tabName });
          closeModal();
          resolve(true);
        }else{
          document.getElementById("tabPasswordError").classList.add("show");
          writeAuditLog("sensitive_tab_auth_failed", { tab: tabName });
          btn.disabled = false; btn.textContent = "دخول";
        }
      }catch(e){
        console.error(e);
        btn.disabled = false; btn.textContent = "دخول";
        toast("تعذّر التحقق من كلمة المرور","error");
        resolve(false);
      }
    }
    document.getElementById("confirmTabAuth").addEventListener("click", attemptTabAuth);
    input.addEventListener("keydown", e=>{ if(e.key==="Enter") attemptTabAuth(); });
  });
}

    try{

      if(snap.docs.length < AUDIT_PAGE_SIZE) auditAllLoaded = true;
      if(snap.docs.length > 0) auditLastDoc = snap.docs[snap.docs.length-1];
      allLogs = allLogs.concat(snap.docs.map(d=>({ id:d.id, ...d.data() })));

        if(actionFilter==="admin" && !a.includes("admin")) return false;

      return true;

            }).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  document.getElementById("auditActionFilter").addEventListener("change", renderFilteredLogs);

      <!-- Gate Accounts Management (replaces hardcoded 10 accounts) -->
      <div class="glass-card section-card">
        <div class="section-head">
          <div class="section-title"><span class="dot" aria-hidden="true"></span> حسابات الدخول للموقع</div>
          <button class="btn btn-green btn-sm" id="addGateAccountBtn">+ إضافة حساب</button>
        </div>
        <p class="text-secondary" style="font-size:0.82rem;margin-bottom:14px;">
          هذه الحسابات تستخدم لتسجيل الدخول على الصفحة الرئيسية قبل الوصول لأي قسم آخر.
        </p>
        <div id="gateAccountsList">
          ${gateAccounts.length===0 ? `<div class="empty-state">لا يوجد حسابات بعد. أضف حسابًا للبدء.</div>` :
            gateAccounts.map(acc=>`
              <div class="glass-card" style="padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                <div>
                  <div style="font-weight:700;font-size:0.9rem;">${escapeHtml(acc.username)}</div>
                  <div class="text-secondary" style="font-size:0.75rem;font-family:var(--font-mono);">أُنشئ: ${acc.createdAt?.toDate?.()?.toLocaleDateString("ar-EG")||"—"}</div>
                </div>
                <div style="display:flex;gap:6px;">
                  <button class="btn btn-ghost btn-sm" data-change-gate-pass="${escapeHtml(acc.id)}">تغيير كلمة المرور</button>
                  <button class="btn btn-red btn-sm" data-delete-gate-acc="${escapeHtml(acc.id)}" data-gate-name="${escapeHtml(acc.username)}">حذف</button>
                </div>
              </div>`).join("")}
        </div>
      </div>

      <div class="glass-card section-card">
        <div class="section-head">
          <div class="section-title"><span class="dot" aria-hidden="true"></span> النسخ الاحتياطي والاستعادة</div>
        </div>
        <p class="text-secondary" style="font-size:0.85rem;margin-bottom:14px;">
          تصدير نسخة JSON كاملة من بيانات المحلات والموظفين (بدون كلمات المرور) للاحتفاظ بها كنسخة احتياطية.
        </p>
        <button class="btn btn-green btn-block" id="exportBackupBtn" style="margin-bottom:10px;">⬇ تصدير نسخة احتياطية (JSON)</button>
        <div class="field" style="margin-top:14px;">
          <label>استعادة من ملف JSON (يضيف بيانات فقط، لا يحذف الموجود)</label>
          <label for="restoreFile" class="btn btn-ghost btn-block" style="cursor:pointer;justify-content:center;margin-bottom:10px;">
            📂 اختر ملف JSON
          </label>
          <input type="file" id="restoreFile" accept="application/json" style="display:none;">
          <div id="restoreFileName" style="font-size:0.78rem;color:var(--text-secondary);text-align:center;min-height:18px;"></div>
        </div>
        <button class="btn btn-orange btn-block" id="restoreBackupBtn">⬆ استعادة من نسخة احتياطية</button>
      </div>

      <!-- البند 6: تغيير كلمة مرور الصفحات الحساسة -->
      <div class="glass-card section-card">
        <div class="section-head">
          <div class="section-title"><span class="dot" aria-hidden="true"></span> كلمة مرور الصفحات الحساسة</div>
        </div>
        <p class="text-secondary" style="font-size:0.82rem;margin-bottom:14px;">
          تحمي هذه الكلمة صفحات: سجل العمليات، الإعدادات، الجلسات النشطة، الرواتب.
        </p>
        <form id="changeTabPassForm">
          <div class="field">
            <label for="curTabPass">كلمة المرور الحالية</label>
            <input type="password" id="curTabPass" class="input input-mono" required autocomplete="current-password">
          </div>
          <div class="field">
            <label for="newTabPass">كلمة المرور الجديدة</label>
            <input type="password" id="newTabPass" class="input input-mono" required minlength="2" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">تحديث كلمة مرور الصفحات</button>
        </form>
      </div>
    </div>
  `;

  document.getElementById("changeAdminPassForm").addEventListener("submit", handleChangeAdminPassword);
  document.getElementById("exportBackupBtn").addEventListener("click", exportJsonBackup);
  document.getElementById("restoreBackupBtn").addEventListener("click", restoreJsonBackup);
  document.getElementById("changeTabPassForm").addEventListener("submit", handleChangeTabPassword);
  document.getElementById("restoreFile").addEventListener("change", e=>{
    const f = e.target.files[0];
    document.getElementById("restoreFileName").textContent = f ? `✅ ${f.name}` : "";
  });

  document.getElementById("addGateAccountBtn").addEventListener("click", openAddGateAccountModal);
  content.querySelectorAll("[data-change-gate-pass]").forEach(btn=>{
    btn.addEventListener("click", ()=>openChangeGatePasswordModal(btn.dataset.changeGatePass));
  });
  content.querySelectorAll("[data-delete-gate-acc]").forEach(btn=>{
    btn.addEventListener("click", ()=>confirmDeleteGateAccount(btn.dataset.deleteGateAcc, btn.dataset.gateName));
  });
}

async function handleChangeTabPassword(e){
  e.preventDefault();
  const curPass = document.getElementById("curTabPass").value;
  const newPass = document.getElementById("newTabPass").value;
  if(!curPass || !newPass){ toast("أدخل كلمة المرور الحالية والجديدة","warn"); return; }
  const btn = e.target.querySelector("button[type=submit]");
  btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span>`;
  try{
    // Verify current password
    const cfg = await getTabPassword();
    let valid = false;
    if(cfg && cfg.passwordHash){
      valid = await verifyPassword(curPass, cfg.passwordHash, cfg.passwordSalt, cfg.passwordIterations||150000);
    }else{
      valid = (curPass === DEFAULT_TAB_PASSWORD);
    }
    if(!valid){ toast("كلمة المرور الحالية غير صحيحة","error"); btn.disabled=false; btn.textContent="تحديث كلمة مرور الصفحات"; return; }
    // Hash and save new password
    const { hash, salt, iterations } = await pbkdf2Hash(newPass);
    await setDoc(doc(db,"system_config","tab_password"),{ passwordHash:hash, passwordSalt:salt, passwordIterations:iterations, updatedAt:serverTimestamp() });
    clearTabAuthSession(); // force re-auth with new password
    writeAuditLog("tab_password_changed",{});
    toast("تم تحديث كلمة مرور الصفحات الحساسة ✅","success");
    e.target.reset();
  }catch(err){
    console.error(err);
    toast("فشل التحديث","error");
  }finally{
    btn.disabled=false; btn.textContent="تحديث كلمة مرور الصفحات";
  }
}

function openAddGateAccountModal(){
  showModal(`
    <h2>إضافة حساب دخول جديد</h2>
    <div class="field">
      <label for="newGateUsername">اسم المستخدم *</label>
      <input type="text" id="newGateUsername" class="input" placeholder="مثال: manager-01" maxlength="60" autocomplete="off">
      <div class="field-error" id="newGateUsernameError">اسم المستخدم مستخدَم بالفعل</div>
    </div>
    <div class="field">
      <label for="newGatePassword">كلمة المرور *</label>
      <input type="password" id="newGatePassword" class="input input-mono" placeholder="6 أحرف على الأقل" minlength="6" autocomplete="new-password">
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancelAddGate">إلغاء</button>
      <button type="button" class="btn btn-primary" id="confirmAddGate">إضافة الحساب</button>
    </div>
  `);
  document.getElementById("cancelAddGate").addEventListener("click", closeModal);
  document.getElementById("confirmAddGate").addEventListener("click", async ()=>{
    const username = document.getElementById("newGateUsername").value.trim();
    const password = document.getElementById("newGatePassword").value;
    if(!username || password.length < 6){ toast("أدخل اسم مستخدم وكلمة مرور (6 أحرف على الأقل)","warn"); return; }
    const btn = document.getElementById("confirmAddGate");
    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span>`;
    try{
      const ref = doc(db,"gate_accounts",username);
      const existing = await getDoc(ref);
      if(existing.exists()){
        document.getElementById("newGateUsernameError").classList.add("show");
        btn.disabled=false; btn.textContent="إضافة الحساب";
        return;
      }
      const {hash,salt,iterations} = await pbkdf2Hash(password);
      await setDoc(ref,{username,passwordHash:hash,passwordSalt:salt,passwordIterations:iterations,createdAt:serverTimestamp(),createdByAdmin:true});
      writeAuditLog("gate_account_created",{username});
      toast(`تم إضافة حساب "${username}"`,"success");
      closeModal();
      renderSettingsTab();
    }catch(err){ console.error(err); toast("فشل إضافة الحساب","error"); btn.disabled=false; btn.textContent="إضافة الحساب"; }
  });
}

function openChangeGatePasswordModal(accountId){
  showModal(`
    <h2>تغيير كلمة مرور — ${escapeHtml(accountId)}</h2>
    <div class="field">
      <label for="newGatePass">كلمة المرور الجديدة *</label>
      <input type="password" id="newGatePass" class="input input-mono" placeholder="6 أحرف على الأقل" minlength="6" autocomplete="new-password">
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancelGatePass">إلغاء</button>
      <button type="button" class="btn btn-primary" id="confirmGatePass">تحديث كلمة المرور</button>
    </div>
  `);
  document.getElementById("cancelGatePass").addEventListener("click", closeModal);
  document.getElementById("confirmGatePass").addEventListener("click", async ()=>{
    const pass = document.getElementById("newGatePass").value;
    if(pass.length < 6){ toast("كلمة المرور يجب أن تكون 6 أحرف على الأقل","warn"); return; }
    const btn = document.getElementById("confirmGatePass");
    btn.disabled=true; btn.innerHTML=`<span class="spinner" aria-hidden="true"></span>`;
    try{
      const {hash,salt,iterations} = await pbkdf2Hash(pass);
      await updateDoc(doc(db,"gate_accounts",accountId),{passwordHash:hash,passwordSalt:salt,passwordIterations:iterations,updatedAt:serverTimestamp()});
      // Force logout of active session so new password takes effect immediately
      await setDoc(doc(db,"gate_sessions",accountId),{active:false,forcedLogoutAt:serverTimestamp()},{merge:true});
      writeAuditLog("gate_account_password_changed",{username:accountId});
      toast("تم تحديث كلمة المرور وإلغاء الجلسة النشطة","success");
      closeModal();
    }catch(err){ console.error(err); toast("فشل التحديث","error"); btn.disabled=false; btn.textContent="تحديث كلمة المرور"; }
  });
}

function confirmDeleteGateAccount(accountId, username){
  showModal(`
    <h2>حذف الحساب — ${escapeHtml(username)}</h2>
    <p class="text-secondary">سيتم حذف هذا الحساب نهائيًا. أي جلسة نشطة له ستنتهي فورًا. هذا الإجراء لا يمكن التراجع عنه.</p>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancelDeleteGate">إلغاء</button>
      <button type="button" class="btn btn-red" id="confirmDeleteGate">حذف الحساب نهائيًا</button>
    </div>
  `);
  document.getElementById("cancelDeleteGate").addEventListener("click", closeModal);
  document.getElementById("confirmDeleteGate").addEventListener("click", async ()=>{
    try{
      await deleteDoc(doc(db,"gate_accounts",accountId));
      await setDoc(doc(db,"gate_sessions",accountId),{active:false,deletedAt:serverTimestamp()},{merge:true});
      writeAuditLog("gate_account_deleted",{username});
      toast(`تم حذف حساب "${username}"`,"success");
      closeModal();
      renderSettingsTab();
    }catch(err){ console.error(err); toast("فشل الحذف","error"); }
  });
}

async function handleChangeAdminPassword(e){
  e.preventDefault();
  const curPass = document.getElementById("curPass").value;
  const newPass = document.getElementById("newAdminPass").value;
  const btn = e.target.querySelector("button[type=submit]");
  btn.disabled = true; btn.innerHTML = `<span class="spinner" aria-hidden="true"></span>`;
  try{
    const config = await ensureAdminConfig();
    const valid = await verifyPassword(curPass, config.passwordHash, config.passwordSalt, config.passwordIterations || 150000);
    if(!valid){
      toast("كلمة المرور الحالية غير صحيحة", "error");
      btn.disabled = false; btn.textContent = "تحديث كلمة المرور";
      return;
    }
    const { hash, salt, iterations } = await pbkdf2Hash(newPass);
    await setDoc(doc(db,"system_config","admin"), { passwordHash: hash, passwordSalt: salt, passwordIterations: iterations, updatedAt: serverTimestamp(), isDefaultPassword: false }, { merge: true });
    writeAuditLog("admin_password_changed", {});
    toast("تم تحديث كلمة مرور الإدارة", "success");
    e.target.reset();
  }catch(err){
    console.error(err);
    toast("فشل تحديث كلمة المرور", "error");
  }finally{
    btn.disabled = false;
    btn.textContent = "تحديث كلمة المرور";
  }
}

async function exportJsonBackup(){
  try{
    const backup = { exportedAt: new Date().toISOString(), shops: [] };
    for(const shop of state.shops){
      const { passwordHash, passwordSalt, passwordIterations, ...safeShop } = shop;
      backup.shops.push({
        ...safeShop,
        employees: (state.employeesByShop[shop.id]||[]).map(({shopId, ...e})=>e)
      });
    }
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `GR_نسخة_احتياطية_${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    writeAuditLog("backup_exported", {});
    toast("تم تصدير النسخة الاحتياطية", "success");
  }catch(err){
    console.error(err);
    toast("فشل تصدير النسخة الاحتياطية", "error");
  }
}

async function restoreJsonBackup(){
  const fileInput = document.getElementById("restoreFile");
  const file = fileInput.files[0];
  if(!file){ toast("اختر ملف JSON أولًا", "warn"); return; }
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup.shops || !Array.isArray(backup.shops)) throw new Error("invalid_format");

    showModal(`
      <h2>تأكيد الاستعادة</h2>
      <p class="text-secondary">سيتم إضافة ${backup.shops.length} محل/محلات وموظفيهم كبيانات جديدة. لن يتم حذف أي بيانات حالية. هل تريد المتابعة؟</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelRestore">إلغاء</button>
        <button type="button" class="btn btn-orange" id="confirmRestore">استعادة الآن</button>
      </div>
    `);
    document.getElementById("cancelRestore").addEventListener("click", closeModal);
    document.getElementById("confirmRestore").addEventListener("click", async ()=>{
      closeModal();
      toast("جاري الاستعادة...", "info");
      let restoredShops = 0, restoredEmps = 0;
      const newCredentials = []; // {shopName, empName, username, password} لعرضها للإدمن بعد الانتهاء
      for(const shopData of backup.shops){
        const { id, employees, ...shopFields } = shopData;
        // each restored shop needs a password — generate a random one and flag it for admin to reset
        const tempPassword = crypto.randomUUID().slice(0,12);
        const { hash, salt, iterations } = await pbkdf2Hash(tempPassword);
        const ref = await addDoc(collection(db,"shops"), {
          ...shopFields,
          passwordHash: hash, passwordSalt: salt, passwordIterations: iterations,
          restoredAt: serverTimestamp(),
          needsPasswordReset: true
        });
        restoredShops++;
        for(const emp of (employees||[])){
          const { id: oldEmpId, username: oldUsername, ...empFields } = emp;
          const empRef = await addDoc(collection(db,"shops",ref.id,"employees"), { ...empFields, shopId: ref.id, tenantId: ref.id });
          // إعادة بناء حساب دخول فعلي للموظف — النسخة الاحتياطية لا تحتوي gate_accounts إطلاقاً
          // (مثل المحلات، الموظف المُستعاد يحتاج بيانات دخول جديدة يُعطيها الإدمن له)
          const { username, password } = await createGateAccountForEmployee(empRef.id, ref.id, empFields.name||"موظف");
          await setDoc(doc(db,"shops",ref.id,"employees",empRef.id), { username }, { merge: true });
          newCredentials.push({ shopName: shopFields.name||ref.id, empName: empFields.name||"—", username, password });
          restoredEmps++;
        }
      }
      writeAuditLog("backup_restored", { restoredShops, restoredEmps });

      const credsListHtml = newCredentials.map(c=>`
        <div style="padding:8px 0;border-bottom:1px solid var(--border-glass);">
          <div style="font-size:0.8rem;font-weight:600;">${escapeHtml(c.empName)} <span class="text-secondary">— ${escapeHtml(c.shopName)}</span></div>
          <div class="mono" style="font-size:0.78rem;">👤 ${escapeHtml(c.username)} &nbsp; 🔑 ${escapeHtml(c.password)}</div>
        </div>`).join("");
      showModal(`
        <h2>✅ تمت الاستعادة</h2>
        <p class="text-secondary" style="margin-bottom:12px;font-size:0.84rem;">
          تم استعادة ${restoredShops} محل و ${restoredEmps} موظف. كل محل وموظف حصل على بيانات دخول جديدة (احتفظ بها وأعطها لمن يلزم):
        </p>
        <div style="max-height:320px;overflow-y:auto;background:rgba(0,212,255,0.04);border:1px solid var(--border-glass);border-radius:10px;padding:12px;margin-bottom:14px;">
          ${credsListHtml || `<div class="text-secondary" style="font-size:0.82rem;">لا يوجد موظفون لعرض بياناتهم.</div>`}
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-primary" id="closeRestoreCredsBtn">حسناً</button>
        </div>
      `);
      document.getElementById("closeRestoreCredsBtn").addEventListener("click", closeModal);
      await loadAllShops(true);
      subscribeGlobalData();
    });
  }catch(err){
    console.error(err);
    toast("ملف النسخة الاحتياطية غير صالح", "error");
  }
}
</script>
